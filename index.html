<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NGL Quality Assurance System</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e3a5f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NGL QA">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%;scrollbar-gutter:stable}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#d8e0ea;color:#1a202c;min-height:100vh}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}
:root{
  --navy:#1e3a5f;--blue:#1e56a0;--blue-h:#174a8a;
  --green:#059669;--green-bg:#d1fae5;
  --red:#dc2626;--red-bg:#fee2e2;
  --amber:#d97706;--amber-bg:#fef3c7;
  --gray:#6b7280;--gray-bg:#f3f4f6;
  --border:#e5e7eb;--white:#fff;
  --r:8px;--r-lg:12px;
  --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.07);
  --shadow-lg:0 10px 30px rgba(0,0,0,.16);
}
.wrap{max-width:800px;margin:0 auto;padding:0 14px 56px}
.hdr{background:var(--navy);color:#fff;position:fixed;top:0;left:0;right:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.hdr-in{max-width:800px;margin:0 auto;padding:0 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;height:56px}
#hdr-root{min-height:56px}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-brand{font-size:16px;font-weight:700}
.hdr-brand-short{display:none}
@media(max-width:420px){.hdr-brand-full{display:none}.hdr-brand-short{display:inline}}
.hdr-sub{font-size:11px;opacity:.7;margin-top:1px}
.hdr-pill{display:inline-block;background:rgba(255,255,255,.15);border-radius:12px;padding:2px 10px;font-size:10px;font-weight:600;letter-spacing:.5px}
.hdr-right{display:flex;gap:7px;flex-shrink:0;align-items:center}
.hdr-back{background:none;border:none;color:rgba(255,255,255,.8);font-size:13px;cursor:pointer;padding:4px 8px;border-radius:4px;display:flex;align-items:center;gap:5px}
.hdr-back:hover{background:rgba(255,255,255,.1);color:#fff}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:6px;font-size:13px;font-weight:500;border:none;white-space:nowrap;cursor:pointer;transition:all .15s;line-height:1}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:var(--blue-h)}
.btn-white{background:#fff;color:var(--navy)}.btn-white:hover{background:#e8eef5}
.btn-outline{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.4)}.btn-outline:hover{background:rgba(255,255,255,.1)}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--gray)}.btn-ghost:hover{background:var(--gray-bg)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#047857}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#b91c1c}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{background:#162d4a}
.btn-sm{padding:6px 11px;font-size:12px}
.btn-lg{padding:11px 22px;font-size:14px}
/* HOME */
.home-hero{text-align:center;padding:24px 0 16px}
.home-hero h2{font-size:22px;font-weight:700;color:var(--navy)}
.home-hero p{font-size:14px;color:var(--gray);margin-top:6px}
.home-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.home-search-wrap{position:relative;flex:1;min-width:180px;max-width:320px}
.home-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#9ca3af;pointer-events:none;font-size:14px}
.home-search{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:#fff;transition:border-color .15s}
.home-search:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(30,86,160,.1)}
.view-toggle{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;flex-shrink:0}
.view-toggle-btn{padding:0 13px;height:32px;font-size:15px;background:#fff;border:none;cursor:pointer;color:var(--gray);line-height:1;transition:all .15s;display:flex;align-items:center}
.view-toggle-btn.active{background:var(--navy);color:#fff}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:24px}
.proj-list{display:flex;flex-direction:column;gap:5px;margin-bottom:24px}
.proj-card{background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.proj-card:hover{border-color:var(--blue);box-shadow:0 4px 14px rgba(30,86,160,.12);transform:translateY(-1px)}
.proj-card-name{font-size:15px;font-weight:600;color:var(--navy);margin-bottom:3px}
.proj-card-client{font-size:12px;color:var(--gray);margin-bottom:10px}
.loc-strip{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:10px}
.loc-dot{height:6px;border-radius:3px;flex:1;min-width:12px;max-width:36px;background:#e5e7eb}
.loc-dot.complete{background:var(--green)}.loc-dot.progress{background:var(--amber)}.loc-dot.attention{background:var(--red)}
.proj-card-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.proj-card-stat{font-size:11px;padding:3px 9px;border-radius:12px;font-weight:500}
.stat-green{background:var(--green-bg);color:var(--green)}.stat-amber{background:var(--amber-bg);color:var(--amber)}
.stat-red{background:var(--red-bg);color:var(--red)}.stat-gray{background:var(--gray-bg);color:var(--gray)}
.proj-card-date{font-size:11px;color:#9ca3af;margin-left:auto}
.new-proj-card{background:#fff;border:2px dashed var(--border);border-radius:var(--r-lg);padding:18px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:130px;gap:8px;color:var(--gray)}
.new-proj-card:hover{border-color:var(--blue);color:var(--blue)}
.new-proj-icon{font-size:28px}.new-proj-lbl{font-size:13px;font-weight:500}
.proj-list-row{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:11px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .15s;box-shadow:var(--shadow)}
.proj-list-row:hover{border-color:var(--blue);box-shadow:0 2px 8px rgba(30,86,160,.1)}
.proj-list-name{font-size:13px;font-weight:600;color:var(--navy);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.proj-list-meta{font-size:11px;color:var(--gray);width:180px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.proj-list-locs{font-size:11px;color:#9ca3af;white-space:nowrap;flex-shrink:0}
.home-no-results{text-align:center;padding:28px 0;color:var(--gray);font-size:13px}
/* FORMS */
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:500;color:#374151;margin-bottom:5px}
.fg input,.fg textarea,.fg select{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:6px;font-size:13px;transition:border-color .15s;-webkit-text-size-adjust:100%}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(30,86,160,.1)}
.fg textarea{resize:vertical;min-height:52px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sdiv{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--gray);margin:16px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
/* LOCATION LIST */
.loc-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.loc-item{display:flex;align-items:center;gap:8px;background:var(--gray-bg);border:1px solid var(--border);border-radius:6px;padding:7px 10px}
.loc-num{font-size:11px;font-weight:700;color:var(--gray);width:20px;text-align:center;flex-shrink:0}
.loc-inp{flex:1;padding:6px 9px;border:1px solid var(--border);border-radius:4px;font-size:13px;background:#fff}
.loc-inp:focus{outline:none;border-color:var(--blue)}
.loc-del{background:none;border:none;color:#9ca3af;cursor:pointer;font-size:18px;line-height:1;padding:2px 4px;border-radius:3px}
.loc-del:hover{color:var(--red)}
.loc-add-btn{display:flex;align-items:center;gap:6px;padding:9px 12px;border:2px dashed var(--border);border-radius:6px;background:#fff;color:var(--blue);font-size:13px;font-weight:500;cursor:pointer;width:100%;justify-content:center;transition:all .15s}
.loc-add-btn:hover{border-color:var(--blue);background:#eff6ff}
/* TRADE PICKER */
.cat-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--gray);margin:14px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.trade-pick{border:1px solid var(--border);border-radius:8px;margin-bottom:6px;overflow:hidden;transition:border-color .15s}
.trade-pick.sel{border-color:var(--blue)}
.trade-pick-top{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;user-select:none;background:#fff}
.trade-pick-top:hover{background:#f8faff}
.trade-pick.sel .trade-pick-top{background:#eff6ff}
.trade-pick-top input[type=checkbox]{width:18px;height:18px;accent-color:var(--blue);flex-shrink:0}
.tpname{font-size:15px;font-weight:600;flex:1}
/* PROJECT VIEW */
.proj-info-bar{background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);margin:6px 0 12px;padding:14px 18px;box-shadow:var(--shadow);display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start}
.proj-info-col{display:flex;flex-direction:column;gap:5px;flex:1;min-width:140px}
.pf{display:flex;align-items:baseline;gap:6px}
.pf label{font-size:11px;font-weight:700;color:#374151;white-space:nowrap;min-width:54px}
.pf span{font-size:12px;color:#1a202c}
.proj-info-stats{border-left:1px solid var(--border);padding:0 0 0 20px;display:flex;gap:20px;align-items:center;flex-shrink:0}
.proj-stat{text-align:center}
.proj-stat-num{font-size:24px;font-weight:700;line-height:1;color:var(--navy)}
.proj-stat-lbl{font-size:10px;color:var(--gray);margin-top:2px;white-space:nowrap}
/* MATRIX */
.matrix-wrap{background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow);margin-bottom:16px}
.matrix-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.matrix-title{font-size:13px;font-weight:700;color:var(--navy)}
.matrix-legend{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.m-leg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--gray)}
.m-leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.matrix-scroll{overflow-x:auto}
.matrix-table{width:100%;border-collapse:collapse;min-width:500px}
.matrix-table th{padding:9px 12px;text-align:left;font-size:11px;font-weight:700;color:#374151;background:var(--gray-bg);border-bottom:2px solid var(--border);white-space:nowrap}
.matrix-table th.loc-col{width:170px;position:sticky;left:0;z-index:2;background:var(--gray-bg)}
.matrix-table td{padding:0;border-bottom:1px solid var(--border);border-right:1px solid #f3f4f6}
.matrix-table td.loc-name-cell{padding:10px 14px;position:sticky;left:0;background:#fff;z-index:1;border-right:2px solid var(--border);min-width:170px}
.loc-name-text{font-size:13px;font-weight:600;color:var(--navy)}
.loc-name-badge{margin-top:4px}
.matrix-cell{padding:8px 6px;cursor:pointer;transition:background .1s;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:58px;min-width:80px}
.matrix-cell:hover{background:#f0f4ff}
.matrix-cell.not-applicable{background:#fafafa;cursor:default}.matrix-cell.not-applicable:hover{background:#fafafa}
.cell-circle{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border:2px solid;flex-shrink:0}
.cell-circle.approved{background:var(--green);border-color:var(--green);color:#fff}
.cell-circle.progress{background:var(--amber-bg);border-color:var(--amber);color:var(--amber)}
.cell-circle.attention{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.cell-circle.pending{background:#fff;border-color:#d1d5db;color:#c4c9d4}
.cell-circle.na{background:#f9fafb;border-color:#e5e7eb;color:#d1d5db}
.cell-lbl{font-size:9px;color:var(--gray);line-height:1.2;text-align:center}
/* BADGE */
.badge{font-size:10px;font-weight:700;white-space:nowrap;letter-spacing:.03em;text-transform:uppercase;display:inline-flex;align-items:center;justify-content:center;line-height:16px;padding:2px 0;border-radius:5px;flex-shrink:0;vertical-align:middle;width:68px;text-align:center}
.badge-done{background:#bbf7d0;color:#15803d}
.badge-prog{background:#fde68a;color:#b45309}
.badge-rej{background:#fecaca;color:#dc2626}
.badge-pending{background:#dbeafe;color:#1d4ed8}
.badge-setup{background:#ede9fe;color:#6d28d9}
.badge-nosub{background:#fed7aa;color:#c2410c}
.badge-empty{background:#e2e8f0;color:#475569}
/* TRADE DETAIL */
.trd-hdr{background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 18px;margin-bottom:12px;box-shadow:var(--shadow);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.trd-title{font-size:16px;font-weight:700;color:var(--navy)}
.trd-loc{font-size:12px;color:var(--gray);margin-top:2px}
/* CHECKPOINT TIMELINE */
.cp-timeline{display:flex;align-items:flex-start;padding:14px 18px 14px;overflow-x:auto;gap:0}
.cp-node{display:flex;flex-direction:column;align-items:center;flex-shrink:0;padding-bottom:10px;cursor:pointer}
.cp-node:hover .cp-circ{filter:brightness(.92)}
.cp-connector{display:flex;align-items:center;flex-shrink:0;margin-top:17px}
.cp-line{height:2px;width:20px;background:#e5e7eb}
.cp-line.ok{background:var(--green)}.cp-line.rej{background:var(--red)}.cp-line.sub{background:var(--amber)}
.cp-circ{width:34px;height:34px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:2px solid;transition:all .2s;line-height:1.1}
.cp-circ.pending{border-color:#d1d5db;background:#fff;color:#9ca3af}
.cp-circ.approved{border-color:var(--green);background:var(--green);color:#fff}
.cp-circ.rejected{border-color:var(--red);background:var(--red-bg);color:var(--red)}
.cp-circ.sub_done{border-color:var(--amber);background:var(--amber-bg);color:var(--amber)}
.cp-type-badge{font-size:8px;font-weight:700;letter-spacing:.3px;opacity:.8}
.cp-lbl{font-size:9px;color:#6b7280;margin-top:4px;text-align:center;max-width:72px;line-height:1.3;word-break:break-word}
.cp-lbl.approved{color:var(--green);font-weight:600}.cp-lbl.rejected{color:var(--red);font-weight:600}
.cp-lbl.sub_done{color:var(--amber);font-weight:600}
/* CHECKPOINT CONFIGURATOR */
.cp-cfg-section{margin-bottom:16px}
.cp-cfg-hdr{font-size:12px;font-weight:700;color:var(--navy);padding:8px 10px;background:var(--gray-bg);border-radius:6px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.cp-cfg-hdr input[type=checkbox]{width:16px;height:16px;accent-color:var(--blue);flex-shrink:0;cursor:pointer}
.cp-cfg-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;padding:2px 0}
.cp-cfg-row input[type=checkbox]{width:15px;height:15px;accent-color:var(--blue);flex-shrink:0;cursor:pointer}
.cp-cfg-lbl{flex:1;font-size:12px;color:#374151}
.cp-cfg-inp{flex:1;font-size:12px;color:#374151;border:1px solid #e2e8f0;border-radius:4px;padding:3px 6px;background:#fff;min-width:0}
.cp-cfg-inp:focus{outline:none;border-color:var(--blue)}
/* Spec / product record */
.spec-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #f1f5f9}
.spec-left{flex:1;min-width:0}
.spec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#6b7280;margin-bottom:4px}
.spec-inp{width:100%;border:1.5px solid #e2e8f0;border-radius:6px;font-size:13px;padding:6px 9px;color:#1e293b;background:#f8fafc}
.spec-inp:focus{outline:none;border-color:var(--blue);background:#fff}
.spec-inp::placeholder{color:#9ca3af;font-size:12px}
.spec-value{font-size:13px;color:#1e293b;padding:3px 0}
.spec-photo-slot{flex-shrink:0;width:56px}
.spec-thumb{width:56px;height:50px;border-radius:6px;object-fit:cover;border:1.5px solid #e2e8f0;cursor:pointer;display:block}
.spec-photo-add{width:72px;height:62px;border:1.5px dashed #cbd5e1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:#f8fafc;gap:2px;transition:all .15s}
.spec-photo-add:hover{border-color:var(--blue);background:#eff6ff}
.spec-photo-add .sp-icon{font-size:20px;line-height:1}
.spec-photo-add small{font-size:10px;color:#64748b;font-weight:600}
.spec-section-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#6d28d9;background:#ede9fe;border-radius:4px;padding:3px 9px;display:inline-block;margin:14px 0 8px}
.cp-cfg-rm{border:none;background:none;color:#9ca3af;cursor:pointer;font-size:16px;padding:0 2px;line-height:1}
.cp-cfg-rm:hover{color:var(--red)}
.cp-cfg-add{background:none;border:none;color:var(--blue);font-size:12px;cursor:pointer;padding:3px 0;display:flex;align-items:center;gap:4px}
.cp-cfg-add:hover{text-decoration:underline}
/* YES/NO/NA */
.yna-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px}
.yna-row:hover{background:var(--gray-bg)}
.yna-lbl{font-size:13px;flex:1;line-height:1.4}
.yna-btns{display:flex;gap:3px;flex-shrink:0}
.yna-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:#fff;font-size:11px;font-weight:600;cursor:pointer;color:#9ca3af;transition:all .15s;white-space:nowrap}
.yna-btn:hover{border-color:#9ca3af;color:#374151}
.yna-btn.yes.active{background:var(--green);border-color:var(--green);color:#fff}
.yna-btn.no.active{background:var(--red);border-color:var(--red);color:#fff}
.yna-btn.na.active{background:#6b7280;border-color:#6b7280;color:#fff}
/* PASS/FAIL BUTTONS (new 2-layer system) */
.pf-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:#fff;font-size:11px;font-weight:600;cursor:pointer;color:#9ca3af;transition:all .15s;white-space:nowrap}
.pf-btn:hover{border-color:#9ca3af;color:#374151}
.pf-btn.active.pass{background:var(--green);border-color:var(--green);color:#fff}
.pf-btn.active.fail{background:var(--red);border-color:var(--red);color:#fff}
.pf-btn.active.na{background:#6b7280;border-color:#6b7280;color:#fff}
/* ITEM ROW */
.item-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid #f1f5f9;background:#fff;min-width:0;overflow:hidden}
.item-row:last-child{border-bottom:none}
.item-row.flagged{background:#fff7f7}
.item-row.fail-row{background:#fef2f2}
.item-group-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;padding:8px 10px 4px;background:#f8fafc;border-bottom:1px solid #edf0f5}
.flag-btn{background:none;border:none;font-size:15px;cursor:pointer;color:#d1d5db;padding:0 3px;line-height:1;flex-shrink:0}
.flag-btn.active{color:var(--red)}
/* TASK SETUP FULL-SCREEN PAGE */
.ts-page{display:flex;flex-direction:column;height:calc(100vh - 56px);background:#f1f4f8;overflow:hidden;max-width:900px;margin:0 auto;width:100%}
.ts-details-strip{background:#fff;border-bottom:1px solid #e2e8f0;padding:10px 16px;flex-shrink:0}
.ts-details-row{display:flex;gap:12px;align-items:flex-end}
.ts-fg-name{flex:2;min-width:0}.ts-fg-trade{flex:2;min-width:0}.ts-fg-scope{flex:3;min-width:0}
.ts-body{display:flex;flex:1;min-height:0;overflow:hidden;gap:0}
/* Left: 3-column picker */
.ts-picker-wrap{display:flex;flex-direction:column;width:50%;flex-shrink:0;border-right:2px solid #e2e8f0;overflow:hidden;background:#fff}
.ts-panel-hdr{padding:8px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #ddd6fe;flex-shrink:0;display:flex;align-items:center;gap:6px;color:#5b21b6;background:#ede9fe}
/* --- 2-column picker: Group | Items (locked to task's trade) --- */
.ts-3col{display:flex;flex:1;min-height:0;overflow:hidden}
.ts-col{display:flex;flex-direction:column;border-right:1px solid #d1d9e6;overflow-y:auto}
.ts-col:last-child{border-right:none}
.ts-pcol-group{width:190px;flex-shrink:0;background:#f4f6f9}
.ts-pcol-items{flex:1;min-width:0;background:#f0f7ff}
/* Active column header strip */
.ts-col-hdr{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:7px 10px 6px;flex-shrink:0;border-bottom:1px solid #dde3ec;background:inherit;color:#475569;position:sticky;top:0;z-index:1}
.ts-pcol-trade .ts-col-hdr{background:#e4eaf3;border-bottom-color:#cbd5e0}
.ts-pcol-group .ts-col-hdr{background:#e6eaf0;border-bottom-color:#cdd3de;color:#374151}
/* Step number badge used in column headers */
.ts-step{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;font-size:10px;font-weight:800;flex-shrink:0;line-height:1}
.ts-list-btn{display:flex;align-items:center;justify-content:space-between;gap:6px;width:100%;text-align:left;padding:9px 12px;border:none;background:none;font-size:13px;cursor:pointer;color:#374151;border-bottom:1px solid rgba(0,0,0,.05);white-space:normal;line-height:1.4}
.ts-list-btn:hover{background:rgba(59,130,246,.07);color:var(--blue)}
.ts-list-btn.active{background:#fff;color:#1d4ed8;font-weight:600;border-left:3px solid #3b82f6;padding-left:9px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.ts-grp-count{font-size:10px;font-weight:700;color:#fff;background:#94a3b8;border-radius:8px;padding:1px 6px;flex-shrink:0;line-height:1.5}
.ts-list-btn.active .ts-grp-count{background:#3b82f6}
.ts-check-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid #f0f2f5;cursor:pointer}
.ts-check-item:hover{background:#f0f7ff}
.ts-check-item.sel{background:#f0fdf4}
.ts-check-item input[type=checkbox]{flex-shrink:0;cursor:pointer;width:14px;height:14px;accent-color:#3b82f6}
.ts-check-label{flex:1;font-size:12px;color:#1e293b;line-height:1.3}
.ts-check-type{font-size:10px;color:#94a3b8;white-space:nowrap}
/* Right: added items */
.ts-added-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#faf7ff}
.ts-item-count{background:var(--blue);color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700;line-height:1.6}
.ts-added-body{flex:1;overflow-y:auto;padding:10px 14px;scrollbar-gutter:stable}
.ts-page-foot{display:flex;align-items:center;gap:8px;padding:10px 16px;border-top:1px solid #e2e8f0;background:#fff;flex-shrink:0}
.ts-del-btn{background:none;border:none;font-size:12px;color:#ef4444;cursor:pointer;padding:0;text-decoration:underline}
.ts-empty{font-size:12px;color:#94a3b8;padding:32px 20px;text-align:center;line-height:1.8}
/* Added item rows */
.added-item-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid #e8edf5;border-radius:6px;margin-bottom:4px;background:#fff}
.added-item-num{font-size:10px;color:#94a3b8;width:16px;text-align:right;flex-shrink:0}
.added-item-icon{font-size:12px;width:16px;text-align:center;flex-shrink:0}
.added-item-info{flex:1;min-width:0}
.added-item-label{font-size:12px;font-weight:500;color:#1e293b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.added-item-label-input{width:100%;border:none;background:transparent;font-size:12px;font-weight:500;color:#1e293b;font-family:inherit;padding:0;outline:none;line-height:1.3}
.added-item-label-input:hover{background:#f0f4fa;border-radius:3px;padding:0 3px;margin:0 -3px}
.added-item-label-input:focus{background:#fff;border:1px solid var(--blue);border-radius:4px;padding:1px 5px;margin:0 -6px;box-shadow:0 0 0 2px rgba(30,86,160,.1)}
.added-item-type{font-size:10px;color:#94a3b8}
.added-item-del{background:none;border:none;color:#d1d5db;cursor:pointer;font-size:16px;padding:0 2px;line-height:1;flex-shrink:0}
.added-item-del:hover{color:#ef4444}
.added-section-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#94a3b8;padding:10px 8px 4px;margin-top:2px;border-top:1px solid #e8edf4;border-left:3px solid transparent}
.added-section-hdr:first-child{border-top:none;padding-top:2px}
.added-section-hdr.pm{color:#7c3aed;border-left-color:#7c3aed}
.added-section-hdr.warranty{color:#b45309;border-left-color:#f59e0b}
.drag-handle{color:transparent;cursor:grab;font-size:14px;flex-shrink:0;padding:0 1px;user-select:none;line-height:1;transition:color .15s}
.drag-handle:active{cursor:grabbing}
.added-item-row:hover .drag-handle{color:#94a3b8}
.added-item-row.is-dragging{opacity:0.35;border-style:dashed}
.added-item-row.drag-over{border-color:#3b82f6;background:#eff6ff;box-shadow:0 0 0 2px #bfdbfe}
@media(max-width:640px){
  .ts-details-row{flex-wrap:wrap}
  .ts-fg-name,.ts-fg-trade,.ts-fg-scope{flex:1 1 100%}
  .ts-body{flex-direction:column}
  .ts-picker-wrap{width:100%;height:55%;border-right:none;border-bottom:2px solid #e2e8f0}
  .ts-pcol-group{width:140px}
  /* Touch-friendly targets */
  .ts-list-btn{padding:12px 12px;min-height:44px}
  .ts-check-item{padding:11px 10px;min-height:44px}
  .ts-check-item input[type=checkbox]{width:20px;height:20px}
  .pf-btn{padding:8px 10px;min-height:40px;font-size:13px}
  .btn-sm{padding:9px 14px;min-height:40px}
  .item-row{padding:10px 10px;min-height:44px}
  .added-item-row{padding:10px 10px;min-height:44px}
  .added-item-del{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:18px}
  .acc-task-hdr{padding:12px 14px;min-height:48px}
  .acc-task-name{font-size:15px}
  .modal{margin:8px;border-radius:10px}
  .m-body{padding:14px}
  .p-thumb-sm{width:56px;height:56px}
  .p-add-sm{width:56px;height:56px}
  /* Prevent double-tap zoom on buttons */
  button,label,a{touch-action:manipulation}
}
/* SUB ANSWER BADGES (PM view) */
.sub-ans{display:inline-flex;align-items:center;justify-content:center;min-width:28px;height:22px;border-radius:4px;font-size:11px;font-weight:700;flex-shrink:0;padding:0 5px}
.sub-ans.y{background:var(--green-bg);color:var(--green)}
.sub-ans.n{background:var(--red-bg);color:var(--red)}
.sub-ans.na{background:var(--gray-bg);color:var(--gray)}
/* PHOTOS */
.photo-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.p-wrap{position:relative;display:inline-block}
.p-thumb{width:80px;height:80px;object-fit:cover;border-radius:6px;border:1px solid var(--border);display:block;cursor:pointer}
.p-del{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--red);color:#fff;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;line-height:1}
.p-add{width:80px;height:80px;border-radius:6px;border:2px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--gray);font-size:11px;gap:3px;transition:all .15s;user-select:none;background:#fafafa}
.p-add:hover{border-color:var(--blue);color:var(--blue);background:#eff6ff}
.p-icon{font-size:20px;line-height:1}
.photo-group{background:var(--gray-bg);border-radius:8px;padding:10px 12px;margin-bottom:10px}
.photo-group-lbl{font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.photo-group.before .photo-group-lbl{color:#b45309}
.photo-group.after .photo-group-lbl{color:var(--blue)}
.photo-group.pm-photos .photo-group-lbl{color:var(--navy)}
.photo-split{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.photo-split .photo-group{margin-bottom:0}
.p-thumb-sm{width:64px;height:64px;object-fit:cover;border-radius:6px;border:1px solid var(--border);display:block;cursor:pointer}
.p-add-sm{width:64px;height:64px;border-radius:6px;border:2px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--gray);font-size:10px;gap:2px;transition:all .15s;user-select:none;background:#fafafa}
.p-add-sm:hover{border-color:var(--blue);color:var(--blue);background:#eff6ff}
/* SIGN-OFF SECTION */
.so-section{margin:0 0 14px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.so-row{padding:10px 14px;border-radius:7px;background:var(--gray-bg);display:flex;align-items:center;justify-content:space-between;gap:10px}
.so-row.done{background:var(--green-bg)}
.so-info{font-size:12px;color:var(--gray)}
.so-info.done-txt{color:var(--green);font-weight:500}
/* HISTORY LOG */
.history-log{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.log-row{display:flex;align-items:center;gap:7px;font-size:11px;padding:3px 0;border-bottom:1px solid #f3f4f6;color:#374151}
.log-row:last-child{border-bottom:none}
.log-role{font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.log-role.sub{background:var(--amber-bg);color:var(--amber)}.log-role.pm{background:var(--green-bg);color:var(--green)}
/* MODAL */
@keyframes overlay-in{from{background:rgba(0,0,0,0)}to{background:rgba(0,0,0,.5)}}
@keyframes modal-in{from{opacity:0;transform:translateY(18px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto;animation:overlay-in .25s ease-out;overscroll-behavior:contain}
.modal{background:#fff;border-radius:var(--r-lg);width:100%;max-width:520px;box-shadow:var(--shadow-lg);overflow:hidden;margin:auto;display:flex;flex-direction:column;max-height:88vh;animation:modal-in .35s cubic-bezier(.22,.68,0,1.1)}
.m-hdr{padding:14px 18px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--border);flex-shrink:0;min-height:62px}
.m-hdr.navy{background:var(--navy);color:#fff;border-bottom-color:rgba(255,255,255,.12)}
.m-hdr.amber{background:#fffbeb;border-bottom-color:#fcd34d;color:#92400e}
.m-hdr.green-light{background:#f0fdf4;border-bottom-color:#6ee7b7;color:#065f46}
.m-hdr h2{font-size:15px;font-weight:600;margin:0}
.m-hdr p{font-size:11px;color:#64748b;margin-top:2px}
.m-hdr.navy p{color:rgba(255,255,255,.65)}
.m-hdr.amber p,.m-hdr.green-light p{opacity:.7}
.m-close{background:none;border:none;font-size:20px;cursor:pointer;padding:0;line-height:1;color:inherit;opacity:.6;margin-left:10px;flex-shrink:0}
.m-close:hover{opacity:1}
.m-body{padding:18px;overflow-y:auto;flex:1}
.m-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:#fafafa;flex-shrink:0;min-height:56px;align-items:center}
.m-foot .btn{min-width:80px;justify-content:center}
.m-section{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--navy);background:#e4ecf5;margin:18px -18px 14px;padding:7px 18px;border-top:2px solid #94a3b8;border-bottom:1px solid #b8cce0}
/* ACTIONS VIEW */
.act-toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.act-select{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:#fff;color:#374151;cursor:pointer}
.act-group{margin-bottom:16px}
.act-group-hdr{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--gray-bg);border-radius:var(--r) var(--r) 0 0;border:1px solid var(--border);border-bottom:none}
.act-group-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#374151;flex:1}
.act-group-count{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--border);color:var(--gray)}
.act-group-count.has-red{background:var(--red-bg);color:var(--red)}
.act-group-count.has-amber{background:var(--amber-bg);color:var(--amber)}
.act-card{background:#fff;border:1px solid var(--border);border-top:none;padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s}
.act-card:last-child{border-radius:0 0 var(--r) var(--r)}
.act-card:hover{background:#f8faff;border-color:var(--blue)}
.act-card.red{border-left:3px solid var(--red)}
.act-card.amber{border-left:3px solid var(--amber)}
.act-card.green{border-left:3px solid var(--green);cursor:default}
.act-card.green:hover{background:#fff;border-color:var(--border);border-left-color:var(--green)}
.act-card-left{flex:1;min-width:0}
.act-card-title{font-size:13px;font-weight:600;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.act-card-meta{font-size:11px;color:var(--gray);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.act-card-note{font-size:11px;color:var(--red);margin-top:2px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.act-card-badge{flex-shrink:0}
.act-arrow{font-size:14px;color:#d1d5db;flex-shrink:0}
.act-card:hover .act-arrow{color:var(--blue)}
.act-empty{text-align:center;padding:40px 20px;color:var(--gray)}
.act-empty-icon{font-size:32px;margin-bottom:10px}
.act-empty-title{font-size:15px;font-weight:600;color:var(--navy);margin-bottom:4px}
.act-empty-sub{font-size:12px}
.act-summary{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.act-sum-card{flex:1;min-width:100px;background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;box-shadow:var(--shadow);cursor:pointer;transition:box-shadow .15s,border-color .15s}
.act-sum-card:hover{box-shadow:var(--shadow-lg)}
.act-sum-card.active{border-color:currentColor;box-shadow:0 0 0 2px currentColor}
.act-sum-num{font-size:22px;font-weight:700;line-height:1}
.act-sum-lbl{font-size:11px;color:var(--gray);margin-top:2px}
/* TEMPLATES VIEW */
.tmpl-layout{display:grid;grid-template-columns:210px 1fr;gap:14px;align-items:start}
.tmpl-sidebar-wrap{position:sticky;top:60px}
.tmpl-sidebar{background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow)}
.tmpl-sidebar-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 10px 8px 14px;background:#fff;border-bottom:1px solid var(--border)}
.tmpl-sidebar-hdr-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--navy)}
.tmpl-section-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#fff;background:var(--navy);padding:6px 14px;border-bottom:1px solid var(--border)}
.tmpl-cat-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--navy);padding:8px 14px 5px;background:#e8eef5;border-bottom:1px solid var(--border);border-top:1px solid var(--border)}
.tmpl-trade-row{padding:9px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between;transition:background .1s;color:#374151}
.tmpl-trade-row:last-child{border-bottom:none}
.tmpl-trade-row:hover{background:#f8faff}
.tmpl-trade-row.active{background:#eff6ff;color:var(--blue);font-weight:600}
.tmpl-trade-count{font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px;background:var(--gray-bg);color:var(--gray)}
.tmpl-trade-row.active .tmpl-trade-count{background:#dbeafe;color:var(--blue)}
.tmpl-main{}
.tmpl-main-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 0 8px;z-index:15;background:#d8e0ea;margin-bottom:4px;position:sticky;top:52px}
.tmpl-main-title{font-size:15px;font-weight:700;color:var(--navy)}
.tmpl-card{background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden}
.tmpl-card-hdr{padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);background:#fafafa}
.tmpl-card-name{font-size:13px;font-weight:600;color:var(--navy);flex:1}
.tmpl-card-actions{display:flex;gap:5px}
.tmpl-card-body{padding:10px 14px}
.tmpl-item{font-size:12px;color:#374151;padding:4px 0;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;gap:6px}
.tmpl-item:last-child{border-bottom:none}
.tmpl-item-dot{width:4px;height:4px;border-radius:50%;background:#d1d5db;flex-shrink:0}
.tmpl-spec-section{margin-top:8px;padding-top:8px;border-top:1px dashed #e2e8f0}
.tmpl-spec-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#6d28d9;margin-bottom:5px}
.tmpl-spec-field{font-size:12px;color:#374151;padding:3px 0;display:flex;align-items:center;gap:6px}
.tmpl-spec-dot{color:#a78bfa;font-size:14px;line-height:1;flex-shrink:0}
.tmpl-empty{text-align:center;padding:40px 20px;color:var(--gray);background:#fff;border:1px solid var(--border);border-radius:var(--r-lg)}
@media(max-width:640px){.tmpl-layout{grid-template-columns:1fr}}
/* BREADCRUMB */
.bc{font-size:11px;min-height:27px}
.bc-wrap{max-width:800px;margin:0 auto;padding:8px 14px 6px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.bc-item{color:var(--blue);cursor:pointer;transition:color .1s}
.bc-item:hover{text-decoration:underline}
.bc-sep{color:#6b7280;font-weight:700;user-select:none}
.bc-current{color:#374151;font-weight:600}
/* RESPONSIVE */
@media(max-width:640px){
  .row2{grid-template-columns:1fr}
  .overlay{padding:0;align-items:flex-end}
  .modal{border-radius:var(--r-lg) var(--r-lg) 0 0;max-height:92vh}
  .proj-info-stats{border-left:none;padding:10px 0 0;border-top:1px solid var(--border);width:100%}
}
/* ACCORDION */
.acc-loc{background:#f0f4fa;border:1px solid #c8d6e8;border-radius:var(--r-lg);margin-bottom:12px;box-shadow:var(--shadow);overflow:clip;transition:border-color .15s}
.acc-loc.drag-over-loc,[id^="tg-"].drag-over-loc{border-color:var(--blue)!important;box-shadow:0 0 0 3px rgba(30,86,160,.15)!important}
.acc-loc-hdr{display:flex;align-items:center;gap:9px;padding:13px 16px;cursor:pointer;user-select:none;background:var(--navy);border-bottom:none}
.acc-loc-hdr.closed{border-bottom:none}
.acc-loc-name{font-size:14px;font-weight:700;color:#fff;flex:1}
.acc-loc-hdr .drag-hdl{color:rgba(255,255,255,.4)}
.acc-loc-hdr .drag-hdl:hover{color:rgba(255,255,255,.8)}
.acc-loc-hdr .acc-toggle{color:rgba(255,255,255,.6)}
.acc-loc-hdr .badge{font-size:11px;line-height:16px}
.acc-loc-body{padding:12px 14px 14px;background:#f0f4fa}
.acc-task{border:1px solid #c8d6e8;border-left:4px solid var(--blue);border-radius:var(--r);margin-bottom:8px;background:#fff;overflow:hidden;transition:border-color .15s}
.acc-task.drag-over{border-color:var(--blue);background:#f0f6ff}
.acc-task-hdr{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;user-select:none;background:#fff}
.acc-task-hdr:hover{background:#f5f8ff}
.acc-task-hdr.open{background:#eef3ff}
.acc-task-name{font-size:14px;font-weight:600;color:var(--navy);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.acc-task-trade{font-size:10px;color:var(--gray);background:rgba(255,255,255,.8);border:1px solid #d0dcea;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.acc-task-body{padding:10px 14px 12px;border-top:1px solid #dde5f0;background:#f5f8ff}
.acc-lbl-sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#94a3b8;margin:10px 0 4px;padding-left:2px}
.acc-lbl-sec:first-child{margin-top:0}
.acc-task-scope{padding:4px 12px 4px 14px;font-size:11px;color:#64748b;background:#f8fafc;border-top:1px solid #ecf0f8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sub-pill{display:inline-block;background:#e8edf5;color:var(--navy);border-radius:20px;font-size:10px;font-weight:700;padding:2px 10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;vertical-align:middle}
.sub-pill.inv{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.25)}
.etm-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#94a3b8;display:block;margin-bottom:3px}
.sub-panel{border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.sub-panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--gray-bg);cursor:pointer;user-select:none;transition:background .1s}
.sub-panel-hdr:hover{background:#eef2f8}
.sub-panel-body{display:flex;flex-wrap:wrap;gap:8px;padding:10px 12px;background:#fff;border-top:1px solid var(--border)}
.sub-card{flex:1;min-width:180px;max-width:280px;border:1px solid var(--border);border-radius:6px;padding:8px 10px;background:#fafbfc}
.sub-card-top{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:5px}
.sub-card-name{font-size:12px;font-weight:700;color:var(--navy)}
.sub-card-contact{font-size:11px;color:var(--blue);text-decoration:none;word-break:break-all}
.sub-card-contact:hover{text-decoration:underline}
.sub-card-trades{display:flex;flex-wrap:wrap;gap:4px}
.sub-trade-tag{font-size:10px;padding:2px 7px;background:#e8eef8;border-radius:4px;color:#374151;white-space:nowrap}
.sub-trade-tag em{font-style:normal;color:#6b7280}
.acc-sub-info{font-size:11px;color:var(--gray);margin-bottom:10px;padding:6px 10px;background:#f8fafc;border-radius:5px;border:1px solid #dde5f0;display:flex;align-items:center;justify-content:space-between;gap:8px}
.acc-sub-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.drag-hdl{color:#d1d5db;cursor:grab;font-size:16px;flex-shrink:0;line-height:1;padding:0 2px;touch-action:none}
.drag-hdl:hover{color:#9ca3af}
.drag-hdl:active{cursor:grabbing}
.acc-toggle{font-size:11px;color:#9ca3af;flex-shrink:0;width:14px;text-align:center}
.acc-cp-list{margin-bottom:8px}
.acc-cp-row{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:5px;cursor:pointer;border:1px solid transparent;margin-bottom:3px;background:#fff;transition:all .12s}
.acc-cp-row:hover{background:#f0f4ff;border-color:#dce8ff}
.acc-cp-circ{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid;flex-shrink:0}
.acc-cp-circ.approved{background:var(--green);border-color:var(--green);color:#fff}
.acc-cp-circ.sub_done{background:var(--amber-bg);border-color:var(--amber);color:var(--amber)}
.acc-cp-circ.rejected{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.acc-cp-circ.pending{background:#fff;border-color:#d1d5db;color:#d1d5db}
.acc-cp-name{font-size:13px;color:#374151;flex:1}
.acc-task-hdr .badge{line-height:16px}

  const el = e.target;

// ── LIB_OVERRIDES — per-trade customisations layered on top of ITEM_LIB ──────
// Structure: { [tradeType]: { groups: [{id, name, items:[{id,label,type}]}] } }
// Stored in localStorage key 'nga_a1_lib_overrides'
const LIB_OV_KEY = 'nga_a1_lib_overrides';
let LIB_OVERRIDES = {};
function loadLibOverrides(){
  try{ LIB_OVERRIDES=JSON.parse(localStorage.getItem(LIB_OV_KEY))||{}; }catch{ LIB_OVERRIDES={}; }
}
function saveLibOverrides(){
  localStorage.setItem(LIB_OV_KEY, JSON.stringify(LIB_OVERRIDES));
}
loadLibOverrides();

// Deep-clone a lib entry so mutations don't corrupt the original
function _cloneLib(lib){
  return lib ? JSON.parse(JSON.stringify(lib)) : null;
}

// Warranty group auto-appended to every trade in the picker
const WARRANTY_GROUP={
  id:'g_warranty',
  name:'Product & Warranty',
  items:[
    {id:'w_manufacturer',  label:'Manufacturer',      type:'text'},
    {id:'w_product',       label:'Product / Model',   type:'text'},
    {id:'w_serial',        label:'Serial / Batch No.',type:'text'},
    {id:'w_warranty_period',label:'Warranty Period',  type:'text'},
    {id:'w_warranty_expiry',label:'Expiry Date',      type:'date'},
    {id:'w_warranty_link', label:'Warranty Link',     type:'link'},
    {id:'w_document',      label:'Warranty Document', type:'document'},
    {id:'w_product_photo', label:'Product Photo',     type:'photo'},
    {id:'w_notes',         label:'Notes',             type:'text'},
  ]
};

// getTradeLib(tradeType) — returns the effective lib for a trade.
// If an override exists for this trade it is returned directly (full replacement).
// Otherwise falls back to ITEM_LIB[tradeType].
// Always appends the WARRANTY_GROUP at the end if not already present.
function getTradeLib(tradeType){
  const base=LIB_OVERRIDES[tradeType]||ITEM_LIB[tradeType]||null;
  if(!base) return base;
  if(base.groups.some(g=>g.id==='g_warranty')) return base;
  return {groups:[...base.groups, WARRANTY_GROUP]};
}

// resetTradeLib(tradeType) — removes any override so factory defaults are used again.
function resetTradeLib(tradeType){
  delete LIB_OVERRIDES[tradeType];
  saveLibOverrides();
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg, duration, bg){
  let el=document.getElementById('qa-toast');
  if(!el){ el=document.createElement('div'); el.id='qa-toast';
    el.style.cssText='position:fixed;bottom:76px;left:50%;transform:translateX(-50%);padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.25);z-index:9999;max-width:340px;text-align:center;transition:opacity .3s';
    document.body.appendChild(el); }
  el.textContent=msg; el.style.background=bg||'#1e3a5f'; el.style.opacity='1'; el.style.display='block';
  clearTimeout(el._t); el._t=setTimeout(()=>{ el.style.opacity='0'; setTimeout(()=>el.style.display='none',300); }, duration||3000);
}

function loadIndex(){ try{return JSON.parse(localStorage.getItem(IDX_KEY))||[];}catch{return[];} }
function saveIndex(idx){ localStorage.setItem(IDX_KEY,JSON.stringify(idx)); }
function loadProj(id){ try{return JSON.parse(localStorage.getItem(projKey(id)));}catch{return null;} }
function saveProj(id,data){
  try{
    localStorage.setItem(projKey(id),JSON.stringify(data));
  } catch(e){
    if(e.name==='QuotaExceededError'||e.code===22){
      showToast('⚠️ Storage full — some photos may not have saved. Remove old photos or projects to free up space.',6000,'#dc2626');
    } else { throw e; }
  }
}

// ── SUPABASE DATA LAYER ───────────────────────────────────────────────────────

async function sbLoadIndex(){
  if(!CURRENT_USER) return [];
  try{
    const { data, error } = await _sb
      .from('projects')
      .select('id, name, client, address, date, updated_at, locations(count), tasks(trade_type)')
      .order('updated_at', { ascending: false });
    if(error) throw error;
    return (data||[]).map(p=>({
      id:p.id, name:p.name, client:p.client||'', address:p.address||'', date:p.date||'',
      locationCount:p.locations?.[0]?.count||0,
      tradeTypeCount:[...new Set((p.tasks||[]).map(t=>t.trade_type))].length,
      updated:p.updated_at
    }));
  }catch(e){ console.warn('sbLoadIndex:', e); return []; }
}

async function sbLoadProject(id){
  if(!CURRENT_USER || !id) return null;
  try{
    const [projR,locsR,tasksR,itemsR,answersR,contractorsR,specsR] = await Promise.all([
      _sb.from('projects').select('*').eq('id',id).single(),
      _sb.from('locations').select('*').eq('project_id',id).order('sort_order'),
      _sb.from('tasks').select('*').eq('project_id',id).order('sort_order'),
      _sb.from('task_items').select('*').eq('project_id',id).order('sort_order'),
      _sb.from('task_answers').select('*').eq('project_id',id),
      _sb.from('contractors').select('*').eq('project_id',id),
      _sb.from('job_specs').select('*').eq('project_id',id)
    ]);
    if(projR.error || !projR.data) return null;
    const p=projR.data;
    const locations=(locsR.data||[]).map(l=>({
      id:l.id, name:l.name, scope:l.scope||'', order:l.sort_order, prestart:l.prestart||false
    }));
    const trades=(tasksR.data||[]).map(t=>({
      id:t.id, location_id:t.location_id, trade_type:t.trade_type, name:t.name||'',
      pm_only:t.pm_only||false, sub_name:t.sub_name||'', sub_contact:t.sub_contact||'',
      scope:t.scope||'', order:t.sort_order
    }));
    const taskItems=(itemsR.data||[]).map(i=>({
      id:i.id, trade_id:i.task_id, label:i.label, type:i.type,
      group:i.group_name||'', sort_order:i.sort_order
    }));
    const taskData={};
    for(const t of (tasksR.data||[])) taskData[t.id]={ outcome:t.outcome||null, answers:{} };
    for(const a of (answersR.data||[])){
      if(!taskData[a.task_id]) taskData[a.task_id]={ outcome:null, answers:{} };
      taskData[a.task_id].answers[a.task_item_id]={ value:a.value||'', flagged:a.flagged||false, note:a.note||'' };
    }
    const contractors=(contractorsR.data||[]).map(c=>({
      id:c.id, name:c.name, contact:c.contact||'', notes:c.notes||''
    }));
    const jobSpecs={};
    for(const s of (specsR.data||[])){
      jobSpecs[s.trade_type]={
        manufacturer:s.manufacturer||'', product:s.product||'', serialNo:s.serial_no||'',
        warrantyPeriod:s.warranty_period||'', warrantyExpiry:s.warranty_expiry||'',
        warrantyLink:s.warranty_link||'', notes:s.notes||''
      };
    }
    return {
      project:{ id:p.id, name:p.name, client:p.client||'', address:p.address||'',
        pm:p.pm_name||'', date:p.date||'', scope:p.scope||'' },
      locations, trades, taskItems, taskData, contractors, jobSpecs,
      signoffs:{}, clientSignoffs:{}, baPhotos:{}, reportTicks:{}
    };
  }catch(e){ console.warn('sbLoadProject:', e); return null; }
}

async function sbPersist(){
  if(!CURRENT_USER || !CUR_ID || !CUR) return;
  try{
    const p=CUR.project;
    // Upsert project row
    await _sb.from('projects').upsert({
      id:CUR_ID, name:p.name, client:p.client||'', address:p.address||'',
      pm_name:p.pm||'', date:p.date||null, scope:p.scope||'', created_by:CURRENT_USER.id
    });
    // Ensure creator is a PM member
    await _sb.from('project_members').upsert(
      { project_id:CUR_ID, user_id:CURRENT_USER.id, role:'pm', can_see_all:true, trade_types:[] },
      { onConflict:'project_id,user_id', ignoreDuplicates:true }
    );
    // Locations
    if(CUR.locations?.length){
      await _sb.from('locations').upsert(
        CUR.locations.map(l=>({ id:l.id, project_id:CUR_ID, name:l.name,
          scope:l.scope||'', sort_order:l.order||0, prestart:l.prestart||false }))
      );
    }
    // Tasks
    if(CUR.trades?.length){
      await _sb.from('tasks').upsert(
        CUR.trades.map(t=>({ id:t.id, project_id:CUR_ID, location_id:t.location_id,
          trade_type:t.trade_type, name:t.name||'', pm_only:t.pm_only||false,
          sub_name:t.sub_name||'', sub_contact:t.sub_contact||'', scope:t.scope||'',
          sort_order:t.order||0, outcome:(CUR.taskData?.[t.id]?.outcome)||null }))
      );
    }
    // Task items
    if(CUR.taskItems?.length){
      await _sb.from('task_items').upsert(
        CUR.taskItems.map(i=>({ id:i.id, task_id:i.trade_id, project_id:CUR_ID,
          label:i.label, type:i.type, group_name:i.group||'', sort_order:i.sort_order||0 }))
      );
    }
    // Task answers — use item id as stable row id (one answer per item)
    const answers=[];
    for(const [tradeId,tData] of Object.entries(CUR.taskData||{})){
      for(const [itemId,ans] of Object.entries(tData.answers||{})){
        answers.push({ id:itemId, task_item_id:itemId, task_id:tradeId, project_id:CUR_ID,
          value:ans.value||'', flagged:ans.flagged||false, note:ans.note||'',
          updated_by:CURRENT_USER.id });
      }
    }
    if(answers.length) await _sb.from('task_answers').upsert(answers, { onConflict:'id' });
    // Contractors
    if(CUR.contractors?.length){
      await _sb.from('contractors').upsert(
        CUR.contractors.map(c=>({ id:c.id, project_id:CUR_ID, name:c.name,
          contact:c.contact||'', notes:c.notes||'' }))
      );
    }
    // Job specs
    const specs=Object.entries(CUR.jobSpecs||{}).filter(([,s])=>s.manufacturer||s.product||s.warrantyPeriod);
    if(specs.length){
      await _sb.from('job_specs').upsert(
        specs.map(([tt,s])=>({ project_id:CUR_ID, trade_type:tt,
          manufacturer:s.manufacturer||'', product:s.product||'', serial_no:s.serialNo||'',
          warranty_period:s.warrantyPeriod||'', warranty_expiry:s.warrantyExpiry||null,
          warranty_link:s.warrantyLink||'', notes:s.notes||'', updated_by:CURRENT_USER.id })),
        { onConflict:'project_id,trade_type' }
      );
    }
  }catch(e){ console.warn('sbPersist error:', e); }
}

async function syncProjectsFromSupabase(){
  const sbIdx=await sbLoadIndex();
  if(!sbIdx.length) return;
  const localIdx=loadIndex();
  let changed=false;
  for(const sp of sbIdx){
    const li=localIdx.findIndex(p=>p.id===sp.id);
    if(li>=0){ if(new Date(sp.updated)>new Date(localIdx[li].updated||0)){ localIdx[li]=sp; changed=true; } }
    else { localIdx.push(sp); changed=true; }
  }
  if(changed){ saveIndex(localIdx); if(VIEW==='home') renderHome(); }
}

function createProject(projectDetails, locationNames){
  const id = uid();
  const locs = locationNames.map((name,i)=>({id:uid(),name,order:i+1}));
  const trades = [];
  // Auto-create Prestart location + task with full checklist
  const psLocId=uid(),psTaskId=uid();
  const prestartLoc={id:psLocId,name:'Prestart',order:0,prestart:true};
  const prestartTask={id:psTaskId,location_id:psLocId,trade_type:'_prestart',name:'Pre-start Checklist',pm_only:true,sub_name:'',sub_contact:'',scope:'',order:0};
  locs.unshift(prestartLoc);

  CUR={project:{...projectDetails,id},locations:locs,trades,taskItems:[],taskData:{},signoffs:{},clientSignoffs:{},baPhotos:{},reportTicks:{},contractors:[],jobSpecs:{}};
  persist();
  return id;
}

// ── STATUS HELPERS ────────────────────────────────────────────────────────────

// cpStatus is removed — use tradeStatus / taskData directly

function tradeStatus(tradeId){
  if(!CUR) return 'pending';
  const trade = CUR.trades.find(t=>t.id===tradeId);
  const data = (CUR.taskData||{})[tradeId];
  // Always trust an explicit outcome — check it BEFORE item-count heuristics so a
  // completed task never gets mis-classified as 'setup' just because it has no
  // standard checklist items (e.g. only auto-completion / General group items).
  if(data?.outcome==='approved') return 'approved';
  if(data?.outcome==='sub_done') return 'sub_done';
  if(data?.outcome==='rejected') return 'attention';
  const items = (CUR.taskItems||[]).filter(i=>i.trade_id===tradeId);
  // 'setup' if no items at all, or only auto-completion items (General group + photos + PM sign-off)
  const realItems = items.filter(i=>i.type!=='photo_before'&&i.type!=='photo_after'&&i.type!=='pm_signoff'&&i.group!=='General');
  if(!realItems.length) return 'setup';
  // 'no_sub' if task has real items but no subcontractor assigned (PM action needed)
  if(!trade?.pm_only && !trade?.sub_name) return 'no_sub';
  const anyAnswered = items.some(i=>{
    const a=data.answers?.[i.id];
    return a && (a.value||a.photos?.length||a.photo||a.text);
  });
  return anyAnswered ? 'progress' : 'pending';
}

function locationStatus(locId){
  if(!CUR) return 'pending';
  const trades = CUR.trades.filter(t=>t.location_id===locId);
  if(!trades.length) return 'pending';
  const statuses = trades.map(t=>tradeStatus(t.id));
  if(statuses.every(s=>s==='approved')) return 'approved';
  if(statuses.some(s=>s==='attention')) return 'attention';
  if(statuses.some(s=>s==='progress'||s==='sub_done')) return 'progress';
  return 'pending';
}

function resizeAndEncode(file, cb, maxW, maxH, quality){
  maxW=maxW||1200; maxH=maxH||900; quality=quality||0.72;
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    URL.revokeObjectURL(url);
    let w=img.width, h=img.height;
    if(w>maxW){ h=Math.round(h*maxW/w); w=maxW; }
    if(h>maxH){ w=Math.round(w*maxH/h); h=maxH; }
    const c=document.createElement('canvas');
    c.width=w; c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    cb(c.toDataURL('image/jpeg',quality));
  };
  img.src = url;
}

// Upload a warranty document for the job spec (PDF/image → base64)
function uploadJobSpecDoc(input, tradeType){
  const file=input.files?.[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    if(!CUR.jobSpecs) CUR.jobSpecs={};
    if(!CUR.jobSpecs[tradeType]) CUR.jobSpecs[tradeType]={};
    CUR.jobSpecs[tradeType].docName=file.name;
    CUR.jobSpecs[tradeType].docData=e.target.result;
    persist();
  };
  reader.readAsDataURL(file);
}

function renderProject(){
  if(!CUR){goHome();return;}
  const p=CUR.project, locs=CUR.locations, trades=CUR.trades;

  let _locCounter = 0;
  const locsHtml = locs.map(loc=>{
    const isOpen = LOC_OPEN[loc.id] !== false;
    const locNum = loc.prestart ? null : ++_locCounter;

    const locTrades = trades.filter(t=>t.location_id===loc.id&&roleTaskFilter(t)&&statusTaskFilter(t));
    if(STATUS_FILTER!=='all'&&!locTrades.length) return '';
    let _taskCounter = 0;

    const tasksHtml = locTrades.map(trade=>{
      const taskStat = tradeStatus(trade.id);
      const tradeName = TRADE_MAP[trade.trade_type]?.name||trade.trade_type;
      const tradeIcon = TRADE_MAP[trade.trade_type]?.icon||'';
      const taskName = trade.name||tradeName;
      const taskNum = locNum !== null ? `${locNum}.${++_taskCounter}` : null;

      const _flaggedCount = (CUR.taskItems||[]).filter(i=>i.trade_id===trade.id&&(CUR.taskData||{})[trade.id]?.answers?.[i.id]?.flagged).length;

      const _tradeColor = TRADE_COLORS[trade.trade_type]||'var(--blue)';
      return `<div class="acc-task" id="task-${trade.id}" style="border-left-color:${_tradeColor}"
        draggable="true"
        ondragstart="dragStartTask(event,'${trade.id}','${loc.id}')"
        ondragover="dragOverTask(event,'${trade.id}','${loc.id}')"
        ondragleave="dragLeaveTask(event,'${trade.id}')"
        ondrop="dropTask(event,'${trade.id}','${loc.id}')"
        ondragend="dragEndTask(event)">

function setViewMode(mode){
  VIEW_MODE=mode;
  localStorage.setItem('qa_view_mode',mode);
  TASK_OPEN={};
  LOC_OPEN={};
  TRADE_GROUP_OPEN={};
  renderProject();
}
function setRoleFilter(f){ ROLE_FILTER=f; if(VIEW==='actions') renderActions(); else renderProject(); }
function setStatusFilter(f){ STATUS_FILTER=(STATUS_FILTER===f?'all':f); renderProject(); }
function roleTaskFilter(trade){
  // ROLE_FILTER is now Actions-specific — project view always shows all tasks
  return true;
}
function statusTaskFilter(trade){
  if(STATUS_FILTER==='all') return true;
  if(trade.pm_only) return false;
  const st=tradeStatus(trade.id);
  if(STATUS_FILTER==='attention') return st==='attention'||st==='rejected';
  if(STATUS_FILTER==='pending') return st==='pending'||st==='no_sub';
  return st===STATUS_FILTER;
}

function renderByTradeView(){
  if(!CUR) return '';
  const nonPrestart=CUR.locations.filter(l=>!l.prestart).sort((a,b)=>a.order-b.order);
  const locNumMap={}; nonPrestart.forEach((l,i)=>locNumMap[l.id]=i+1);
  const allTradeTypes=[...new Set(CUR.trades.filter(t=>!t.pm_only).map(t=>t.trade_type))];
  const orderedTypes=CUR.project.tradeOrder ? CUR.project.tradeOrder.filter(tt=>allTradeTypes.includes(tt)).concat(allTradeTypes.filter(tt=>!CUR.project.tradeOrder.includes(tt))) : TRADES.map(t=>t.id);
  let html='';
  for(const tradeType of orderedTypes){
    const tasks=[];
    for(const loc of nonPrestart){
      const locTasks=CUR.trades.filter(t=>t.location_id===loc.id&&t.trade_type===tradeType&&!t.pm_only);
      for(const trade of locTasks) tasks.push({trade,loc});
    }
    if(!tasks.length) continue;
    const tradeInfo=TRADE_MAP[tradeType];
    const tradeName=tradeInfo?.name||tradeType;
    const tradeIcon=tradeInfo?.icon||'';
    const filteredTasks=tasks.filter(({trade})=>roleTaskFilter(trade)&&statusTaskFilter(trade));
    if(!filteredTasks.length) continue;
    const rows=filteredTasks.map(({trade,loc})=>{
      const taskStat=tradeStatus(trade.id);
      const taskName=trade.name||tradeName;
      const _btFlagged=(CUR.taskItems||[]).filter(i=>i.trade_id===trade.id&&(CUR.taskData||{})[trade.id]?.answers?.[i.id]?.flagged).length;
      const _tc=TRADE_COLORS[tradeType]||'var(--blue)';
      return `<div style="border-top:1px solid var(--border);border-left:4px solid ${_tc}">
        <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;background:#fff" onclick="openTaskInspection('${trade.id}')">
          <span style="font-size:11px;font-weight:500;color:#94a3b8;flex-shrink:0;min-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">Loc. ${locNumMap[loc.id]||''}. ${x(loc.name)}</span>
          <span style="font-size:14px;font-weight:600;color:var(--navy);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${x(taskName)}</span>
          ${_btFlagged?`<span class="badge badge-rej">🚩 ${_btFlagged}</span>`:''}
          ${statusBadge(taskStat)}
          <button class="btn btn-ghost btn-sm" style="font-size:10px;padding:2px 7px;flex-shrink:0" onclick="event.stopPropagation();openEditTaskModal('${trade.id}')">✏</button>
        </div>
        ${trade.scope?`<div style="padding:4px 16px 6px 20px;background:#f8fafc;border-top:1px solid #f1f5f9;font-size:11px;color:#64748b">${x(trade.scope)}</div>`:''}
      </div>`;
    }).join('');
    // Sub for this trade type — should be consistent across all tasks
    const tradeTypeSub = tasks[0]?.trade.sub_name || '';
    const subChip = tradeTypeSub
      ? `<button onclick="event.stopPropagation();openTradeSubModal('${tradeType}')" class="sub-pill inv" style="cursor:pointer;width:120px;text-align:center;flex-shrink:0">${x(tradeTypeSub)}</button>`
      : `<button onclick="event.stopPropagation();openTradeSubModal('${tradeType}')" class="sub-pill inv" style="cursor:pointer;width:120px;text-align:center;flex-shrink:0;opacity:.6;border:1px dashed rgba(255,255,255,.4);background:transparent">+ Assign sub</button>`;
    const groupOpen = TRADE_GROUP_OPEN[tradeType] !== false;
    html+=`<div id="tg-${tradeType}" style="background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:12px;box-shadow:var(--shadow);overflow:hidden" ondragover="dragOverTradeGroup(event,'${tradeType}')" ondragleave="dragLeaveTradeGroup(event,'${tradeType}')" ondrop="dropTradeGroup(event,'${tradeType}')" ondragend="dragEndTradeGroup(event)">
      <div style="background:var(--navy);color:#fff;padding:13px 16px;display:flex;align-items:center;gap:9px;cursor:pointer" onclick="tradeGroupCycle('${tradeType}')">
        <span class="drag-hdl" draggable="true" ondragstart="dragStartTradeGroup(event,'${tradeType}')" onclick="event.stopPropagation()" style="color:rgba(255,255,255,.4);cursor:grab">⠿</span>
        <span style="font-size:15px">${tradeIcon}</span>
        <span style="font-size:13px;font-weight:700;flex:1">${x(tradeName)}</span>
        ${subChip}
        <button class="btn btn-ghost btn-sm" style="font-size:10px;padding:2px 7px;background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.8)" onclick="event.stopPropagation();openAddTaskForTrade('${tradeType}')">+ Task</button>
      </div>
      ${groupOpen?`<div>${rows}</div>`:''}
    </div>`;
  }
  return html||'<div style="text-align:center;padding:40px 0;color:var(--gray);font-size:13px">No tasks yet.</div>';
}

    let _taskIdx=0;
    for(const trade of locTrades){
      _taskIdx++;
      const tradeName=trade.name||TRADE_MAP[trade.trade_type]?.name||trade.trade_type;
      const tradeIcon=TRADE_MAP[trade.trade_type]?.icon||'';
      const displayName=tradeName.charAt(0).toUpperCase()+tradeName.slice(1);
      // Items-based task row in task list view
      const _tlItems=(CUR.taskItems||[]).filter(i=>i.trade_id===trade.id);
      const _tlData=(CUR.taskData||{})[trade.id]||{};
      const _tlAnswered=_tlItems.filter(i=>{const a=_tlData.answers?.[i.id];return a&&(a.value||a.photos?.length||a.photo||a.text);});
      const _tlStat=tradeStatus(trade.id);
      const _tlIcon=_tlStat==='approved'?'✓':_tlStat==='sub_done'?'~':_tlStat==='attention'?'!':'';
      html+=`<div style="display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s" onclick="openTaskInspection('${trade.id}')" onmouseover="this.style.background='#f5f8ff'" onmouseout="this.style.background=''">
        <span style="width:32px;font-size:10px;font-weight:700;color:#c0cfe0;flex-shrink:0">${_locIdx}.${_taskIdx}</span>
        <div class="acc-cp-circ ${_tlStat}" style="flex-shrink:0">${_tlIcon}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500;color:var(--navy);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${tradeIcon} ${x(displayName)}</div>
          <div style="font-size:11px;color:#94a3b8;margin-top:1px">${_tlItems.length?`${_tlAnswered.length}/${_tlItems.length} items`:'No items yet'}</div>
        </div>
        ${statusBadge(_tlStat)}
      </div>`;
    }
    html+=isOpen?`</div></div>`:`</div>`;
  }
  return html||'<div style="text-align:center;padding:40px 0;color:var(--gray);font-size:13px">No tasks yet.</div>';
}

let _NP = null; // {mode:'create'|'edit', locations:[...]}
const _NP_DRAFT_KEY = 'ngl-np-draft';
let _npDraftTimer = null;

// Flash the primary save button to ✓ Saved without closing the modal
function _showSaved(msg){
  const btn = document.querySelector('.m-foot .btn-primary, .m-foot .btn-green');
  if(!btn) return;
  const orig = btn.textContent;
  const origBg = btn.style.background;
  btn.textContent = msg || '✓ Saved';
  btn.style.background = 'var(--green)';
  btn.disabled = true;
  setTimeout(()=>{ btn.textContent=orig; btn.style.background=origBg; btn.disabled=false; }, 2200);
}

// Debounced draft-save for new project form
function _npDraftSave(){
  clearTimeout(_npDraftTimer);
  _npDraftTimer = setTimeout(()=>{
    if(!_NP) return;
    try {
      const p = _npCurrentFields();
      _npSyncLocs();
      localStorage.setItem(_NP_DRAFT_KEY, JSON.stringify({fields:p, locations:_NP.locations}));
    } catch(e){}
  }, 600);
}

function _npClearDraft(){ localStorage.removeItem(_NP_DRAFT_KEY); }

function openWizard(){
  const td=new Date(),tds=td.getFullYear()+'-'+String(td.getMonth()+1).padStart(2,'0')+'-'+String(td.getDate()).padStart(2,'0');
  _NP={mode:'create',locations:['']};
  // Restore unsaved draft if present
  try {
    const raw = localStorage.getItem(_NP_DRAFT_KEY);
    if(raw){
      const d = JSON.parse(raw);
      if(d.fields && d.locations){
        _NP.locations = d.locations.length ? d.locations : [''];
        _renderNPModal(d.fields);
        return;
      }
    }
  } catch(e){}
  _renderNPModal({name:'',client:'',pm:'',address:'',date:tds,scope:''});
}

function openEditWizard(){
  const nonPrestart=CUR.locations.filter(l=>!l.prestart);
  _NP={mode:'edit',locations:nonPrestart.map(l=>l.name)};
  _renderNPModal({name:CUR.project.name,client:CUR.project.client,pm:CUR.project.pm||'',address:CUR.project.address||'',date:CUR.project.date||'',scope:CUR.project.scope||''});
}

          <div class="fg"><label>Est. Start Date</label><input id="np-date" type="date" value="${x(p.date)}" onchange="_npDraftSave()"></div>

        </div>
        <div class="fg"><label>Scope of Works</label><textarea id="np-scope" placeholder="Brief description of the works…" oninput="_npDraftSave()">${x(p.scope)}</textarea></div>
        <div style="border-top:1px solid var(--border);margin:4px 0 14px;padding-top:14px">

function _npConfirmClose(){
  const name = document.getElementById('np-name')?.value.trim();
  if(name && _NP?.mode === 'create'){
    if(!confirm('Discard this new project?')) return;
    _npClearDraft();
  }
  closeModal();
}

function _npCurrentFields(){
  return {
    name:    document.getElementById('np-name')?.value||'',
    client:  document.getElementById('np-client')?.value||'',
    pm:      document.getElementById('np-pm')?.value||'',
    address: document.getElementById('np-address')?.value||'',
    date:    document.getElementById('np-date')?.value||'',
    scope:   document.getElementById('np-scope')?.value||''
  };
}
function _npSyncLocs(){
  const inputs=document.querySelectorAll('.loc-inp');
  if(inputs.length) _NP.locations=[...inputs].map(i=>i.value);

function _npSave(){
  const name=document.getElementById('np-name').value.trim();
  const client=document.getElementById('np-client').value.trim();
  if(!name||!client){ alert('Please enter a project name and client.'); return; }
  _npSyncLocs();
  const locations=_NP.locations.map(l=>l.trim()).filter(Boolean);
  if(!locations.length){ alert('Please add at least one location.'); return; }
  const proj={name,client,pm:document.getElementById('np-pm').value.trim(),address:document.getElementById('np-address').value.trim(),date:document.getElementById('np-date').value,scope:document.getElementById('np-scope').value.trim()};
  if(_NP.mode==='edit'){
    Object.assign(CUR.project,proj);
    const nonPrestart=CUR.locations.filter(l=>!l.prestart);
    locations.forEach((nm,i)=>{
      if(i<nonPrestart.length){ nonPrestart[i].name=nm; }
      else{ const nl={id:uid(),name:nm,order:CUR.locations.length}; CUR.locations.push(nl); nonPrestart.push(nl); }
    });
    persist();
    _npClearDraft();
    closeModal();
    VIEW='project';
    renderAll();
  } else {
    createProject(proj,locations);
    _npClearDraft();
    CURRENT_ROLE = CURRENT_ROLE || 'pm';
    closeModal();
    VIEW='project';
    renderAll();
  }
}

function deleteProject(){
  const name=CUR.project.name||'this project';
  if(!confirm(`Permanently delete "${name}"? All locations, tasks, checkpoints and inspection data will be lost. This cannot be undone.`)) return;
  const idx=loadIndex().filter(p=>p.id!==CUR_ID);
  saveIndex(idx);
  localStorage.removeItem(projKey(CUR_ID));
  closeModal();
  CUR_ID=null; CUR=null;
  VIEW='home';
  renderAll();
}

  _cpCfgSaveInputs();

function getOrInitTaskData(tradeId){
  if(!CUR.taskData) CUR.taskData={};
  if(!CUR.taskData[tradeId]) CUR.taskData[tradeId]={outcome:'pending',answers:{},sub:{name:'',ts:''},pm:{name:'',ts:'',signed:false},history:[]};
  return CUR.taskData[tradeId];
}

function openTaskInspection(tradeId){
  if(!CUR) return;
  CUR_TRADE_ID=tradeId;
  const trade=CUR.trades.find(t=>t.id===tradeId);
  if(!trade) return;
  const data=getOrInitTaskData(tradeId);
  const isPMContext = ROLE_FILTER==='pm' || trade.pm_only;
  if(data.outcome==='approved'){
    renderTaskApprovedView(tradeId, data);
    return;
  }
  if(isPMContext){
    renderTaskPMView(tradeId, data);
    return;
  }
  if(data.outcome==='sub_done'){
    renderTaskPMView(tradeId, data);
  } else {
    renderTaskSubView(tradeId, data);
  }
}

      } else {
        controlHtml=ans.docName
          ? `<a href="${ans.docData||'#'}" download="${x(ans.docName)}" style="font-size:12px;color:var(--primary);text-decoration:underline">📄 ${x(ans.docName)}</a>`
          : `<span style="font-size:12px;color:#cbd5e1">—</span>`;
      }
    }
    if(isText){
      if(editable){
        controlHtml=`<input type="text" value="${x(ans.text||'')}" placeholder="Enter value…" oninput="setTaskText('${item.id}',this.value)" style="flex:1;min-width:0;max-width:260px;padding:4px 8px;border:1px solid var(--border);border-radius:5px;font-size:12px;box-sizing:border-box">`;
      } else {
        controlHtml=`<span style="font-size:12px;color:${ans.text?'var(--navy)':'#cbd5e1'}">${ans.text?x(ans.text):'—'}</span>`;
      }
    }
    if(isDate){
      if(editable){
        controlHtml=`<input type="date" value="${x(ans.text||'')}" onchange="setTaskText('${item.id}',this.value)" style="padding:4px 8px;border:1px solid var(--border);border-radius:5px;font-size:12px;flex-shrink:0">`;
      } else {
        controlHtml=`<span style="font-size:12px;color:${ans.text?'var(--navy)':'#cbd5e1'}">${ans.text?x(ans.text):'—'}</span>`;
      }
    }
    const flagged=!!ans.flagged;
    const flagBtn=(!editable&&!isPMSignoff)?`<button class="flag-btn${flagged?' active':''}" title="${flagged?'Unflag':'Flag for remedials'}" onclick="flagTaskItem('${item.id}',${!flagged})">${flagged?'🚩':'⚑'}</button>`:'';
    const failNote=(!isPMSignoff&&ans.value==='fail')
      ? (editable
          ? `<div style="padding:4px 10px 8px"><input type="text" value="${x(ans.text||'')}" placeholder="Note reason for fail…" oninput="setTaskFailNote('${item.id}',this.value)" style="width:100%;box-sizing:border-box;padding:5px 9px;border:1px solid #fca5a5;border-radius:5px;background:#fff7f7;font-size:12px;color:#7f1d1d;outline:none"></div>`
          : `<div style="padding:2px 10px 6px;font-size:11px;color:var(--red);background:#fef2f2;margin:0 0 2px">${ans.text?`↳ ${x(ans.text)}`:'<i style="color:#f87171">No reason given</i>'}</div>`)
      : '';
    return {controlHtml,flagged,flagBtn,failNote};
  }
  const rows=Object.entries(orderedByGroup).map(([gName,gitems])=>{
    const out=[];
    // Section header — only for PM Sign-off and warranty; B&A and mid groups get none
    if(gName==='PM Sign-off')
      out.push(`<div class="added-section-hdr pm">${gName}</div>`);
    else if(gName===WARRANTY_GRP)
      out.push(`<div class="added-section-hdr warranty">${gName}</div>`);
    for(let i=0;i<gitems.length;i++){
      const item=gitems[i];
      const next=gitems[i+1];
      if(item.type==='photo_before'&&next?.type==='photo_after'){
        // Combined Before & After row — label left, both photo controls right
        const ansB=data.answers?.[item.id]||{};
        const ansA=data.answers?.[next.id]||{};
        const mkPhotoCtrl=(itm,ans,lbl,col)=>{
          const _photos=ans.photos||(ans.photo?[ans.photo]:[]);
          let inner=`<span style="font-size:10px;font-weight:700;color:${col};margin-right:3px">${lbl}</span>`;
          if(editable){
            _photos.forEach((p,idx)=>{ inner+=`<div class="p-wrap" style="flex-shrink:0"><img class="p-thumb-sm" src="${p}" onclick="viewPhoto('${p}')"><button class="p-del" onclick="removeTaskItemPhotoAt('${itm.id}',${idx})">×</button></div>`; });
            if(!_photos.length) inner+=`<label class="p-add-sm" style="flex-shrink:0"><div style="font-size:12px">📷</div><input type="file" accept="image/*" style="display:none" onchange="setTaskItemPhoto(this,'${itm.id}')"></label>`;
          } else {
            _photos.forEach(p=>{ inner+=`<div class="p-wrap" style="flex-shrink:0"><img class="p-thumb-sm" src="${p}" onclick="viewPhoto('${p}')"></div>`; });
          }
          return `<div style="display:flex;align-items:center;gap:4px;flex-shrink:0;flex-wrap:wrap">${inner}</div>`;
        };
        out.push(`<div class="item-row" style="flex-wrap:wrap;align-items:flex-start;gap:6px">
          <span style="flex:1;min-width:130px;font-size:13px;color:var(--navy)">Before &amp; After photos</span>
          <div style="display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap;flex-shrink:0">
            ${mkPhotoCtrl(item,ansB,'Before','#b45309')}
            ${mkPhotoCtrl(next,ansA,'After','#1d4ed8')}
          </div>
        </div>`);
        i++; // skip After item
      } else {
        const ans=data.answers?.[item.id]||{};
        const {controlHtml,flagged,flagBtn,failNote}=_renderOneItem(item,ans,editable);
        const isPMSO=item.type==='pm_signoff';
        const rowStyle=isPMSO&&editable?'background:#faf5ff;border-radius:5px;margin:1px 0;opacity:0.6;':'';
        out.push(`<div class="item-row${flagged?' flagged':''}${ans.value==='fail'?' fail-row':''}" style="${rowStyle}">
          <span style="flex:1;font-size:13px;color:var(--navy)">${x(item.label)}</span>
          ${controlHtml}
          ${isPMSO?'':flagBtn}
        </div>${failNote}`);
      }
    }
    return out.join('');
  }).join('');
  return `<div class="task-items-section" data-editable="${editable?'1':'0'}">${rows}</div>`;
}

function _renderHistoryThread(history){
  if(!history?.length) return '';
  // Group entries into rounds — each PM action closes a round
  const rounds=[]; let round=[];
  for(const e of history){
    round.push(e);
    if(e.role==='pm'){ rounds.push(round); round=[]; }
  }
  if(round.length) rounds.push(round);
  if(!rounds.length) return '';
  const fmtDate=ts=>ts?new Date(ts).toLocaleDateString():'';
  const roundsHtml=rounds.map((r,ri)=>{
    const entries=r.map(e=>{
      if(e.role==='sub'){
        const fc=e.fails?.length||0;
        const failBadge=fc>0
          ?`<span style="font-size:10px;font-weight:600;color:var(--red);background:#fef2f2;border-radius:8px;padding:1px 6px">${fc} fail${fc>1?'s':''}</span>`
          :`<span style="font-size:10px;font-weight:600;color:var(--green);background:#f0fdf4;border-radius:8px;padding:1px 6px">All pass</span>`;
        const failDetails=e.fails?.length
          ?`<div style="margin-top:3px;padding-left:8px">${e.fails.map(f=>`<div style="font-size:11px;color:#64748b">• ${x(f.label)}${f.note?` — <i>${x(f.note)}</i>`:''}</div>`).join('')}</div>`:'';
        return `<div style="padding:3px 0"><div style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;color:#64748b">Sub submitted · ${fmtDate(e.ts)}</span>${failBadge}</div>${failDetails}${e.note?`<div style="font-size:11px;color:#374151;padding:2px 0 0 8px;font-style:italic">"${x(e.note)}"</div>`:''}</div>`;
      } else {
        const isApp=e.action==='approved';
        return `<div style="padding:3px 0">
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:11px;color:#64748b">PM ${isApp?'approved':'rejected'} · ${fmtDate(e.ts)}</span>
            <span style="font-size:12px">${isApp?'✅':'↩'}</span>
          </div>
          ${e.note?`<div style="font-size:11px;color:${isApp?'#166534':'var(--red)'};padding:2px 0 0 8px;font-style:italic">"${x(e.note)}"</div>`:''}
        </div>`;
      }
    }).join('');
    return `<div style="padding:6px 10px;border-left:3px solid #e2e8f0;margin-bottom:6px">
      <div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">Round ${ri+1}</div>
      ${entries}
    </div>`;
  }).join('');
  const tid='task-hist-'+Math.random().toString(36).slice(2,6);
  return `<div style="margin-top:14px;border-top:1px solid var(--border);padding-top:10px">
    <button onclick="const el=document.getElementById('${tid}');el.style.display=el.style.display==='none'?'block':'none';this.textContent=el.style.display==='none'?'▸ Review history (${rounds.length} round${rounds.length>1?'s':''})':'▾ Review history (${rounds.length} round${rounds.length>1?'s':''})';" style="font-size:11px;color:#94a3b8;background:none;border:none;cursor:pointer;padding:0">▸ Review history (${rounds.length} round${rounds.length>1?'s':''})</button>
    <div id="${tid}" style="display:none;margin-top:8px">${roundsHtml}</div>
  </div>`;
}
