function setTaskText(itemId, val){
  const item=(CUR.taskItems||[]).find(i=>i.id===itemId); if(!item) return;
  const data=getOrInitTaskData(item.trade_id);
  if(!data.answers) data.answers={};
  if(!data.answers[itemId]) data.answers[itemId]={};
  data.answers[itemId].text=val;
  persist();
}
function setTaskLink(itemId, url){
  const item=(CUR.taskItems||[]).find(i=>i.id===itemId); if(!item) return;
  const data=getOrInitTaskData(item.trade_id);
  if(!data.answers) data.answers={};
  if(!data.answers[itemId]) data.answers[itemId]={};
  data.answers[itemId].url=url;
  persist();
}
function setTaskDocument(input, itemId){
  const file=input.files?.[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const item=(CUR.taskItems||[]).find(i=>i.id===itemId); if(!item) return;
    const data=getOrInitTaskData(item.trade_id);
    if(!data.answers) data.answers={};
    if(!data.answers[itemId]) data.answers[itemId]={};
    data.answers[itemId].docName=file.name;
    data.answers[itemId].docData=e.target.result;
    persist();
    _refreshTaskItemsSection(item.trade_id, data);
  };
  reader.readAsDataURL(file);
}
function setTaskAnswer(itemId, value){
  const item=(CUR.taskItems||[]).find(i=>i.id===itemId); if(!item) return;
  const data=getOrInitTaskData(item.trade_id);
  if(!data.answers) data.answers={};
  if(!data.answers[itemId]) data.answers[itemId]={};
  data.answers[itemId].value=value;
  persist();
  // Update in-place — replace the items section, preserving editable mode
  const body=document.getElementById('task-modal-body');
  if(body){
    const newData=getOrInitTaskData(item.trade_id);
    const section=body.querySelector('.task-items-section');
    if(section){
      const editable=section.dataset.editable!=='0';
      section.outerHTML=_renderItemsHtml(item.trade_id, newData, editable);
    }
  }
}
function setTaskFailNote(itemId, text){
  const item=(CUR.taskItems||[]).find(i=>i.id===itemId); if(!item) return;
  const data=getOrInitTaskData(item.trade_id);
  if(!data.answers) data.answers={};
  if(!data.answers[itemId]) data.answers[itemId]={};
  data.answers[itemId].text=text;
  persist();
}

function setTaskItemPhoto(input, itemId){
  const file=input.files?.[0]; if(!file) return;
  resizeAndEncode(file, b64=>{
    const item=(CUR.taskItems||[]).find(i=>i.id===itemId); if(!item) return;
    const data=getOrInitTaskData(item.trade_id);
    if(!data.answers) data.answers={};
    if(!data.answers[itemId]) data.answers[itemId]={};
    const ans=data.answers[itemId];
    // migrate legacy single photo → array
    if(ans.photo&&!ans.photos){ans.photos=[ans.photo];delete ans.photo;}
    if(!ans.photos) ans.photos=[];
    ans.photos.push(b64);
    persist();
    _refreshTaskItemsSection(item.trade_id, data);
  });
}
function removeTaskItemPhotoAt(itemId, idx){
  const item=(CUR.taskItems||[]).find(i=>i.id===itemId); if(!item) return;
  const data=getOrInitTaskData(item.trade_id);
  const ans=data.answers?.[itemId]; if(!ans) return;
  if(ans.photos) ans.photos.splice(idx,1);
  else if(ans.photo) delete ans.photo;
  persist();
  _refreshTaskItemsSection(item.trade_id, data);
}
function clearTaskItemPhoto(itemId){ removeTaskItemPhotoAt(itemId, 0); }
function _refreshTaskItemsSection(tradeId, data){
  const body=document.getElementById('task-modal-body');
  if(body){
    const section=body.querySelector('.task-items-section');
    if(section){
      const editable=section.dataset.editable!=='0';
      section.outerHTML=_renderItemsHtml(tradeId,data,editable);
      return;
    }
  }
  renderTaskSubView(tradeId, data);
}

function flagTaskItem(itemId, flagged){
  const item=(CUR.taskItems||[]).find(i=>i.id===itemId); if(!item) return;
  const data=getOrInitTaskData(item.trade_id);
  if(!data.answers) data.answers={};
  if(!data.answers[itemId]) data.answers[itemId]={};
  data.answers[itemId].flagged=flagged;
  persist();
  renderTaskPMView(item.trade_id, data);
}

function saveTaskSub(tradeId){
  const data=getOrInitTaskData(tradeId);
  if(!data.history) data.history=[];
  const items=(CUR.taskItems||[]).filter(i=>i.trade_id===tradeId);
  const fails=items.filter(i=>data.answers?.[i.id]?.value==='fail').map(i=>({label:i.label,note:data.answers[i.id].text||''}));
  const subName=data.sub?.name||'Subcontractor';
  const resubmitNote=document.getElementById('sub-resubmit-note')?.value.trim()||'';
  data.history.push({role:'sub',action:'submitted',name:subName,ts:new Date().toISOString(),fails,note:resubmitNote});
  data.sub={name:subName,ts:new Date().toISOString(),resubmit_note:resubmitNote};
  data.outcome='sub_done';
  persist(); closeModal(); renderAll();
}

function saveTaskPM(tradeId, outcome){
  const name=(document.getElementById('task-pm-name')?.value.trim())||CUR.project?.pm||'PM';
  const note=(document.getElementById('task-pm-note')?.value.trim())||'';
  // Rejection requires a reason
  if(outcome==='rejected' && !note){
    const el=document.getElementById('task-pm-note');
    const req=document.getElementById('task-pm-note-req');
    if(el){ el.style.borderColor='var(--red)'; el.focus(); }
    if(req) req.style.display='inline';
    return;
  }
  const data=getOrInitTaskData(tradeId);
  if(!data.history) data.history=[];
  const isApproved=outcome==='approved';
  // Auto-record the pm_signoff checklist item answer
  const signoffItem=(CUR.taskItems||[]).find(i=>i.trade_id===tradeId&&i.type==='pm_signoff');
  if(signoffItem){
    if(!data.answers) data.answers={};
    if(!data.answers[signoffItem.id]) data.answers[signoffItem.id]={};
    data.answers[signoffItem.id].value=isApproved?'pass':'fail';
  }
  data.history.push({role:'pm',action:isApproved?'approved':'rejected',name,ts:new Date().toISOString(),note});
  data.pm={
    name,ts:new Date().toISOString(),signed:true,
    rejection_note:isApproved?'':(note||''),
    approval_note:isApproved?(note||''):''
  };
  data.outcome=isApproved?'approved':'pending';
  persist(); closeModal(); renderAll();
}

function reopenTaskInspection(tradeId){
  const data=getOrInitTaskData(tradeId);
  data.outcome='pending';
  persist(); closeModal(); renderAll();
}

// ── CHECKPOINT INSPECTION MODAL (legacy — kept for backwards compat) ──────────

function openCheckpointModal(cpId){
  CUR_CP_ID=cpId;
  const cp=CUR.checkpoints.find(c=>c.id===cpId);
  // Patch specs onto checkpoints that pre-date the spec feature
  if(cp && !cp.specs?.length){
    const trade=CUR.trades.find(t=>t.id===cp.trade_id);
    if(trade){
      // Try TMPL first, then fall back to CP_TEMPLATES source
      const tmplTpl=(TMPL[trade.trade_type]||[]).find(t=>t.name===cp.name);
      const srcTpl=(CP_TEMPLATES[trade.trade_type]||[]).find(t=>t.name===cp.name);
      const specSrc=tmplTpl?.specs?.length ? tmplTpl.specs : srcTpl?.specs;
      if(specSrc?.length){
        cp.specs=specSrc.map(s=>({id:s.id||uid(),label:s.label,hint:s.hint||''}));
        persist();
      }
    }
  }
  renderCpModal();
}

function cpNumber(cpId){
  const cp=CUR.checkpoints.find(c=>c.id===cpId); if(!cp) return '';
  const trade=CUR.trades.find(t=>t.id===cp.trade_id); if(!trade||trade.pm_only) return '';
  const loc=CUR.locations.find(l=>l.id===trade.location_id); if(!loc||loc.prestart) return '';
  const locNum=CUR.locations.filter(l=>!l.prestart).indexOf(loc)+1;
  const taskNum=CUR.trades.filter(t=>t.location_id===loc.id).indexOf(trade)+1;
  const taskCps=[...CUR.checkpoints.filter(c=>c.trade_id===trade.id)].sort((a,b)=>a.order-b.order);
  const cpNum=taskCps.indexOf(cp)+1;
  return `${locNum}.${taskNum}.${cpNum}`;
}

function renderCpModal(){
  const cp=CUR.checkpoints.find(c=>c.id===CUR_CP_ID);
  if(!cp) return;
  const data=CUR.cpData[CUR_CP_ID]||{outcome:'pending',sub:{checks:{},notes:'',photos:[],name:'',date:''},pm:{checks:{},comments:{},notes:'',photos:[],name:'',date:'',rejection_note:''},history:[]};
  const outcome=data.outcome||'pending';
  const trade=CUR.trades.find(t=>t.id===cp.trade_id);
  const tradeName=TRADE_MAP[trade?.trade_type]?.name||trade?.name||'';
  const cpLoc=CUR.locations.find(l=>l.id===trade?.location_id);

  // PM-direct flow for pm_only tasks
  if(trade?.pm_only){
    renderPMDirectModal(cp,data);
    return;
  }

  let headerCls='navy', phaseLabel='', body='', footBtns='';

  if(outcome==='pending'||outcome==='rejected'){
    headerCls=outcome==='rejected'?'m-hdr navy':'m-hdr navy';
    phaseLabel=outcome==='rejected'?'Rejected — Sub to re-submit':'Sub Inspection';
    body=renderSubPhase(cp,data);
    footBtns=`<button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="saveSubCP()">Submit</button>`;
  } else if(outcome==='sub_done'){
    headerCls='m-hdr amber';
    phaseLabel='Awaiting PM Review';
    body=renderPMPhase(cp,data);
    footBtns=`<button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-red btn-sm" onclick="savePMCP('rejected')">Send Back</button>
      <button class="btn btn-green btn-sm" onclick="savePMCP('approved')">Approve</button>`;
  } else if(outcome==='approved'){
    headerCls='m-hdr green-light';
    phaseLabel='Approved';
    body=renderApprovedPhase(cp,data);
    footBtns=`<button class="btn btn-ghost btn-sm" onclick="closeModal()">Close</button>
      <button class="btn btn-ghost btn-sm" onclick="reopenCP()">Re-open</button>`;
  }

  openModal(`<div class="modal">
    <div class="${headerCls}">
      <div>${modalBc([cpLoc?.name,tradeName])}<h2>${x(cp.name)}</h2><p>${x(phaseLabel)}${cp.scope?` · <em>${x(cp.scope)}</em>`:''}</p></div>
      <button class="m-close" onclick="closeModal()">×</button>
    </div>
    <div class="m-body" id="cp-modal-body">${body}</div>
    <div class="m-foot">${footBtns}</div>
  </div>`);
}

function _renderSpecRows(cp, data){
  let specs=cp.specs||[];
  if(!specs.length&&CUR){
    const trade=CUR.trades.find(t=>t.id===cp.trade_id);
    if(trade){
      const src=(CP_TEMPLATES[trade.trade_type]||[]).find(t=>t.name===cp.name);
      if(src?.specs?.length){
        specs=src.specs.map((s,i)=>({id:trade.trade_type+'_'+cp.name.replace(/\W+/g,'_')+'_'+i,label:s.label,hint:s.hint||''}));
        cp.specs=specs; persist();
      }
    }
  }
  if(!specs.length) return '';
  let html=`<div class="spec-section-hdr">Product Record</div>`;
  for(const spec of specs){
    const sd=data.specData?.[spec.id]||{};
    const showPhoto = spec.photo !== false;
    const photoSlot = showPhoto ? (sd.photo
      ? `<div style="position:relative"><img class="spec-thumb" src="${sd.photo}" onclick="viewPhoto('${sd.photo}')">
          <button class="p-del" style="position:absolute;top:-4px;right:-4px" onclick="removeSpecPhoto('${spec.id}')">×</button>
        </div>`
      : `<label class="spec-photo-add" onclick="event.stopPropagation()"><span class="sp-icon">📷</span><small>Photo</small><input type="file" accept="image/*" style="display:none" onchange="addSpecPhoto(this,'${spec.id}')"></label>`) : '';
    html+=`<div class="spec-row">
      <div class="spec-left">
        <div class="spec-lbl">${x(spec.label)}</div>
        <input id="spec-inp-${spec.id}" class="spec-inp" type="text" value="${x(sd.value||'')}" placeholder="${x(spec.hint||'')}" onchange="saveSpecInput('${spec.id}',this.value)">
      </div>
      ${photoSlot?`<div class="spec-photo-slot" data-spec-slot="${spec.id}">${photoSlot}</div>`:''}
    </div>`;
  }
  return html;
}

function renderSubPhase(cp,data){
  const sub=data.sub||{checks:{},notes:'',photos:[],name:'',date:''};
  const isRejected=data.outcome==='rejected';
  let html='';
  if(isRejected){
    html+=`<div style="background:var(--red-bg);border:1px solid #fca5a5;border-radius:6px;padding:10px 12px;margin-bottom:14px;font-size:12px;color:var(--red)">
      <strong>Sent back by PM for revision.</strong> Check the items marked No below.</div>`;
  }
  html+=`<div class="m-section">Inspection Items</div>`;
  for(const item of cp.items){
    html+=_buildSubRowHtml(item, sub.checks[item.id]||'', sub.reasons);
  }
  html+=_renderSpecRows(cp,data);
  const photos=sub.photos||[];
  const photosHtml=photos.map((src,i)=>`<div class="p-wrap"><img class="p-thumb-sm" src="${src}" onclick="viewPhoto('${src}')"><button class="p-del" onclick="removeSubPhoto(${i})">×</button></div>`).join('');
  html+=`<div class="m-section">Photos</div>

  const _subAge=_subTs?Math.round((Date.now()-_subTs)/60000):null;
  const _ageStr=_subAge===null?'':_subAge<60?`${_subAge}m ago`:_subAge<1440?`${Math.round(_subAge/60)}h ago`:`${Math.round(_subAge/1440)}d ago`;

    </div>`;

function renderApprovedPhase(cp,data){
  const sub=data.sub||{}, pm=data.pm||{};
  const _approvedAt=pm.ts?new Date(pm.ts).toLocaleString('en-AU',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}):fmtDate(pm.date||'');
  const _subTs=sub.ts?new Date(sub.ts):null;
  const _subFmt=_subTs?_subTs.toLocaleString('en-AU',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}):fmtDate(sub.date||'');
  let html=`<div style="background:var(--green-bg);border:1px solid #6ee7b7;border-radius:6px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#065f46;display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
    <span>✓ Approved by <strong>${x(pm.name||'PM')}</strong></span>
    <span style="text-align:right;flex-shrink:0;font-size:11px;opacity:.8">${_approvedAt}${_subTs?`<br>Sub submitted: ${_subFmt}`:''}</span>
  </div>`;
  html+=`<div class="m-section">Inspection Items</div>
    <div style="display:flex;justify-content:flex-end;padding:0 10px 4px;gap:12px">
      <span style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em">Sub</span>
      <span style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em">PM</span>
    </div>`;
  for(const item of cp.items){
    const subAns=sub.checks?.[item.id]||'', pmAns=pm.checks?.[item.id]||'';
    const subBadge=`<span class="sub-ans ${subAns||'empty'}">${subAns==='y'?'Y':subAns==='n'?'N':subAns==='na'?'N/A':'—'}</span>`;
    const pmBadge=`<span class="sub-ans ${pmAns||'empty'}">${pmAns==='y'?'Y':pmAns==='n'?'N':pmAns==='na'?'N/A':'—'}</span>`;
    html+=`<div class="yna-row" style="cursor:default">
      <span class="yna-lbl">${x(item.label)}</span>
      <div style="display:flex;align-items:center;gap:8px">${subBadge}${pmBadge}</div>
    </div>`;
  }
  html+=_renderSpecRows(cp,data);
  const aAfter=(sub.photos||[]), aPM=(pm.photos||[]);
  if(aAfter.length||aPM.length){
    html+=`<div class="m-section">Photos</div>`;
    if(aAfter.length) html+=`<div class="photo-group after"><div class="photo-group-lbl">Sub Photos</div><div class="photo-grid">${aAfter.map(s=>`<img class="p-thumb" src="${s}" onclick="viewPhoto('${s}')">`).join('')}</div></div>`;
    if(aPM.length) html+=`<div class="photo-group pm-photos"><div class="photo-group-lbl">PM Photos</div><div class="photo-grid">${aPM.map(s=>`<img class="p-thumb" src="${s}" onclick="viewPhoto('${s}')">`).join('')}</div></div>`;
  }
  if(sub.notes||pm.notes){
    if(sub.notes) html+=`<details><summary style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;padding:8px 0;cursor:pointer;list-style:none;display:flex;align-items:center;gap:5px"><span style="font-size:10px">▶</span> Contractor Notes</summary><div style="font-size:12px;color:#374151;padding:7px 10px;background:#fffbeb;border-radius:4px;margin-top:4px">${x(sub.notes)}</div></details>`;
    if(pm.notes) html+=`<details><summary style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;padding:8px 0;cursor:pointer;list-style:none;display:flex;align-items:center;gap:5px"><span style="font-size:10px">▶</span> PM Notes</summary><div style="font-size:12px;color:#374151;padding:7px 10px;background:var(--green-bg);border-radius:4px;margin-top:4px">${x(pm.notes)}</div></details>`;
  }
  if(data.history?.length){
    let _hRows='';
    for(const h of data.history){const ht=h.ts?new Date(h.ts).toLocaleString('en-AU',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):fmtDate(h.date);_hRows+=`<div class="log-row"><span class="log-role ${h.role}">${h.role==='sub'?'Sub':'PM'}</span><span>${x(h.action)}</span><span style="margin-left:auto;color:#9ca3af">${x(h.name)} · ${ht}</span></div>`;}
    html+=`<details style="margin-top:2px"><summary style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;padding:8px 0;cursor:pointer;list-style:none;display:flex;align-items:center;gap:5px"><span style="font-size:10px">▶</span> History (${data.history.length})</summary><div class="history-log" style="margin-top:0;border-top:none">${_hRows}</div></details>`;
  }
  return html;
}

function getOrInitCpData(cpId){
  if(!CUR.cpData[cpId]) CUR.cpData[cpId]={outcome:'pending',sub:{checks:{},reasons:{},notes:'',before_photos:[],photos:[],name:'',date:''},pm:{checks:{},comments:{},notes:'',photos:[],name:'',date:'',rejection_note:''},history:[]};
  return CUR.cpData[cpId];
}

    <span class="yna-lbl">${x(item.label)}</span>
    <div class="yna-btns">
      <button class="yna-btn yes ${ans==='y'?'active':''}" onclick="setCpCheck('${item.id}','y')">Yes</button>
      <button class="yna-btn no ${ans==='n'?'active':''}" onclick="setCpCheck('${item.id}','n')">No</button>
      <button class="yna-btn na ${ans==='na'?'active':''}" onclick="setCpCheck('${item.id}','na')">N/A</button>
    </div></div>
    ${ans==='n'?`<div style="padding:2px 10px 8px"><input id="sub-reason-${item.id}" type="text" placeholder="Reason required…" value="${x((reasons||{})[item.id]||'')}" style="width:100%;padding:6px 9px;border:1px solid #fca5a5;border-radius:4px;font-size:12px;background:#fff8f8"></div>`:''}
  </div>`;
}
function _buildPMRowHtml(item, subAns, pmAns, comments){
  const subBadge=`<span class="sub-ans ${subAns||'empty'}">${subAns==='y'?'Y':subAns==='n'?'N':subAns==='na'?'N/A':'—'}</span>`;

    <span class="yna-lbl">${x(item.label)}</span>
    <div style="display:flex;align-items:center;gap:6px">
      ${subBadge}
      <div class="yna-btns">
        <button class="yna-btn yes ${pmAns==='y'?'active':''}" onclick="setCpCheck('${item.id}','y','pm')">Yes</button>
        <button class="yna-btn no ${pmAns==='n'?'active':''}" onclick="setCpCheck('${item.id}','n','pm')">No</button>
        <button class="yna-btn na ${pmAns==='na'?'active':''}" onclick="setCpCheck('${item.id}','na','pm')">N/A</button>
      </div>
    </div></div>
    ${pmAns==='n'?`<div style="padding:2px 10px 8px"><input id="pm-comment-${item.id}" type="text" placeholder="Comment required for No…" value="${x((comments||{})[item.id]||'')}" style="width:100%;padding:6px 9px;border:1px solid #fca5a5;border-radius:4px;font-size:12px;background:#fff8f8"></div>`:''}

function _buildPMDirectRowHtml(item, ans, reasons){
  return `<div id="cprow-${item.id}"><div class="yna-row">
    <span class="yna-lbl">${x(item.label)}</span>
    <div class="yna-btns">
      <button class="yna-btn yes ${ans==='y'?'active':''}" onclick="setPMDirectCheck('${item.id}','y')">Yes</button>
      <button class="yna-btn no ${ans==='n'?'active':''}" onclick="setPMDirectCheck('${item.id}','n')">No</button>

function setCpCheck(itemId, val, role='sub'){
  _saveCurrentSpecInputs();
  const data=getOrInitCpData(CUR_CP_ID);
  if(role==='sub') data.sub.checks[itemId]=val;
  else data.pm.checks[itemId]=val;
  const cp=CUR.checkpoints.find(c=>c.id===CUR_CP_ID);
  // Update just this row in-place — no full re-render, no blink
  const rowEl=document.getElementById('cprow-'+itemId);
  if(rowEl){
    const item=cp.items.find(i=>i.id===itemId); if(!item) return;
    const outcome=data.outcome;
    const newHtml = (outcome==='pending'||outcome==='rejected')
      ? _buildSubRowHtml(item, data.sub.checks[itemId]||'', data.sub.reasons)
      : _buildPMRowHtml(item, data.sub.checks[itemId]||'', data.pm.checks[itemId]||'', data.pm.comments);
    rowEl.outerHTML=newHtml;
    return;
  }
  // Fallback: full body update
  const outcome=data.outcome;
  const body=document.getElementById('cp-modal-body'); if(!body) return;
  const st=body.scrollTop;
  if(outcome==='pending'||outcome==='rejected') body.innerHTML=renderSubPhase(cp,data);
  else if(outcome==='sub_done') body.innerHTML=renderPMPhase(cp,data);
  body.scrollTop=st;
  if(role==='pm') toggleRejectionNote();
}

function toggleRejectionNote(){
  // called when send-back button hovered — actually show on click of Send Back
}

function _saveCurrentSpecInputs(){
  const cp=CUR.checkpoints.find(c=>c.id===CUR_CP_ID);
  if(!cp?.specs?.length||!CUR.cpData[CUR_CP_ID]) return;
  const data=CUR.cpData[CUR_CP_ID];
  if(!data.specData) data.specData={};
  for(const spec of cp.specs){
    const el=document.getElementById('spec-inp-'+spec.id);
    if(el) data.specData[spec.id]={...(data.specData[spec.id]||{}),value:el.value};
  }
}
function saveSpecInput(specId, val){
  const data=getOrInitCpData(CUR_CP_ID);
  if(!data.specData) data.specData={};
  data.specData[specId]={...(data.specData[specId]||{}),value:val};
  persist();
}
function _readSpecData(cpId){
  const cp=CUR.checkpoints.find(c=>c.id===cpId);
  if(!cp?.specs?.length) return {};
  const sd={...((CUR.cpData[cpId]||{}).specData||{})};
  for(const spec of cp.specs){
    const el=document.getElementById('spec-inp-'+spec.id);
    if(el) sd[spec.id]={...(sd[spec.id]||{}),value:el.value.trim()};
  }
  return sd;
}
function addSpecPhoto(input,specId){
  const file=input.files[0]; if(!file) return;
  _saveCurrentSpecInputs();
  const data=getOrInitCpData(CUR_CP_ID);
  if(!data.specData) data.specData={};
  if(!data.specData[specId]) data.specData[specId]={value:'',photo:null};
  // Show instant preview while encoding runs in background
  const slot=document.querySelector(`[data-spec-slot="${specId}"]`);
  if(slot){
    const previewUrl=URL.createObjectURL(file);
    slot.innerHTML=`<div style="position:relative"><img class="spec-thumb" src="${previewUrl}" style="opacity:.6"><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px">⏳</div></div>`;
  }
  resizeAndEncode(file,b64=>{

function saveSubCP(){
  const cp=CUR.checkpoints.find(c=>c.id===CUR_CP_ID);
  const data=getOrInitCpData(CUR_CP_ID);
  const name=document.getElementById('sub-name')?.value.trim()||'';
  const date=new Date().toISOString().slice(0,10);
  const notes=document.getElementById('sub-notes')?.value.trim()||'';
  if(!name){alert('Please enter your name before submitting.');return;}
  if(!data.sub.photos||!data.sub.photos.length){alert('Please upload at least one photo before submitting.');return;}
  // Collect answers
  for(const item of cp.items){
    const el=document.querySelector(`.yna-btn.yes.active[onclick*="${item.id}"], .yna-btn.no.active[onclick*="${item.id}"], .yna-btn.na.active[onclick*="${item.id}"]`);
  }
  // Check all answered
  const unanswered=cp.items.filter(i=>!data.sub.checks[i.id]);
  if(unanswered.length){alert(`Please answer all ${unanswered.length} unanswered item${unanswered.length!==1?'s':''}.`);return;}
  if(!data.sub.reasons) data.sub.reasons={};
  for(const item of cp.items){
    if(data.sub.checks[item.id]==='n'){
      const r=document.getElementById(`sub-reason-${item.id}`)?.value.trim()||'';
      if(!r){alert(`Please provide a reason for the "No" on: ${item.label}`);return;}
      data.sub.reasons[item.id]=r;
    }
  }
  // Any No = rejected, else sub_done
  const hasNo=Object.values(data.sub.checks).some(v=>v==='n');
  if((cp.specs||[]).length) data.specData=_readSpecData(CUR_CP_ID);
  data.sub.name=name; data.sub.date=date; data.sub.notes=notes; data.sub.ts=new Date().toISOString();
  data.outcome=hasNo?'rejected':'sub_done';
  if(!data.history) data.history=[];
  data.history.push({role:'sub',action:hasNo?'Submitted (with issues)':'Submitted for PM review',name,date,ts:new Date().toISOString()});
  CUR.cpData[CUR_CP_ID]=data;
  persist();
  closeModal();
  renderProject();
}

function savePMCP(outcome){
  const cp=CUR.checkpoints.find(c=>c.id===CUR_CP_ID);
  const data=getOrInitCpData(CUR_CP_ID);
  const name=document.getElementById('pm-name')?.value.trim()||'';
  const date=new Date().toISOString().slice(0,10);
  const notes=document.getElementById('pm-notes')?.value.trim()||'';
  if(outcome==='approved'&&!name){alert('Please enter your name to approve.');return;}
  // Collect pm comments for No items
  for(const item of cp.items){
    const pmAns=data.pm.checks[item.id];
    if(pmAns==='n'){
      const commentEl=document.getElementById(`pm-comment-${item.id}`);
      if(commentEl) data.pm.comments[item.id]=commentEl.value.trim();
      if(outcome==='approved'&&!(data.pm.comments[item.id])){
        alert(`Please add a comment for the "No" answer on: ${item.label}`);return;
      }
    }
  }
  if((cp.specs||[]).length) data.specData=_readSpecData(CUR_CP_ID);
  data.pm.name=name; data.pm.date=date; data.pm.notes=notes; data.pm.ts=new Date().toISOString();
  data.outcome=outcome;
  if(!data.history) data.history=[];
  data.history.push({role:'pm',action:outcome==='approved'?'Approved':'Returned to sub',name,date,ts:new Date().toISOString()});
  if(outcome==='rejected'){
    // Reset sub data for re-submission — clear all answers, photos and name
    data.sub.checks={}; data.sub.reasons={}; data.sub.photos=[]; data.sub.date=''; data.sub.name=''; data.sub.notes=''; delete data.sub.ts;
  }
  CUR.cpData[CUR_CP_ID]=data;
  persist();
  if(outcome==='rejected'){
    renderCpModal();
  } else {
    closeModal();
    renderProject();
  }
}

function _buildPMDirectBody(cp, data){
  const outcome=data.outcome||'pending';
  const pm=data.pm||{checks:{},notes:'',name:'',date:''};
  const isApproved=outcome==='approved';
  const statusBar=isApproved
    ?`<div style="background:var(--green-bg);border:1px solid #6ee7b7;border-radius:6px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#065f46">✓ Completed by <strong>${x(pm.name||'PM')}</strong> on ${fmtDate(pm.date||'')}</div>`:'';
  let itemsHtml='';
  for(const item of cp.items){
    if(isApproved){
      const ans=pm.checks[item.id]||'';
      const badge=`<span class="sub-ans ${ans||'empty'}">${ans==='y'?'Y':ans==='n'?'N':ans==='na'?'N/A':'—'}</span>`;
      const reasonTxt=ans==='n'&&pm.reasons?.[item.id]?`<div style="font-size:11px;color:var(--red);margin-top:2px">${x(pm.reasons[item.id])}</div>`:'';
      itemsHtml+=`<div class="yna-row" style="cursor:default"><span class="yna-lbl">${x(item.label)}${reasonTxt}</span>${badge}</div>`;
    } else {
      itemsHtml+=_buildPMDirectRowHtml(item, pm.checks[item.id]||'', pm.reasons);
    }
  }
  const photos=pm.photos||[];
  const photosHtml=photos.map((src,i)=>`<div class="p-wrap"><img class="p-thumb-sm" src="${src}" onclick="viewPhoto('${src}')"><button class="p-del" onclick="removePMDirectPhoto(${i})">×</button></div>`).join('');
  const notesSection=isApproved&&!pm.notes?'':`<div class="m-section">PM Notes</div>
    ${isApproved
      ?`<div style="font-size:12px;color:#374151;padding:7px 10px;background:var(--green-bg);border-radius:4px">${x(pm.notes)}</div>`
      :`<textarea id="pmd-notes" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;font-size:13px;min-height:60px;resize:vertical" placeholder="Optional notes…">${x(pm.notes||'')}</textarea>`}`;
  const signSection=isApproved?'':`<div style="display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
      <span style="font-size:11px;color:#94a3b8;white-space:nowrap">Completed by:</span>
      <input id="pmd-name" type="text" value="${x(pm.name||CUR.project?.pm||'')}" placeholder="Your name" style="flex:1;max-width:220px;padding:5px 9px;border:1px solid var(--border);border-radius:5px;font-size:12px">
    </div>`;
  return `${statusBar}<div class="m-section">Inspection Items</div>${itemsHtml}
    ${notesSection}${signSection}`;
}

function confirmDuplicateLocation(srcLocId){
  const name=document.getElementById('dup-loc-name').value.trim();
  if(!name){alert('Please enter a name for the new location.');return;}
  const newLoc={id:uid(),name,order:CUR.locations.length};
  CUR.locations.push(newLoc);
  const srcTrades=CUR.trades.filter(t=>t.location_id===srcLocId);
  const tradeIdMap={};
  for(const t of srcTrades){
    const newTradeId=uid();
    tradeIdMap[t.id]=newTradeId;
    CUR.trades.push({id:newTradeId,location_id:newLoc.id,trade_type:t.trade_type,name:t.name||TRADE_MAP[t.trade_type]?.name||t.trade_type,sub_name:t.sub_name,sub_contact:t.sub_contact,scope:t.scope,order:t.order});

  // Duplicate task items (not deep data)

function _renderPickerPanel(){
  // 2-column picker: Group | Items — locked to task's own trade (_pickerTrade)
  const typeLabels={pass_fail:'Pass/Fail',photo_before:'Before photo',photo_after:'After photo',photo:'Photo',text:'Text note',pm_signoff:'PM Sign-off',link:'Link',document:'Document'};
  const groups=(getTradeLib(_pickerTrade)?.groups)||[];

  /* ---- COL 1: GROUP ---- */
  const groupRows=groups.length
    ? groups.map(g=>{
        const pickable=(g.items||[]).filter(it=>it.type!=='photo'&&it.type!=='pm_signoff'||g.id==='g_warranty');
        const tickedItems=(CUR.taskItems||[]).filter(i=>i.trade_id===CUR_TRADE_ID&&pickable.some(gi=>gi.id===i.lib_id)).sort((a,b)=>a.order-b.order);
        let ticked=0;
        for(let ti=0;ti<tickedItems.length;ti++){
          if(tickedItems[ti].type==='photo_before'&&tickedItems[ti+1]?.type==='photo_after'){ti++;}
          ticked++;
        }
        const countBadge=ticked>0?`<span class="ts-grp-count">${ticked}</span>`:'';
        return `<button class="ts-list-btn${g.id===_pickerGroup?' active':''}" onclick="setPickerGroup('${g.id}')"><span>${x(g.name)}</span>${countBadge}</button>`;
      }).join('')
    : `<div style="padding:16px 12px;font-size:11px;color:#94a3b8">No groups defined for this trade.</div>`;
  const col1=`<div class="ts-col ts-pcol-group">
    <div class="ts-col-hdr"><span class="ts-step" style="background:#64748b;color:#fff">1</span> Group <span style="margin-left:auto;color:#cbd5e0;font-size:12px;font-weight:400">›</span></div>${groupRows}
  </div>`;

  /* ---- COL 2: ITEMS ---- */
  let itemRows='<div style="padding:20px 14px;font-size:11px;color:#94a3b8;text-align:center;line-height:1.8">← Select a group<br>to see items</div>';
  if(_pickerGroup){
    const group=groups.find(g=>g.id===_pickerGroup);
    if(group&&group.items.length){
      const pickable=group.items.filter(it=>it.type!=='photo'||group.id==='g_warranty');
      const addedCount=(CUR.taskItems||[]).filter(i=>i.trade_id===CUR_TRADE_ID&&pickable.some(gi=>gi.id===i.lib_id)).length;
      const allSel=pickable.length>0&&addedCount===pickable.length;
      const quickBtns=`<div style="padding:4px 10px;border-bottom:1px solid #e8f0fb;background:#f5f9ff;flex-shrink:0;text-align:right">
        <button style="font-size:10px;padding:2px 8px;border:1px solid ${allSel?'#fca5a5':'#93c5fd'};border-radius:10px;background:${allSel?'#fee2e2':'#dbeafe'};color:${allSel?'#dc2626':'#2563eb'};cursor:pointer;font-weight:600" onclick="toggleAllPickerGroup()">${allSel?'Remove all':'Add all'}</button>
      </div>`;
      // Build item rows — combine adjacent photo_before+photo_after into one row
      // Skip standalone 'photo' type outside warranty group (Photo/s is no longer auto-standard)
      const rows=[];
      const gitems=group.items.filter(it=>it.type!=='photo'||group.id==='g_warranty');
      for(let i=0;i<gitems.length;i++){
        const item=gitems[i];
        const next=gitems[i+1];
        if(item.type==='photo_before'&&next?.type==='photo_after'){
          // Combined Before & After row
          const selB=(CUR.taskItems||[]).some(ti=>ti.trade_id===CUR_TRADE_ID&&ti.lib_id===item.id);
          const selA=(CUR.taskItems||[]).some(ti=>ti.trade_id===CUR_TRADE_ID&&ti.lib_id===next.id);
          const both=selB&&selA;
          const _jg=JSON.stringify(group.name).replace(/"/g,'&quot;');
          rows.push(`<label class="ts-check-item${both?' sel':''}">
            <input type="checkbox" ${both?'checked':''} onchange="togglePickerItemPair('${item.id}','${next.id}',&quot;Before photo&quot;,&quot;After photo&quot;,'photo_before','photo_after',${_jg},this.checked)">
            <span class="ts-check-label">Before &amp; After photos</span>
            <span class="ts-check-type">Before &amp; After</span>
          </label>`);
          i++; // skip the after item
        } else {
          const sel=(CUR.taskItems||[]).some(ti=>ti.trade_id===CUR_TRADE_ID&&ti.lib_id===item.id);
          const _jl=JSON.stringify(item.label).replace(/"/g,'&quot;');
          const _jg=JSON.stringify(group.name).replace(/"/g,'&quot;');
          rows.push(`<label class="ts-check-item${sel?' sel':''}">
            <input type="checkbox" ${sel?'checked':''} onchange="togglePickerItem('${item.id}',${_jl},'${item.type}',${_jg})">
            <span class="ts-check-label">${x(item.label)}</span>
            <span class="ts-check-type">${typeLabels[item.type]||item.type}</span>
          </label>`);
        }
      }
      itemRows=quickBtns+rows.join('');
    } else if(group){
      itemRows='<div style="padding:16px 12px;font-size:11px;color:#94a3b8;text-align:center">No items in this group.</div>';
    }
  }
  const col2=`<div class="ts-col ts-pcol-items">
    <div class="ts-col-hdr" style="color:#1d4ed8;background:#dbeafe;border-bottom-color:#bfdbfe"><span class="ts-step" style="background:#3b82f6;color:#fff">2</span> Items <span style="margin-left:auto;color:#93c5fd;font-size:12px;font-weight:400">›</span></div>${itemRows}
  </div>`;

  return col1+col2;
}
function togglePickerItemPair(idB,idA,labelB,labelA,typeB,typeA,groupName,checked){
  if(!CUR.taskItems) CUR.taskItems=[];
  if(checked){
    if(!CUR.taskItems.some(i=>i.trade_id===CUR_TRADE_ID&&i.lib_id===idB)){
      CUR.taskItems.push({id:uid(),trade_id:CUR_TRADE_ID,lib_id:idB,label:labelB,type:typeB,group:groupName,order:CUR.taskItems.filter(i=>i.trade_id===CUR_TRADE_ID).length});
    }
    if(!CUR.taskItems.some(i=>i.trade_id===CUR_TRADE_ID&&i.lib_id===idA)){
      CUR.taskItems.push({id:uid(),trade_id:CUR_TRADE_ID,lib_id:idA,label:labelA,type:typeA,group:groupName,order:CUR.taskItems.filter(i=>i.trade_id===CUR_TRADE_ID).length});
    }
  } else {
    CUR.taskItems=CUR.taskItems.filter(i=>!(i.trade_id===CUR_TRADE_ID&&(i.lib_id===idB||i.lib_id===idA)));
  }
  const pEl=document.getElementById('ts-picker');
  if(pEl) pEl.innerHTML=_renderPickerPanel();
  const aEl=document.getElementById('ts-added');
  if(aEl) aEl.innerHTML=_buildAddedItemsHtml();
  const cEl=document.getElementById('ts-item-count');
  if(cEl) cEl.textContent=_visibleItemCount(CUR_TRADE_ID);
}
// Visible row count — B&A pair counts as 1 row
function _visibleItemCount(tradeId){
  const items=(CUR.taskItems||[]).filter(i=>i.trade_id===tradeId).sort((a,b)=>a.order-b.order);
  let n=0;
  for(let i=0;i<items.length;i++){
    if(items[i].type==='photo_before'&&items[i+1]?.type==='photo_after'){i++;} // pair = 1
    n++;
  }
  return n;
}
function toggleAllPickerGroup(){
  if(!_pickerTrade||!_pickerGroup) return;
  const group=(getTradeLib(_pickerTrade)?.groups||[]).find(g=>g.id===_pickerGroup);
  if(!group) return;
  if(!CUR.taskItems) CUR.taskItems=[];
  const pickable=group.items.filter(it=>it.type!=='photo'||group.id==='g_warranty');
  const allSel=pickable.length>0&&pickable.every(gi=>CUR.taskItems.some(i=>i.trade_id===CUR_TRADE_ID&&i.lib_id===gi.id));
  if(allSel){
    // Remove all
    const libIds=new Set(pickable.map(i=>i.id));
    CUR.taskItems=CUR.taskItems.filter(i=>!(i.trade_id===CUR_TRADE_ID&&libIds.has(i.lib_id)));
  } else {
    // Add missing
    pickable.forEach(item=>{
      if(!CUR.taskItems.some(i=>i.trade_id===CUR_TRADE_ID&&i.lib_id===item.id)){
        const order=CUR.taskItems.filter(i=>i.trade_id===CUR_TRADE_ID).length;
        CUR.taskItems.push({id:uid(),trade_id:CUR_TRADE_ID,lib_id:item.id,label:item.label,type:item.type,group:group.name,order});
      }
    });
  }
  persist();
  const pEl=document.getElementById('ts-picker');
  if(pEl) pEl.innerHTML=_renderPickerPanel();
  const aEl=document.getElementById('ts-added');
  if(aEl) aEl.innerHTML=_buildAddedItemsHtml();
  const cEl=document.getElementById('ts-item-count');
  if(cEl) cEl.textContent=_visibleItemCount(CUR_TRADE_ID);
}
function _buildAddedItemsHtml(){
  const items=(CUR.taskItems||[]).filter(i=>i.trade_id===CUR_TRADE_ID).sort((a,b)=>a.order-b.order);
  if(!items.length) return '<div class="picker-empty">No items added yet.<br><span style="font-size:11px">Tick items on the left, or type a custom item below.</span></div>';
  const typeInfo={
    pass_fail:{icon:'✓',color:'#16a34a',label:'Pass / Fail'},
    photo_before:{icon:'📷',color:'#b45309',label:'Before photo'},
    photo_after:{icon:'📷',color:'#1d4ed8',label:'After photo'},
    photo:{icon:'📷',color:'#6b7280',label:'Photo'},
    text:{icon:'✏',color:'#6b7280',label:'Text note'},
    pm_signoff:{icon:'✅',color:'#7c3aed',label:'PM Sign-off'},
    link:{icon:'🔗',color:'#0369a1',label:'Link'},
    document:{icon:'📄',color:'#6b7280',label:'Document'},
  };
  const WARRANTY_GRP='Product & Warranty';

  // Bucket items by section
  const baItems=[], generalItems=[], pmItems=[], warrantyItems=[];
  const groupBuckets={}; // groupName -> items[]

  const processed=new Set();
  for(let i=0;i<items.length;i++){
    const item=items[i];
    if(processed.has(item.id)) continue;
    if(item.type==='photo_before'||item.type==='photo_after'){
      // Keep B&A pairs together — grab paired item too
      if(item.type==='photo_before'){
        const nxt=items[i+1];
        if(nxt?.type==='photo_after'&&!processed.has(nxt.id)){
          baItems.push({before:item,after:nxt});
          processed.add(item.id); processed.add(nxt.id); i++;
        } else { baItems.push({before:item,after:null}); processed.add(item.id); }
      } else { baItems.push({before:null,after:item}); processed.add(item.id); }
    } else if(item.type==='pm_signoff'){
      pmItems.push(item); processed.add(item.id);
    } else if(item.group===WARRANTY_GRP){
      warrantyItems.push(item); processed.add(item.id);
    } else if(!item.group||item.group==='General'){
      generalItems.push(item); processed.add(item.id);
    } else {
      if(!groupBuckets[item.group]) groupBuckets[item.group]=[];
      groupBuckets[item.group].push(item); processed.add(item.id);
    }
  }

  // Order group buckets by lib group order
  const lib=getTradeLib(_pickerTrade);
  const libGroupOrder=(lib?.groups||[]).map(g=>g.name).filter(n=>n!==WARRANTY_GRP);
  const orderedGroupNames=[];
  for(const n of libGroupOrder){ if(groupBuckets[n]) orderedGroupNames.push(n); }
  for(const n of Object.keys(groupBuckets)){ if(!orderedGroupNames.includes(n)) orderedGroupNames.push(n); }

  const out=[];
  let n=1;

  const sectionHdr=(label,cls='')=>`<div class="added-section-hdr${cls?' '+cls:''}">${label}</div>`;

  // Row builders
  const dragAttrs=(id)=>`draggable="true" ondragstart="itemDragStart(event,'${id}')" ondragover="itemDragOver(event,'${id}')" ondrop="itemDrop(event,'${id}')" ondragend="itemDragEnd(event)"`;
  const baRow=(before,after)=>{
    const _jlB=JSON.stringify(before?.label||'Before').replace(/"/g,'&quot;');
    const _jlA=JSON.stringify(after?.label||'After').replace(/"/g,'&quot;');
    const _jgB=JSON.stringify(before?.group||'').replace(/"/g,'&quot;');
    const anchorId=before?.id||after?.id;
    if(before&&after) return `<div class="added-item-row" ${dragAttrs(anchorId)}>
      <span class="drag-handle">⠿</span>
      <span class="added-item-num">${n++}</span>
      <span class="added-item-icon" style="color:#b45309">📷</span>
      <div class="added-item-info" style="flex:1;min-width:0">
        <div class="added-item-label">Before &amp; After photos</div>
        <div class="added-item-type" style="display:flex;gap:6px">
          <span style="background:#fff7ed;color:#b45309;border-radius:3px;padding:1px 5px;font-size:10px;font-weight:600">Before</span>
          <span style="background:#eff6ff;color:#1d4ed8;border-radius:3px;padding:1px 5px;font-size:10px;font-weight:600">After</span>
        </div>
      </div>
      <button class="added-item-del" onclick="togglePickerItemPair('${before.lib_id}','${after.lib_id}',${_jlB},${_jlA},'photo_before','photo_after',${_jgB},false)" title="Remove">×</button>
    </div>`;
    const item=before||after;
    return itemRow(item);
  };
  const itemRow=(item)=>{
    const ti=typeInfo[item.type]||{icon:'•',color:'#94a3b8',label:item.type};
    const delBtn = item.custom || !item.lib_id
      ? `<button class="added-item-del" onclick="removeCustomItem('${item.id}')">×</button>`
      : `<button class="added-item-del" onclick="togglePickerItem('${item.lib_id}',${JSON.stringify(item.label).replace(/"/g,'&quot;')},'${item.type}',${JSON.stringify(item.group||'').replace(/"/g,'&quot;')})">×</button>`;
    return `<div class="added-item-row" ${dragAttrs(item.id)}>
      <span class="drag-handle">⠿</span>
      <span class="added-item-num">${n++}</span>
      <span class="added-item-icon" style="color:${ti.color}">${ti.icon}</span>
      <div class="added-item-info">
        <input class="added-item-label-input" value="${x(item.label)}" title="Click to rename" oninput="renameTaskItem('${item.id}',this.value)">
        <div class="added-item-type">${item.custom?'<span style="background:#ede9fe;color:#6d28d9;padding:0 4px;border-radius:3px;font-size:9px;margin-right:3px;font-weight:700">CUSTOM</span>':''}${ti.label}</div>
      </div>
      ${delBtn}
    </div>`;
  };

  // 1. B&A photos — no header
  if(baItems.length){ baItems.forEach(p=>out.push(baRow(p.before,p.after))); }

  // 2. Trade groups — no headers, just flat items
  for(const gName of orderedGroupNames){
    (groupBuckets[gName]||[]).forEach(item=>out.push(itemRow(item)));
  }

  // 3. General — no header, continues flat
  generalItems.forEach(item=>out.push(itemRow(item)));

  // 4. Warranty — before PM sign-off
  if(warrantyItems.length){
    out.push(sectionHdr('Product &amp; Warranty','warranty'));
    warrantyItems.forEach(item=>out.push(itemRow(item)));
  }

  // 5. PM Sign-off — always absolute last
  if(pmItems.length){
    out.push(sectionHdr('PM Sign-off','pm'));
    pmItems.forEach(item=>out.push(itemRow(item)));
  }

  return out.join('');
}
function _buildBAPhotoHtml(tradeId){
  const pairs=(CUR.baPhotos?.[tradeId]||[{before:null,after:null}]);
  const boxes=pairs.map((pair,pi)=>`
    <div style="display:inline-flex;flex-direction:row;border:1px solid #dde5f0;border-radius:8px;overflow:hidden;flex-shrink:0">
      <div style="padding:6px 8px;border-right:1px solid #dde5f0;background:#fffbf5;width:90px;box-sizing:border-box">
        <div style="font-size:9px;font-weight:700;text-transform:uppercase;color:#b45309;margin-bottom:4px;text-align:center;letter-spacing:.04em">Before</div>

      </div>
      <div style="padding:6px 8px;background:#f8faff;width:90px;box-sizing:border-box">
        <div style="font-size:9px;font-weight:700;text-transform:uppercase;color:var(--blue);margin-bottom:4px;text-align:center;letter-spacing:.04em">After</div>
        ${pair.after?`<div class="p-wrap"><img class="p-thumb-sm" src="${pair.after}" onclick="viewPhoto('${pair.after}')"><button class="p-del" onclick="removeBAPhoto('${tradeId}',${pi},'after');document.getElementById('ts-ba-photos').innerHTML=_buildBAPhotoHtml('${tradeId}')">×</button></div>`:`<label class="p-add-sm" style="width:100%;box-sizing:border-box"><div style="font-size:14px">📷</div><div>Add</div><input type="file" accept="image/*" style="display:none" onchange="addBAPhoto(this,'${tradeId}',${pi},'after');setTimeout(()=>document.getElementById('ts-ba-photos').innerHTML=_buildBAPhotoHtml('${tradeId}'),200)"></label>`}
      </div>
    </div>`).join('');
  return `<div style="display:flex;flex-wrap:wrap;align-items:flex-start;gap:8px">${boxes}</div>`;
}

let _dragItemId=null;
function _itemSection(item){
  if(!item) return '';
  if(item.type==='photo_before'||item.type==='photo_after') return '__ba__';
  if(item.type==='pm_signoff') return '__pm__';
  if(item.group==='Product & Warranty') return '__warranty__';
  return item.group||'General';
}
function itemDragStart(e,itemId){
  _dragItemId=itemId;
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>{const el=e.target.closest('.added-item-row');if(el)el.classList.add('is-dragging');},0);
}
function itemDragOver(e,targetId){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  const dragItem=(CUR.taskItems||[]).find(i=>i.id===_dragItemId);
  const targetItem=(CUR.taskItems||[]).find(i=>i.id===targetId);
  if(!dragItem||!targetItem||_itemSection(dragItem)!==_itemSection(targetItem)) return;
  document.querySelectorAll('.added-item-row.drag-over').forEach(el=>el.classList.remove('drag-over'));
  const el=e.target.closest('.added-item-row');
  if(el) el.classList.add('drag-over');
}
function itemDrop(e,targetId){
  e.preventDefault();
  document.querySelectorAll('.added-item-row.drag-over').forEach(el=>el.classList.remove('drag-over'));
  if(!_dragItemId||_dragItemId===targetId) return;
  const dragItem=(CUR.taskItems||[]).find(i=>i.id===_dragItemId);
  const targetItem=(CUR.taskItems||[]).find(i=>i.id===targetId);
  if(!dragItem||!targetItem) return;
  if(_itemSection(dragItem)!==_itemSection(targetItem)) return;
  const tmp=dragItem.order; dragItem.order=targetItem.order; targetItem.order=tmp;
  persist();
  const el=document.getElementById('ts-added');
  if(el) el.innerHTML=_buildAddedItemsHtml();
}
function itemDragEnd(e){
  _dragItemId=null;
  document.querySelectorAll('.added-item-row.is-dragging,.added-item-row.drag-over').forEach(el=>el.classList.remove('is-dragging','drag-over'));
}
function renameTaskItem(itemId, val){
  const item=(CUR.taskItems||[]).find(i=>i.id===itemId);
  if(item) item.label=val;
  persist();
  // update count display without re-rendering the whole panel
  const cnt=document.getElementById('ts-item-count');
  if(cnt) cnt.textContent=_visibleItemCount(item?.trade_id);
}

function deleteTask(tradeId){
  const trade=CUR.trades.find(t=>t.id===tradeId);
  if(!trade) return;
  const tradeName=trade.name||TRADE_MAP[trade.trade_type]?.name||trade.trade_type;
  if(!confirm(`Remove "${tradeName}" and all its items from this location? This cannot be undone.`)) return;
  if(CUR.taskItems) CUR.taskItems=CUR.taskItems.filter(i=>i.trade_id!==tradeId);
  if(CUR.taskData) delete CUR.taskData[tradeId];
  delete CUR.signoffs[tradeId];
  if(CUR.baPhotos) delete CUR.baPhotos[tradeId];
  CUR.trades=CUR.trades.filter(t=>t.id!==tradeId);
  persist();
  VIEW=(_taskSetupReturnView==='actions')?'actions':'project';
  _taskSetupReturnView='project';
  if(VIEW==='actions'){ renderActions(); } else { renderProject(); }
  renderHeader(); renderBreadcrumb();
}
function saveTradeSetup(){
  const trade=CUR.trades.find(t=>t.id===CUR_TRADE_ID);
  if(!trade) return;
  const nameVal=document.getElementById('ts-task-name')?.value.trim();
  if(nameVal) trade.name=nameVal;
  const tradeVal=document.getElementById('ts-trade')?.value;
  if(tradeVal) trade.trade_type=tradeVal;
  const scopeVal=document.getElementById('ts-scope')?.value.trim();
  if(scopeVal!==undefined) trade.scope=scopeVal;
  persist();
  VIEW=(_taskSetupReturnView==='actions')?'actions':'project';
  _taskSetupReturnView='project';
  if(VIEW==='actions'){ renderActions(); } else { renderProject(); }
  renderHeader(); renderBreadcrumb();
}

function openSignoff(type, tradeId){
  if(tradeId) CUR_TRADE_ID=tradeId;
  const label=type==='sub'?'Subcontractor':'PM';
  const signoff=CUR.signoffs[CUR_TRADE_ID]||{};
  const nameVal=type==='sub'?signoff.sub_name||'':signoff.pm_name||'';
  const dateVal=type==='sub'?signoff.sub_date||'':signoff.pm_date||'';
  const _soTrade=CUR.trades.find(t=>t.id===CUR_TRADE_ID);
  const _soLoc=CUR.locations.find(l=>l.id===_soTrade?.location_id);
  const _soTradeName=_soTrade?.name||TRADE_MAP[_soTrade?.trade_type]?.name||'';
  openModal(`<div class="modal" style="max-width:380px">
    <div class="m-hdr navy"><div>${modalBc([CUR.project?.name,_soLoc?.name,_soTradeName])}<h2>${label} Sign-off</h2><p>Confirm trade is complete at this location</p></div>
      <button class="m-close" onclick="closeModal()">×</button></div>
    <div class="m-body" style="padding:14px 18px">
      <div class="fg"><label>Full Name</label><input id="so-name" type="text" value="${x(nameVal)}" placeholder="${label} name" autofocus></div>
      <div class="fg" style="margin-bottom:0"><label>Date</label><input id="so-date" type="date" value="${dateVal||new Date().toISOString().slice(0,10)}"></div>
    </div>
    <div class="m-foot">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-green btn-sm" onclick="saveSignoff('${type}')">Confirm Sign-off</button>
    </div>
  </div>`);
}
function saveSignoff(type){
  const name=document.getElementById('so-name').value.trim();
  const date=document.getElementById('so-date').value;
  if(!name){alert('Please enter a name.');return;}
  if(!CUR.signoffs[CUR_TRADE_ID]) CUR.signoffs[CUR_TRADE_ID]={};
  if(type==='sub'){CUR.signoffs[CUR_TRADE_ID].sub_name=name;CUR.signoffs[CUR_TRADE_ID].sub_date=date;}
  else{CUR.signoffs[CUR_TRADE_ID].pm_name=name;CUR.signoffs[CUR_TRADE_ID].pm_date=date;}
  persist(); closeModal(); renderProject();
}
function toggleTradeSignoff(tradeId,type,checked){
  if(!CUR.signoffs[tradeId]) CUR.signoffs[tradeId]={};
  const today=new Date().toISOString().slice(0,10);
  if(checked){
    const name=type==='pm'?(CUR.project?.pm||'PM'):(CUR.project?.client||'Subcontractor');
    if(type==='sub'){CUR.signoffs[tradeId].sub_name=name;CUR.signoffs[tradeId].sub_date=today;}
    else{CUR.signoffs[tradeId].pm_name=name;CUR.signoffs[tradeId].pm_date=today;}
  } else {
    if(type==='sub'){delete CUR.signoffs[tradeId].sub_name;delete CUR.signoffs[tradeId].sub_date;}
    else{delete CUR.signoffs[tradeId].pm_name;delete CUR.signoffs[tradeId].pm_date;}
  }
  persist(); renderProject();
}

let ACT_STATUS = 'all';   // all | attention | sub_done | approved
let ACT_GROUP  = 'loc';   // loc | trade
let ACT_TRADE  = '';      // trade type filter
let ACT_LOC    = '';      // location id filter
let ACT_SCOPE  = 'outstanding'; // 'outstanding' | 'complete' | 'all'

function goActions(){
  VIEW='actions'; ACT_STATUS='all'; ACT_TRADE=''; ACT_LOC=''; ROLE_FILTER='location'; ACT_SCOPE='outstanding';
  renderAll();
}
function setActScope(v){ ACT_SCOPE=v; renderActions(); }
function goActionsForSub(subName){
  VIEW='actions'; ACT_STATUS='all'; ACT_TRADE=''; ACT_LOC='';
  ROLE_FILTER='sub:'+subName; ACT_SCOPE='outstanding';
  renderAll();
}

function renderActions(){
  if(!CUR){ goHome(); return; }

  // Build flat list of all tasks with context
  const allItems = [];
  for(const trade of CUR.trades){
    const loc = CUR.locations.find(l=>l.id===trade.location_id);
    if(!loc) continue;
    const outcome = tradeStatus(trade.id);
    const data = (CUR.taskData||{})[trade.id]||{};
    allItems.push({ trade, loc, outcome, data, pmOnly: !!trade.pm_only });
  }

  // Unique sub names across all non-pm trades
  const subNames = [...new Set(CUR.trades.filter(t=>!t.pm_only&&t.sub_name).map(t=>t.sub_name))].sort();
  const isSub = ROLE_FILTER.startsWith('sub:');
  const activeSub = isSub ? ROLE_FILTER.slice(4) : '';

  // Role-based filter
  let filtered = allItems;
  if(ROLE_FILTER==='pm'){
    filtered = filtered.filter(i=>
      i.pmOnly ||
      ['setup','sub_done','attention','rejected'].includes(i.outcome) ||
      (!i.pmOnly && !i.trade.sub_name && i.outcome!=='approved')
    );
  } else if(isSub){
    filtered = filtered.filter(i=>!i.pmOnly && i.trade.sub_name===activeSub && !['setup','no_sub'].includes(i.outcome));
  } else {
    // Location / Contractor — exclude pm_only and tasks not yet ready for a sub
    filtered = filtered.filter(i=>!i.pmOnly && !['setup','no_sub'].includes(i.outcome));
  }

  // Scope filter: outstanding (non-approved), complete (approved only), or all
  if(ACT_SCOPE==='outstanding') filtered = filtered.filter(i=>i.outcome!=='approved');
  else if(ACT_SCOPE==='complete') filtered = filtered.filter(i=>i.outcome==='approved');
  // 'all' = no filter applied

  // Grouping: Contractor + sub-filter → by contractor name; everything else → by location
  const groupByContractor = (ROLE_FILTER==='contractor' || isSub);
  let groups = [];
  if(groupByContractor){
    const subGroupMap = {};
    for(const item of filtered){
      const key = item.trade.sub_name || '(Unassigned)';
      if(!subGroupMap[key]) subGroupMap[key] = { label: key, items: [] };
      subGroupMap[key].items.push(item);
    }
    // If filtered to a specific sub just show their tasks flat under one heading
    groups = Object.values(subGroupMap).sort((a,b)=>
      a.label==='(Unassigned)'?1:b.label==='(Unassigned)'?-1:a.label.localeCompare(b.label));
    // Within each contractor group, sort by location order
    const locOrderMap = {};
    CUR.locations.forEach((l,i)=>locOrderMap[l.id]=(l.order??i));
    groups.forEach(g=>{
      g.items.sort((a,b)=>(locOrderMap[a.loc.id]??99)-(locOrderMap[b.loc.id]??99));
    });
  } else {
    // Include prestart location if PM view (it has pm_only tasks)
    const locOrder = CUR.locations
      .filter(l=> ROLE_FILTER==='pm' ? true : !l.prestart)
      .sort((a,b)=>(a.order??0)-(b.order??0))
      .map(l=>l.id);
    const locGroupMap = {};
    for(const item of filtered){
      const key = item.loc.id;
      if(!locGroupMap[key]) locGroupMap[key] = { label: item.loc.name, items: [] };
      locGroupMap[key].items.push(item);
    }
    groups = locOrder.map(id=>locGroupMap[id]).filter(Boolean);
    // Within each location group, sort by trade order
    groups.forEach(g=>{
      g.items.sort((a,b)=>(a.trade.order??0)-(b.trade.order??0));
    });
  }

  // Contractor dropdown (shown on Contractor tab + when a sub is active)
  const subOpts = subNames.map(sn=>
    `<option value="sub:${x(sn)}" ${ROLE_FILTER===`sub:${sn}`?'selected':''}>${x(sn)}</option>`
  ).join('');
  const showSubDrop = ROLE_FILTER==='contractor'||isSub;
  // Always reserve the dropdown's width when subs exist — use visibility:hidden rather than conditional render
  // so the Outstanding/Complete toggle doesn't jump left/right as tabs switch
  const subDropdown = subNames.length ? `<select onchange="setRoleFilter(this.value);this.blur()"
    style="height:34px;padding:0 28px 0 10px;border:1px solid var(--border);border-radius:6px;background:#fff url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2210%22 height=%226%22 viewBox=%220 0 10 6%22><path d=%22M0 0l5 6 5-6z%22 fill=%22%2394a3b8%22/></svg>') no-repeat right 9px center;background-size:10px;appearance:none;font-size:12px;font-weight:600;color:${isSub?'var(--navy)':'#94a3b8'};cursor:pointer;outline:none;min-width:140px;visibility:${showSubDrop?'visible':'hidden'}">
    <option value="contractor" ${!isSub?'selected':''}>All contractors</option>
    ${subOpts}
  </select>` : '';

  // Header — fixed two-row control block so nothing jumps
  const totalCount = filtered.length;
  const scopeDisabled = false;
  const header = `<div style="padding:10px 0 8px;border-bottom:1px solid var(--border);margin-bottom:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="view-toggle">
          <button class="view-toggle-btn ${ROLE_FILTER==='location'?'active':''}" style="font-size:12px;font-weight:600;padding:0 13px;height:32px" onclick="setRoleFilter('location')">Location</button>
          <button class="view-toggle-btn ${(ROLE_FILTER==='contractor'||isSub)?'active':''}" style="font-size:12px;font-weight:600;padding:0 13px;height:32px" onclick="setRoleFilter('contractor')">Contractor</button>
          <button class="view-toggle-btn ${ROLE_FILTER==='pm'?'active':''}" style="font-size:12px;font-weight:600;padding:0 13px;height:32px" onclick="setRoleFilter('pm')">PM</button>
        </div>
        <span style="font-size:12px;font-weight:700;color:var(--gray);background:var(--gray-bg);border:1px solid var(--border);border-radius:20px;padding:1px 10px;min-width:32px;text-align:center;display:inline-block">${totalCount}</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        ${subDropdown}
        <div class="view-toggle" style="${scopeDisabled?'opacity:.35;pointer-events:none':''}">
          <button class="view-toggle-btn ${ACT_SCOPE==='all'?'active':''}" style="font-size:12px;font-weight:600;padding:0 13px;height:32px" onclick="setActScope('all')">All</button>
          <button class="view-toggle-btn ${ACT_SCOPE==='outstanding'?'active':''}" style="font-size:12px;font-weight:600;padding:0 13px;height:32px" onclick="setActScope('outstanding')">Outstanding</button>
          <button class="view-toggle-btn ${ACT_SCOPE==='complete'?'active':''}" style="font-size:12px;font-weight:600;padding:0 13px;height:32px" onclick="setActScope('complete')">Complete</button>
        </div>
      </div>
    </div>
  </div>`;

  // Build location + trade number maps
  const _orderedLocs = CUR.locations.filter(l=>!l.prestart).sort((a,b)=>(a.order??0)-(b.order??0));
  const locNumMap = {};
  _orderedLocs.forEach((l,i)=>locNumMap[l.id]=i+1);
  const tradeNumMap = {};
  for(const loc of _orderedLocs){
    const locTrades = CUR.trades.filter(t=>t.location_id===loc.id&&!t.pm_only).sort((a,b)=>(a.order??0)-(b.order??0));
    locTrades.forEach((t,i)=>tradeNumMap[t.id]=i+1);
  }

  // Build list
  let listHtml = '';
  if(!groups.length){
    const emptyMsg = ROLE_FILTER==='pm' ? 'Nothing for PM to action'
      : ACT_SCOPE==='complete' ? 'No completed tasks yet'
      : isSub ? `Nothing outstanding for ${x(activeSub)}` : 'All clear — nothing outstanding';
    const emptySub = ROLE_FILTER==='pm' ? 'No tasks need PM attention.'
      : ACT_SCOPE==='complete' ? 'Tasks will appear here once approved.'
      : 'All tasks are approved or in progress.';
    listHtml = `<div class="act-empty">
      <div class="act-empty-icon">✅</div>
      <div class="act-empty-title">${emptyMsg}</div>
      <div class="act-empty-sub">${emptySub}</div>
    </div>`;
  } else {
    for(const group of groups){
      const { label, items } = group;
      const hasRed   = items.some(i=>i.outcome==='attention'||i.outcome==='rejected');
      const hasAmber = items.some(i=>i.outcome==='sub_done');
      const countCls = hasRed?'has-red':hasAmber?'has-amber':'';

      const rows = items.map(item=>{
        const {trade, loc, outcome, data} = item;
        const tradeName = trade.name||TRADE_MAP[trade.trade_type]?.name||trade.trade_type;
        const locN = locNumMap[loc.id];
        const trdN = tradeNumMap[trade.id];
        // Number prefix: "1.2" when grouped by contractor (both needed); just trade num "·2" when grouped by location
        const numPrefix = (locN!=null && trdN!=null)
          ? `<span style="font-size:11px;font-weight:700;color:#94a3b8;margin-right:5px;flex-shrink:0">${groupByContractor ? locN+'.'+trdN : locN+'.'+trdN}</span>`
          : '';
        // Location name shown below title when grouped by contractor; nothing when grouped by location
        const metaLine = groupByContractor ? `<div class="act-card-meta">${x(loc.name)}</div>` : '';
        const note = (outcome==='attention'||outcome==='rejected') && data.pm?.rejection_note
          ? `<div class="act-card-note">${x(data.pm.rejection_note)}</div>` : '';
        // Context label: tells PM whether this is their own task or a contractor's
        const contextLabel = trade.pm_only
          ? `<div style="font-size:10px;font-weight:700;color:#7c3aed;margin-top:1px;letter-spacing:.03em">PM task</div>`
          : trade.sub_name
            ? `<div style="font-size:10px;color:#64748b;margin-top:1px">Contractor: <strong>${x(trade.sub_name)}</strong></div>`
            : '';
        // Sub pill shown on right side when grouped by location (not contractor, since it's the heading)
        const subPill = (!groupByContractor && trade.sub_name)
          ? `<span class="sub-pill" style="width:90px;text-align:center">${x(trade.sub_name)}</span>` : '';

        let cardCls='', badge='';
        if(!trade.pm_only && !trade.sub_name && outcome!=='approved'){ cardCls=''; badge=`<span class="badge badge-setup">Assign sub</span>`; }
        else if(outcome==='attention'||outcome==='rejected'){ cardCls='red'; badge=`<span class="badge badge-rej">Attention</span>`; }
        else if(outcome==='sub_done'){ cardCls='amber'; badge=`<span class="badge badge-prog">Review</span>`; }
        else if(outcome==='setup'){ badge=`<span class="badge badge-setup">Setup</span>`; }
        else if(outcome==='pending'){ badge=`<span class="badge badge-pending">Pending</span>`; }
        else if(outcome==='progress'){ badge=`<span class="badge badge-prog">Active</span>`; }
        else if(outcome==='approved'){ badge=`<span class="badge badge-done">Done</span>`; }

        return `<div class="act-card ${cardCls}" onclick="actOpenItem('${loc.id}','${trade.id}')">
          <div class="act-card-left">
            <div class="act-card-title" style="display:flex;align-items:baseline;gap:0">${numPrefix}${x(tradeName)}</div>
            ${contextLabel}${metaLine}${note}
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
            ${subPill}
            <div class="act-card-badge">${badge}</div>
          </div>
          <div class="act-arrow">→</div>
        </div>`;
      }).join('');

      listHtml += `<div class="act-group">
        <div class="act-group-hdr">
          <span class="act-group-title">${x(label)}</span>
          <span class="act-group-count ${countCls}">${items.length}</span>
        </div>
        ${rows}
      </div>`;
    }
  }

  // ── Missing warranty banners (PM view only) ───────────────────────────────
  // Checks checklist WARRANTY_GROUP answers (w_manufacturer / w_product) per task.
  document.getElementById('app-root').innerHTML=`
    <div class="wrap">
      ${header}
      ${listHtml}
    </div>`;
}

function renderActivity(){
  if(!CUR) return;
  const taskData = CUR.taskData||{};

  // Build a flat list of all history events, annotated with task + location context
  const events=[];
  for(const trade of CUR.trades){
    const data = taskData[trade.id];
    if(!data?.history?.length) continue;
    const loc = CUR.locations.find(l=>l.id===trade.location_id);
    const tradeMeta = TRADE_MAP[trade.trade_type]||{};
    const taskLabel = (trade.name||tradeMeta.name||trade.trade_type||'Task');
    const locLabel  = loc ? x(loc.name) : '';
    for(const e of data.history){
      events.push({...e, taskLabel, locLabel, tradeId:trade.id, locId:trade.location_id||''});
    }
  }

  // Sort newest first (fall back to date string if ts missing)
  events.sort((a,b)=>{
    const ta = a.ts||a.date||'';
    const tb = b.ts||b.date||'';
    return tb.localeCompare(ta);
  });

  const fmtTs = ts => {
    if(!ts) return {date:'—',time:''};
    const d = new Date(ts);
    if(isNaN(d)) return {date:ts,time:''};
    return {
      date: d.toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'}),
      time: d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'})
    };
  };

  const roleStyle = role => role==='pm'
    ? {bg:'#d1fae5',color:'#065f46',label:'PM'}
    : {bg:'#fef3c7',color:'#92400e',label:'Sub'};

  const iconStyle = e => {
    if(e.role==='pm'){
      if(e.action==='approved'||e.action==='Approved') return {icon:'✓',bg:'#d1fae5',color:'#059669'};
      if(e.action==='rejected'||e.action==='Returned to sub') return {icon:'↩',bg:'#fee2e2',color:'#dc2626'};
      return {icon:'👁',bg:'#e0e7ff',color:'#4338ca'};
    }
    return {icon:'↑',bg:'#fef3c7',color:'#d97706'};
  };

  const actionLabel = e => {
    if(e.role==='sub') return 'Submitted for review';
    if(e.action==='approved'||e.action==='Approved') return 'Approved';
    if(e.action==='rejected'||e.action==='Returned to sub') return 'Returned to sub';
    return e.action||'Action';
  };

  const rows = events.length ? events.map(e=>{
    const rc = roleStyle(e.role);
    const ic = iconStyle(e);
    const ts = fmtTs(e.ts||e.date);
    const fc = e.fails?.length||0;
    const failBadge = e.role==='sub'
      ? (fc>0
        ? `<span style="font-size:10px;font-weight:700;color:#dc2626;background:#fee2e2;border-radius:6px;padding:2px 8px">${fc} fail${fc!==1?'s':''}</span>`
        : `<span style="font-size:10px;font-weight:700;color:#059669;background:#d1fae5;border-radius:6px;padding:2px 8px">All pass</span>`)
      : '';
    const note = e.note
      ? `<div style="margin-top:6px;padding:6px 10px;background:#f8fafc;border-left:3px solid #e2e8f0;border-radius:0 4px 4px 0;font-size:12px;color:#475569;font-style:italic">"${x(e.note)}"</div>`
      : '';
    const failDetails = e.fails?.length
      ? `<div style="margin-top:6px;padding:6px 10px;background:#fef2f2;border-left:3px solid #fca5a5;border-radius:0 4px 4px 0">${e.fails.map(f=>`<div style="font-size:12px;color:#7f1d1d;padding:1px 0">• ${x(f.label)}${f.note?` <span style="color:#9f1239;font-style:italic">— ${x(f.note)}</span>`:''}</div>`).join('')}</div>`
      : '';
    return `<div style="display:grid;grid-template-columns:48px 1fr auto;gap:16px;padding:16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s" onmouseover="this.style.background='#f8faff'" onmouseout="this.style.background=''" onclick="actOpenItem('${e.locId||''}','${e.tradeId}')">
      <div style="display:flex;justify-content:center;padding-top:2px">
        <div style="width:38px;height:38px;border-radius:50%;background:${ic.bg};color:${ic.color};display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0">${ic.icon}</div>
      </div>
      <div style="min-width:0">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px">
          <span style="font-size:10px;font-weight:700;padding:2px 9px;border-radius:10px;background:${rc.bg};color:${rc.color};text-transform:uppercase;letter-spacing:.04em">${rc.label}</span>
          <span style="font-size:13px;font-weight:700;color:var(--navy)">${actionLabel(e)}</span>
          ${failBadge}
        </div>
        <div style="font-size:13px;color:#374151;font-weight:600;margin-bottom:2px">${x(e.taskLabel)}${e.locLabel?` <span style="color:#94a3b8;font-weight:400;font-size:12px">· ${e.locLabel}</span>`:''}</div>
        ${e.name?`<div style="font-size:12px;color:#64748b">${x(e.name)}</div>`:''}
        ${note}${failDetails}
      </div>
      <div style="text-align:right;flex-shrink:0;padding-top:2px">
        <div style="font-size:12px;color:#374151;font-weight:500;white-space:nowrap">${ts.date}</div>
        ${ts.time?`<div style="font-size:11px;color:#94a3b8;margin-top:2px">${ts.time}</div>`:''}
      </div>
    </div>`;
  }).join('')
  : `<div style="padding:60px 0;text-align:center;color:#94a3b8;font-size:13px">No activity recorded yet.</div>`;

  document.getElementById('app-root').innerHTML=`
    <div class="wrap" style="padding-top:14px">
      <div style="background:#fff;border-radius:10px;border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow)">
        ${rows}
      </div>
    </div>`;
}

    locTrades.forEach(t=>{ TASK_OPEN[t.id]=true; });

  renderProject();
}

function tradeGroupCycle(tradeType){
  _contractorsOpen=false; _jobSpecsOpen=false;
  const groupTasks=CUR.trades.filter(t=>t.trade_type===tradeType&&!t.pm_only);
  const anyTaskOpen=groupTasks.some(t=>TASK_OPEN[t.id]===true);
  const groupOpen=TRADE_GROUP_OPEN[tradeType]!==false;
  if(anyTaskOpen){
    // Level 3 (task bodies open) → Level 2 (tasks visible, bodies collapsed)
    groupTasks.forEach(t=>TASK_OPEN[t.id]=false);
  } else if(groupOpen){
    // Level 2 (group open, no bodies) → Level 1 (group closed)
    TRADE_GROUP_OPEN[tradeType]=false;
  } else {
    // Level 1 (closed) → Level 2 (open, tasks visible, bodies collapsed)
    TRADE_GROUP_OPEN[tradeType]=true;
    groupTasks.forEach(t=>TASK_OPEN[t.id]=false);
  }
  renderProject();
}

  if(_dragType!=='tradegroup'||_dragId===targetType){ _dragType=null;_dragId=null; return; }
  const allTypes=TRADES.map(t=>t.id).filter(tt=>[...new Set(CUR.trades.filter(t=>!t.pm_only).map(t=>t.trade_type))].includes(tt));
  if(!CUR.project.tradeOrder) CUR.project.tradeOrder=[...allTypes];
  // ensure any types not yet in order are appended

  const fi=CUR.project.tradeOrder.indexOf(_dragId);

  _dragType=null; _dragId=null;

}

        <div id="ts-added" class="ts-added-body">${_buildAddedItemsHtml()}</div>

        <button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary btn-sm" onclick="saveEditTaskModal('${tradeId}')">Save ✓</button>

}
function saveEditTaskModal(tradeId){
  const trade=CUR.trades.find(t=>t.id===tradeId); if(!trade) return;
  const name=document.getElementById('etm-name')?.value.trim()||trade.name;
  const tradeType=document.getElementById('etm-trade')?.value||trade.trade_type;
  const scope=document.getElementById('etm-scope')?.value.trim()||'';
  const subName=document.getElementById('etm-sub-name')?.value.trim()||'';
  trade.name=name; trade.trade_type=tradeType; trade.scope=scope;
  trade.sub_name=subName;
  persist(); closeModal(); renderAll();
}

function openAddTask(locId){
  const _atLoc=CUR.locations.find(l=>l.id===locId);

    <form onsubmit="confirmAddTask('${locId}');return false;">

function confirmAddTask(locId){

  CUR.trades.push({id:newId,location_id:locId,trade_type:tradeType,name,sub_name:_defaultSubForTrade(tradeType),sub_contact:'',scope:'',order});

}

function openTradeSubModal(tradeType){
  const tradeInfo = TRADE_MAP[tradeType];

  const currentSub = CUR.trades.find(t=>t.trade_type===tradeType&&!t.pm_only)?.sub_name || '';

  const opts = contractors.map(n=>`<option value="${x(n)}" ${n===currentSub?'selected':''}>${x(n)}</option>`).join('');

function _defaultSubForTrade(tradeType){
  return (CUR.trades||[]).find(t=>t.trade_type===tradeType&&!t.pm_only&&t.sub_name)?.sub_name || '';

function setTradeTypeSub(tradeType, subName){
  (CUR.trades||[]).filter(t=>t.trade_type===tradeType&&!t.pm_only).forEach(t=>t.sub_name=subName);

}
