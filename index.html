// ── TEMPLATES / SETTINGS VIEW ─────────────────────────────────────────────────

const _TMPL_TYPE_LABELS={pass_fail:'Pass/Fail',photo_before:'Before photo',photo_after:'After photo',photo:'Photo',text:'Text note',pm_signoff:'PM Sign-off',link:'Link',document:'Document'};
const _TMPL_TYPE_COLS={pass_fail:'#16a34a',photo_before:'#b45309',photo_after:'#1d4ed8',photo:'#7c3aed',text:'#64748b',pm_signoff:'#dc2626',link:'#0284c7',document:'#7c3aed'};
const _TMPL_EDITABLE_TYPES=['pass_fail','photo','text','link','document']; // types user can set

function _ensureTradeOverride(tradeType){
  if(!LIB_OVERRIDES[tradeType]){
    const orig=ITEM_LIB[tradeType];
    LIB_OVERRIDES[tradeType]=orig ? JSON.parse(JSON.stringify(orig)) : {groups:[{id:'g_general_'+uid(),name:'General',items:[]}]};
    saveLibOverrides();
  }
}

function renderTemplates(){
  const typeLabel=t=>_TMPL_TYPE_LABELS[t]||t;
  const typeCol=t=>_TMPL_TYPE_COLS[t]||'#64748b';
  const isModified=!!LIB_OVERRIDES[TMPL_TRADE];

  // Pre-start section
  const prestartTrade=TRADES.find(t=>t.id==='_prestart');
  const prestartLib=getTradeLib('_prestart');
  const prestartCount=prestartLib?prestartLib.groups.reduce((n,g)=>n+g.items.length,0):0;
  const prestartRow=prestartTrade?`<div class="tmpl-trade-row ${TMPL_TRADE==='_prestart'?'active':''}" onclick="tmplSelectTrade('_prestart')">
    <span>${prestartTrade.icon||''} ${x(prestartTrade.name)}${LIB_OVERRIDES['_prestart']?' <span style="font-size:9px;color:#6d28d9;font-weight:700">✎</span>':''}</span><span class="tmpl-trade-count">${prestartCount}</span>
  </div>`:'';

  // Trades section (exclude Project cat since Pre-start is handled above)
  const tradeRows=TRADE_CATS.filter(c=>c!=='Project').map(cat=>{
    const catTrades=TRADES.filter(t=>t.cat===cat);
    if(!catTrades.length) return '';
    const rows=catTrades.map(t=>{
      const lib=getTradeLib(t.id);
      const count=lib ? lib.groups.reduce((n,g)=>n+g.items.filter(i=>!['photo_before','photo_after','pm_signoff'].includes(i.type)).length,0) : 0;
      const hasOv=!!LIB_OVERRIDES[t.id];
      return `<div class="tmpl-trade-row ${TMPL_TRADE===t.id?'active':''}" onclick="tmplSelectTrade('${t.id}')">
        <span>${t.icon||''} ${x(t.name)}${hasOv?' <span style="font-size:9px;color:#6d28d9;font-weight:700">✎</span>':''}</span><span class="tmpl-trade-count">${count}</span>
      </div>`;
    }).join('');
    return `<div class="tmpl-cat-hdr">${cat}</div>${rows}`;
  }).join('');

  // Product & Warranty section
  const warCount=WARRANTY_GROUP.items.length;
  const warrantyRow=`<div class="tmpl-trade-row ${TMPL_TRADE==='_warranty'?'active':''}" onclick="tmplSelectTrade('_warranty')">
    <span>🔖 Appended to all trades</span><span class="tmpl-trade-count">${warCount}</span>
  </div>`;

  const sidebar=`
    <div class="tmpl-section-hdr">Pre-start Checklist</div>
    ${prestartRow}
    <div class="tmpl-section-hdr">Trades</div>
    ${tradeRows}
    <div class="tmpl-section-hdr">Product &amp; Warranty</div>
    ${warrantyRow}
  `;

  const trade=TMPL_TRADE==='_warranty'?{name:'Product & Warranty',icon:'🔖'}:(TRADE_MAP[TMPL_TRADE]||{});
  const lib=TMPL_TRADE==='_warranty'?null:getTradeLib(TMPL_TRADE);
  let mainContent='';
  if(lib){
    const typeOpts=_TMPL_EDITABLE_TYPES.map(t=>`<option value="${t}">${typeLabel(t)}</option>`).join('');
    const mkItemRow=(g,item)=>{
      const isLocked=item.type==='pm_signoff'||item.type==='photo_before'||item.type==='photo_after';
      return `<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #f1f5f9">
        ${isLocked
          ?`<span style="flex:1;font-size:12px;color:#374151;padding:4px 0">${x(item.label)}</span>
             <span style="font-size:10px;font-weight:600;color:${typeCol(item.type)};flex-shrink:0">${typeLabel(item.type)}</span>
             <span style="font-size:10px;color:#cbd5e1;flex-shrink:0;padding:0 4px">🔒</span>`
          :`<input type="text" value="${x(item.label)}" placeholder="Item label…" style="flex:1;padding:4px 7px;border:1px solid #e2e8f0;border-radius:4px;font-size:12px;min-width:0"
              onblur="tmplSaveItemLabel('${TMPL_TRADE}','${g.id}','${item.id}',this.value)"
              onkeydown="if(event.key==='Enter'){this.blur();}">
             <select style="font-size:11px;border:1px solid #e2e8f0;border-radius:4px;padding:3px 4px;color:${typeCol(item.type)};font-weight:600;flex-shrink:0;max-width:90px"
               onchange="tmplSetItemType('${TMPL_TRADE}','${g.id}','${item.id}',this.value)">
               ${_TMPL_EDITABLE_TYPES.map(t=>`<option value="${t}" ${item.type===t?'selected':''}>${typeLabel(t)}</option>`).join('')}
             </select>
             <button style="font-size:13px;padding:0 4px;border:none;background:none;color:#f87171;cursor:pointer;flex-shrink:0;line-height:1" onclick="tmplRemoveItem('${TMPL_TRADE}','${g.id}','${item.id}')" title="Remove item">×</button>`
        }
      </div>`;
    };
    const mkGroup=(g)=>{
      const isGeneral=g.name==='General';
      const hdrStyle=isGeneral?'class="spec-section-hdr" style="border-radius:4px 4px 0 0;margin:0"':'style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:4px 4px 0 0;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#64748b"';
      const groupHeader=isGeneral
        ?`<div class="spec-section-hdr" style="border-radius:4px 4px 0 0;margin:0;padding:7px 10px;display:flex;align-items:center;gap:8px">
            <span style="flex:1">General / Completion</span>
            <span style="font-size:10px;font-weight:400;opacity:.6;letter-spacing:0">Auto-added to each task</span>
          </div>`
        :`<div style="display:flex;align-items:center;gap:6px;padding:6px 10px;background:#f8fafc;border:1px solid #e2e8f0;border-top-left-radius:4px;border-top-right-radius:4px">
            <input type="text" value="${x(g.name)}" style="flex:1;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#475569;padding:2px 6px;border:1px solid transparent;border-radius:3px;background:transparent"
              onfocus="this.style.background='#fff';this.style.borderColor='#93c5fd'"
              onblur="this.style.background='transparent';this.style.borderColor='transparent';tmplRenameGroup('${TMPL_TRADE}','${g.id}',this.value)"
              onkeydown="if(event.key==='Enter'){this.blur();}">
          </div>`;
      return `<div style="margin-bottom:14px;border:1px solid #e2e8f0;border-radius:4px;overflow:hidden">
        ${groupHeader}
        <div style="padding:4px 10px;background:#fff">
          ${g.items.map(item=>mkItemRow(g,item)).join('')}
          <div style="padding:6px 0 2px">
            <button style="font-size:11px;padding:3px 10px;border:1px dashed #93c5fd;border-radius:4px;background:#f0f9ff;color:#2563eb;cursor:pointer" onclick="tmplAddItem('${TMPL_TRADE}','${g.id}')">+ Add item</button>
          </div>
        </div>
      </div>`;
    };

    const orderedGroups=[...lib.groups.filter(g=>g.name!=='General'), ...(lib.groups.filter(g=>g.name==='General'))];
    mainContent=orderedGroups.map(g=>mkGroup(g)).join('');
    mainContent+=`<div style="padding:6px 0 12px;display:flex;align-items:center;gap:10px">
      <button class="btn btn-ghost btn-sm" style="font-size:12px;border-style:dashed" onclick="tmplAddGroup('${TMPL_TRADE}')">+ Add group</button>
      ${isModified?`<button class="btn btn-ghost btn-sm" style="font-size:11px;color:#dc2626;border-color:#fca5a5" onclick="tmplResetToDefault('${TMPL_TRADE}')">↺ Reset to defaults</button>`:''}
    </div>`;
  } else if(TMPL_TRADE==='_warranty'){
    // Warranty is a fixed group appended to all trades — show read-only preview
    const warRows=WARRANTY_GROUP.items.map(item=>`
      <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f1f5f9">
        <span style="flex:1;font-size:12px;color:#374151">${x(item.label)}</span>
        <span style="font-size:10px;font-weight:600;color:${typeCol(item.type)};flex-shrink:0">${typeLabel(item.type)}</span>
      </div>`).join('');
    mainContent=`
      <div style="margin-bottom:12px;padding:9px 12px;background:#fef3c7;border:1px solid #fcd34d;border-radius:6px;font-size:12px;color:#92400e">
        🔖 These fields are automatically available in the picker for every trade. They are not added by default — the sub selects which ones they need when setting up each task.
      </div>
      <div style="border:1px solid #e2e8f0;border-radius:4px;overflow:hidden">
        <div style="padding:7px 10px;background:#f8fafc;border-bottom:1px solid #e2e8f0;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#475569">Product &amp; Warranty Fields</div>
        <div style="padding:4px 10px;background:#fff">${warRows}</div>
      </div>`;
  } else {
    mainContent=`<div class="tmpl-empty"><div style="font-size:28px;margin-bottom:8px">📋</div><div style="font-size:13px;font-weight:600;color:var(--navy);margin-bottom:4px">No items defined</div><div style="font-size:12px;color:var(--gray)">Add a group to start building this checklist.</div><div style="margin-top:10px"><button class="btn btn-primary btn-sm" onclick="tmplAddGroup('${TMPL_TRADE}')">+ Add group</button></div></div>`;
  }

  document.getElementById('app-root').innerHTML=`<div class="wrap" style="padding-top:14px">
    <div class="tmpl-main-hdr" id="tmpl-main-hdr">
      <div class="tmpl-main-title">${trade?.icon||''} ${x(trade?.name||'')}${TMPL_TRADE!=='_warranty'?' — Checklist Items':''}${isModified?' <span style="font-size:11px;font-weight:400;color:#6d28d9;background:#ede9fe;border-radius:8px;padding:1px 7px;margin-left:6px">Customised</span>':''}</div>
    </div>
    <div class="tmpl-layout">
      <div class="tmpl-sidebar-wrap">
        <div class="tmpl-sidebar">
          ${sidebar}
        </div>
      </div>
      <div class="tmpl-main" style="padding:16px 20px;overflow-y:auto">${mainContent}</div>
    </div>
  </div>`;
}

// ── Lib-editing functions ─────────────────────────────────────────────────────

function tmplSaveItemLabel(tradeType, groupId, itemId, label){
  _ensureTradeOverride(tradeType);
  const grp=LIB_OVERRIDES[tradeType].groups.find(g=>g.id===groupId); if(!grp) return;
  const item=grp.items.find(i=>i.id===itemId); if(!item) return;
  item.label=label.trim()||item.label;
  saveLibOverrides();
  // Soft refresh: just re-render sidebar count badge, don't full re-render to preserve focus
}

function tmplSetItemType(tradeType, groupId, itemId, type){
  _ensureTradeOverride(tradeType);
  const grp=LIB_OVERRIDES[tradeType].groups.find(g=>g.id===groupId); if(!grp) return;
  const item=grp.items.find(i=>i.id===itemId); if(!item) return;
  item.type=type;
  saveLibOverrides(); renderTemplates();
}

function tmplRemoveItem(tradeType, groupId, itemId){
  _ensureTradeOverride(tradeType);
  const grp=LIB_OVERRIDES[tradeType].groups.find(g=>g.id===groupId); if(!grp) return;
  grp.items=grp.items.filter(i=>i.id!==itemId);
  saveLibOverrides(); renderTemplates();
}

function tmplAddItem(tradeType, groupId){
  _ensureTradeOverride(tradeType);
  const grp=LIB_OVERRIDES[tradeType].groups.find(g=>g.id===groupId);
  if(!grp) return;
  // Insert before the pm_signoff if in General group
  const pmIdx=grp.items.findIndex(i=>i.type==='pm_signoff');

async function openProject(id){
  // Step 1: Render immediately from localStorage — no network needed, instant.
  const localData = loadProj(id);
  if(localData){
    CUR_ID=id; CUR=localData; VIEW='project';
    VIEW_MODE='location';
    migratePrestart(localData);
    LOC_OPEN={}; TASK_OPEN={};
    localData.trades.forEach(t=>{ TASK_OPEN[t.id]=false; });
    CURRENT_ROLE = CURRENT_ROLE || 'pm';
    renderAll();  // show project immediately from cache
  }

  // Step 2: Refresh from Supabase in background (8s timeout).
  // Updates the view with latest server data but never blocks the initial render.
  if(CURRENT_USER){
    try {
      const sbTimeout = new Promise(r => setTimeout(() => r([null, {data:null}]), 8000));
      const [sbData, memberRes] = await Promise.race([
        Promise.all([
          sbLoadProject(id),
          _sb.from('project_members').select('*').eq('project_id',id).eq('user_id',CURRENT_USER.id).single()
        ]),
        sbTimeout
      ]);
      if(sbData){ CUR = sbData; saveProj(id, sbData); }
      CURRENT_MEMBER = memberRes?.data || null;
      CURRENT_ROLE = CURRENT_MEMBER?.role || 'pm';
      if(!CUR){ alert('Project not found.'); return; }
      renderAll();  // re-render with fresh Supabase data
    } catch(e){
      console.warn('openProject Supabase error:', e);
      if(!CUR){ alert('Project not found.'); }
    }
  } else if(!CUR){
    alert('Project not found.');
  }
}

// Role helpers — used throughout to gate PM-only actions
function isPM(){ return !CURRENT_ROLE || CURRENT_ROLE==='pm' || CURRENT_ROLE==='admin'; }
function isSub(){ return CURRENT_ROLE==='sub'; }
function isClient(){ return CURRENT_ROLE==='client'; }
// Can this user see a given task's trade?
function canSeeTrade(tradeType){
  if(isPM()) return true;
  if(!CURRENT_MEMBER) return true;
  if(CURRENT_MEMBER.can_see_all) return true;
  return (CURRENT_MEMBER.trade_types||[]).includes(tradeType);
}
// Can this user edit a given task?
function canEditTrade(tradeType){
  if(isPM()) return true;
  if(!CURRENT_MEMBER) return true;
  return (CURRENT_MEMBER.trade_types||[]).includes(tradeType);
}

function migratePrestart(data){
  // Ensure new fields exist
  if(!data.taskItems) data.taskItems=[];
  if(!data.taskData) data.taskData={};
  // Ensure checkpoints exists for legacy functions (may be empty)
  if(!data.checkpoints) data.checkpoints=[];
  if(!data.cpData) data.cpData={};
  // Add Prestart location if missing
  if(!data.locations.some(l=>l.prestart)){
    const psLocId=uid(), psTaskId=uid();
    data.locations.unshift({id:psLocId,name:'Prestart',order:0,prestart:true});
    data.trades.unshift({id:psTaskId,location_id:psLocId,trade_type:'_prestart',name:'Pre-start Checklist',pm_only:true,sub_name:'',sub_contact:'',scope:'',order:0});
  }
  persist();
}

function saveNav(){
  localStorage.setItem('nga_a1_nav',JSON.stringify({VIEW,CUR_ID,CUR_LOC_ID,CUR_TRADE_ID,TMPL_TRADE}));
}

function restoreNav(){
  try{
    const s=JSON.parse(localStorage.getItem('nga_a1_nav')||'{}');
    if(!s.VIEW||s.VIEW==='home') return;
    if(s.VIEW==='templates'){
      VIEW='templates';
      if(s.TMPL_TRADE) TMPL_TRADE=s.TMPL_TRADE;
      else if(!TMPL_TRADE) TMPL_TRADE=TRADES[0].id;
      return;
    }
    if(s.CUR_ID){
      const data=loadProj(s.CUR_ID);
      if(!data) return;
      CUR_ID=s.CUR_ID; CUR=data;
      if(s.CUR_LOC_ID) CUR_LOC_ID=s.CUR_LOC_ID;
      if(s.CUR_TRADE_ID) CUR_TRADE_ID=s.CUR_TRADE_ID;
      VIEW = s.VIEW==='trade' ? 'project' : s.VIEW;
      migratePrestart(data);
      data.trades.forEach(t=>{ TASK_OPEN[t.id]=false; });
      // Re-init picker state if restoring task-setup
      if(VIEW==='task-setup'&&CUR_TRADE_ID){
        const trade=data.trades.find(t=>t.id===CUR_TRADE_ID);
        if(trade){ _pickerTrade=trade.trade_type||null; _pickerGroup=null; }
        else VIEW='project';
      }
    }
  }catch{}
}

function renderAll(){
  if(VIEW==='login'){ renderLogin(); return; }
  // Safety net: any view that requires a loaded project falls back gracefully
  // rather than silently returning and leaving the spinner on screen.
  const needsCUR = ['project','actions','activity','report','task-setup'];
  if(needsCUR.includes(VIEW) && !CUR) VIEW = 'home';
  // Report also needs RPT_CFG — init it here so a hard-refresh still works
  if(VIEW==='report' && (!RPT_CFG || RPT_CFG._projId!==CUR_ID)){
    const saved=_loadRptCfg();
    if(saved&&saved._projId===CUR_ID) RPT_CFG=saved; else initRptCfg();
  }
  saveNav();
  renderHeader();
  renderBreadcrumb();
  if(VIEW==='home') renderHome();
  else if(VIEW==='project') renderProject();
  else if(VIEW==='task-setup'&&CUR&&CUR_TRADE_ID) renderTaskSetup();
  else if(VIEW==='actions') renderActions();
  else if(VIEW==='activity') renderActivity();
  else if(VIEW==='report') renderReportBuilder();
  else if(VIEW==='templates') renderTemplates();
  else renderHome();   // absolute fallback — never leave the spinner on screen
}

function rptSaveComments(){
  if(!RPT_CFG) return;
  if(RPT_CFG.summary){
    ['date','pm','company','notes'].forEach(f=>{ const el=document.getElementById('rpt-sum-'+f); if(el) RPT_CFG.summary[f]=el.value; });

  for(const locId in RPT_CFG.locations){
    const lc=RPT_CFG.locations[locId];
    const el=document.getElementById('rpt-loc-cmt-'+locId); if(el) lc.pmComment=el.value;

      const tc=lc.trades[tradeId];
      const tel=document.getElementById('rpt-trd-cmt-'+tradeId); if(tel) tc.pmComment=tel.value;

function rptToggle(type,id,field){
  rptSaveComments();
  if(type==='loc'){ RPT_CFG.locations[id].included=!RPT_CFG.locations[id].included; }
  else if(type==='loc-expand'){ RPT_CFG.locations[id].expanded=!RPT_CFG.locations[id].expanded; }
  else if(type==='loc-field'){ RPT_CFG.locations[id][field]=!RPT_CFG.locations[id][field]; }
  else if(type==='summary-field'){ RPT_CFG.summary[field]=!RPT_CFG.summary[field]; }
  else if(type==='trade'){ for(const l in RPT_CFG.locations){ if(RPT_CFG.locations[l].trades[id]){ RPT_CFG.locations[l].trades[id].included=!RPT_CFG.locations[l].trades[id].included; break; } } }
  else if(type==='trade-expand'){ for(const l in RPT_CFG.locations){ if(RPT_CFG.locations[l].trades[id]){ RPT_CFG.locations[l].trades[id].expanded=!RPT_CFG.locations[l].trades[id].expanded; break; } } }
  else if(type==='cp'){ for(const l in RPT_CFG.locations) for(const t in RPT_CFG.locations[l].trades){ const cc=RPT_CFG.locations[l].trades[t].checkpoints[id]; if(cc) cc.included=!cc.included; } }
  else if(type==='field'){ for(const l in RPT_CFG.locations) for(const t in RPT_CFG.locations[l].trades){ const cc=RPT_CFG.locations[l].trades[t].checkpoints[id]; if(cc) cc[field]=!cc[field]; } }
  else if(type==='trade-field'){ for(const l in RPT_CFG.locations){ const tc=RPT_CFG.locations[l].trades[id]; if(tc){ tc[field]=!tc[field]; break; } } }
  else if(type==='ba-photo'){ for(const l in RPT_CFG.locations){ const tc=RPT_CFG.locations[l].trades[id]; if(tc){ tc.baPhotoIncludes[parseInt(field)]=!tc.baPhotoIncludes[parseInt(field)]; break; } } }
  else if(type==='item-include'){ for(const l in RPT_CFG.locations){ const tc=RPT_CFG.locations[l].trades[id]; if(tc){ if(!tc.itemIncludes) tc.itemIncludes={}; tc.itemIncludes[field]=tc.itemIncludes[field]===false?true:false; break; } } }
  _saveRptCfg();
  renderReportBuilder();
}
function rptCycleCollapse(){
  rptSaveComments();
  const allLocs=Object.values(RPT_CFG.locations);
  const anyTradeOrSumExp=allLocs.some(lc=>Object.values(lc.trades).some(tc=>tc.expanded))||RPT_CFG.summary?.expanded!==false;
  const anyLocExp=allLocs.some(lc=>lc.expanded);
  if(anyTradeOrSumExp){
    // Stage 1 → 2: collapse trade details + summary, leave locations open
    allLocs.forEach(lc=>Object.values(lc.trades).forEach(tc=>tc.expanded=false));
    if(RPT_CFG.summary) RPT_CFG.summary.expanded=false;
  } else if(anyLocExp){
    // Stage 2 → 3: collapse locations too
    allLocs.forEach(lc=>lc.expanded=false);
  } else {
    // Stage 3 → 1: expand everything
    if(RPT_CFG.summary) RPT_CFG.summary.expanded=true;
    allLocs.forEach(lc=>{ lc.expanded=true; Object.values(lc.trades).forEach(tc=>tc.expanded=true); });
  }
  _saveRptCfg();
  renderReportBuilder();
}
function rptCollapseLabel(){
  const allLocs=Object.values(RPT_CFG.locations);
  const anyLocExp=allLocs.some(lc=>lc.expanded);
  return anyLocExp?'Collapse':'Expand';
}

      locsHtml+=`<div style="background:#f8faf7">`;
      // Location-level options row — indented to show nesting
      locsHtml+=`<div style="padding:10px 14px 10px 32px;border-bottom:1px solid #ddeee5;display:flex;flex-direction:column;gap:8px">
        <div>
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:#94a3b8;letter-spacing:.05em;margin-bottom:3px">Location summary (optional)</div>
          <textarea id="rpt-loc-cmt-${loc.id}" style="width:100%;padding:6px 9px;border:1.5px solid #d1d5db;border-radius:5px;font-size:12px;resize:vertical;min-height:40px;font-family:inherit" placeholder="Optional location summary for the report…">${x(lc.pmComment)}</textarea>
        </div>
        <label style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:#fff;border:1px solid #e5e7eb;border-radius:5px;cursor:pointer;font-size:12px;color:#374151">
          <input type="checkbox" ${lc.includeBAPhotos?'checked':''} onclick="rptToggle('loc-field','${loc.id}','includeBAPhotos')" style="width:14px;height:14px">
          📷 Include Before/After photos in this location
        </label>
        ${lc.includeBAPhotos?`<div style="padding:10px;background:#fff;border:1px solid #e2ede6;border-radius:6px">${_rptBAGalleryHtml(locTrades.filter(t=>(CUR.baPhotos?.[t.id]||[]).some(p=>p.before||p.after)))}</div>`:''}
      </div>`;
      // Trade rows — each indented a further level under the location
      for(const trade of locTrades){
        const tc=lc.trades[trade.id]; if(!tc) continue;
        const tradeName=trade.name||TRADE_MAP[trade.trade_type]?.name||trade.trade_type;
        const dn=tradeName.charAt(0).toUpperCase()+tradeName.slice(1);
        const icon=TRADE_MAP[trade.trade_type]?.icon||'';
        const _rptTradeItems=(CUR.taskItems||[]).filter(i=>i.trade_id===trade.id);
        const _rptTradeData=(CUR.taskData||{})[trade.id]||{};
        const _rptAnswered=_rptTradeItems.filter(i=>{const a=_rptTradeData.answers?.[i.id];return a&&(a.value||a.photos?.length||a.photo||a.text);});
        const tExp=!!tc.expanded;
        const tradeAccent=TRADE_COLORS[trade.trade_type]||'#1e56a0';
        locsHtml+=`<div style="border-top:1px solid #e2ede6">
          <div style="display:flex;align-items:center;gap:8px;padding:9px 14px 9px 32px;background:${tc.included?'#fff':'#fafafa'};cursor:pointer" onclick="rptToggle('trade-expand','${trade.id}')">
            <div style="width:3px;height:22px;border-radius:2px;flex-shrink:0;background:${tc.included?tradeAccent:'#dee5ec'}"></div>
            <input type="checkbox" ${tc.included?'checked':''} onclick="event.stopPropagation();rptToggle('trade','${trade.id}')" style="width:14px;height:14px">
            <span style="font-size:12px;font-weight:600;color:${tc.included?'var(--navy)':'#b0bec5'};flex:1">${icon} ${x(dn)}</span>
            <span style="font-size:10px;color:#94a3b8;margin-right:4px">${_rptAnswered.length}/${_rptTradeItems.length} items</span>
            ${(CUR.baPhotos?.[trade.id]||[]).some(p=>p.before||p.after)&&trade.ba_photos!==false?`<label style="display:flex;align-items:center;gap:5px;font-size:11px;color:#374151;cursor:pointer" onclick="event.stopPropagation()"><input type="checkbox" ${tc.includeBAPhotos?'checked':''} onclick="event.stopPropagation();rptToggle('trade-field','${trade.id}','includeBAPhotos')"> B/A photos</label>`:''}
            <span style="font-size:10px;color:#c0cfe0;margin-left:2px">${tExp?'▲':'▼'}</span>
          </div>`;
        if(tExp){
          // Trade detail — indented further with a soft left border line
          locsHtml+=`<div style="padding:9px 14px 10px 56px;background:#f2f7f4;border-top:1px solid #e2ede6">
            <div style="padding-left:12px;border-left:2px solid #a7d7ba;display:flex;flex-direction:column;gap:7px">
              <div>
                <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:#94a3b8;letter-spacing:.05em;margin-bottom:3px">Task summary (optional)</div>
                <textarea id="rpt-trd-cmt-${trade.id}" style="width:100%;padding:6px 9px;border:1.5px solid #d1d5db;border-radius:5px;font-size:12px;resize:vertical;min-height:36px;font-family:inherit" placeholder="Optional task summary…">${x(tc.pmComment)}</textarea>
              </div>
              <label style="display:flex;align-items:center;gap:7px;padding:5px 9px;background:#fff;border:1px solid #e5e7eb;border-radius:4px;cursor:pointer;font-size:12px;color:#374151"><input type="checkbox" ${tc.includeItems!==false?'checked':''} onclick="rptToggle('trade-field','${trade.id}','includeItems')" style="width:14px;height:14px"> Include inspection items</label>
              ${tc.includeItems!==false?(()=>{
                const _its=(CUR.taskItems||[]).filter(i=>i.trade_id===trade.id).sort((a,b)=>a.order-b.order);
                if(!_its.length) return '';
                const typeTag=t=>({pass_fail:'P/F',photo_before:'Photo',photo_after:'Photo',photo:'Photo',text:'Text',pm_signoff:'Sign-off',link:'Link',document:'Doc'}[t]||t);
                const itemChecks=_its.map(item=>{
                  const incl=(tc.itemIncludes||{})[item.id]!==false;
                  return `<label style="display:flex;align-items:center;gap:6px;padding:3px 8px;border-radius:3px;cursor:pointer;font-size:11px;color:${incl?'#374151':'#b0bec5'}">
                    <input type="checkbox" ${incl?'checked':''} onclick="rptToggle('item-include','${trade.id}','${item.id}')" style="width:12px;height:12px">
                    <span style="flex:1">${x(item.label)}</span>
                    <span style="font-size:10px;color:#94a3b8;flex-shrink:0">${typeTag(item.type)}</span>
                  </label>`;
                }).join('');
                return `<div style="margin-top:4px;padding:6px 8px;background:#fff;border:1px solid #e5e7eb;border-radius:4px">
                  <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:#94a3b8;letter-spacing:.04em;margin-bottom:4px">Items to include</div>
                  ${itemChecks}
                </div>`;
              })():''}
            </div>
          </div>`;
        }
        locsHtml+=`</div>`;
      }
      locsHtml+=`</div>`;
    }
    locsHtml+=`</div>`;
  }
  document.getElementById('app-root').innerHTML=`<div style="max-width:720px;margin:0 auto;padding:0 14px 56px">${collapseBtn}${summaryHtml}${locsHtml||'<p style="color:#94a3b8;text-align:center;padding:40px 0">No locations to include.</p>'}</div>`;
}

function generateReport(){
  rptSaveComments();
  const p=CUR.project;
  const s=RPT_CFG.summary||{};
  const rptDate=s.date||new Date().toLocaleDateString('en-NZ',{day:'numeric',month:'long',year:'numeric'});
  let body='';

  // ── Executive summary block ──────────────────────────────────────────────────
  if(s.notes||s.company||s.pm){
    body+=`<div class="summary-block">`;
    body+=`<table class="summary-table"><tbody>`;
    if(p.client)    body+=`<tr><td class="sum-lbl">Client</td><td>${x(p.client)}</td></tr>`;
    if(p.address)   body+=`<tr><td class="sum-lbl">Address</td><td>${x(p.address)}</td></tr>`;
    if(p.date)      body+=`<tr><td class="sum-lbl">Project Start</td><td>${x(p.date)}</td></tr>`;
    if(s.pm||p.pm)  body+=`<tr><td class="sum-lbl">PM / Author</td><td>${x(s.pm||p.pm)}</td></tr>`;
    if(s.company)   body+=`<tr><td class="sum-lbl">Company</td><td>${x(s.company)}</td></tr>`;
    body+=`<tr><td class="sum-lbl">Report Date</td><td>${x(rptDate)}</td></tr>`;
    body+=`</tbody></table>`;
    if(s.notes) body+=`<div class="rpt-exec-summary">${x(s.notes)}</div>`;
    body+=`</div>`;
  }

  // ── Pre-start checklist ──────────────────────────────────────────────────────
  const psLoc=CUR.locations.find(l=>l.prestart);
  if(psLoc){
    const psTrade=CUR.trades.find(t=>t.location_id===psLoc.id);
    if(psTrade){
      const psData=(CUR.taskData||{})[psTrade.id]||{};
      const psApproved=psData.outcome==='approved';
      const psItems=(CUR.taskItems||[]).filter(i=>i.trade_id===psTrade.id);
      if(psItems.length){
        body+=`<div class="loc-section prestart-section">
          <h2>Pre-start Checklist</h2>
          ${psApproved?`<div class="sign-row" style="background:#f0fdf4;border-color:#bbf7d0"><span style="color:#15803d;font-weight:700">✓ Completed</span><span>by <strong>${x(psData.pm?.name||'PM')}</strong>${psData.pm?.ts?` · ${new Date(psData.pm.ts).toLocaleDateString()}`:''}  </span></div>`:'<div class="sign-row" style="background:#fef3c7;border-color:#fde68a"><span style="color:#92400e;font-weight:700">⚠ Not completed</span></div>'}
          <table><thead><tr><th>Item</th><th>Result</th></tr></thead><tbody>`;
        for(const item of psItems){
          const ans=psData.answers?.[item.id]||{};
          const v=ans.value||'';
          const lbl={pass:'Pass',fail:'Fail',na:'N/A'}[v]||'—';
          body+=`<tr><td>${x(item.label)}</td><td class="${v==='pass'?'yes':v==='fail'?'no':''}">${lbl}</td></tr>`;
        }
        body+=`</tbody></table></div>`;
      }
    }
  }

  // ── Locations ────────────────────────────────────────────────────────────────
  let _li=0;
  for(const loc of CUR.locations.filter(l=>!l.prestart)){
    const lc=RPT_CFG.locations[loc.id]; if(!lc?.included) continue;
    _li++;
    body+=`<div class="loc-section"><h2>Location ${_li}. ${x(loc.name)}</h2>
      ${loc.scope?`<p class="scope-line">${x(loc.scope)}</p>`:''}
      ${lc.pmComment?`<div class="rpt-comment">${x(lc.pmComment)}</div>`:''}`;
    let _ti=0;
    for(const trade of CUR.trades.filter(t=>t.location_id===loc.id&&!t.pm_only)){
      const tc=lc.trades[trade.id]; if(!tc?.included) continue;
      _ti++;
      const tradeName=trade.name||TRADE_MAP[trade.trade_type]?.name||trade.trade_type;
      const dn=tradeName.charAt(0).toUpperCase()+tradeName.slice(1);
      const tradeColor=TRADE_COLORS[trade.trade_type]||'#1e3a5f';
      const signoff=CUR.signoffs[trade.id]||{};
      body+=`<div class="trade-section" style="border-left-color:${tradeColor}">
        <h3>${_li}.${_ti} ${x(dn)}</h3>
        ${trade.sub_name?`<p class="sub-meta">Subcontractor: <strong>${x(trade.sub_name)}</strong>${trade.sub_contact?' · '+x(trade.sub_contact):''}</p>`:''}
        ${tc.pmComment?`<div class="rpt-comment">${x(tc.pmComment)}</div>`:''}`;
      // Task inspection items
      if(tc.includeItems!==false){
        const _gItems=(CUR.taskItems||[]).filter(i=>i.trade_id===trade.id&&(tc.itemIncludes||{})[i.id]!==false).sort((a,b)=>a.order-b.order);
        const _tData=(CUR.taskData||{})[trade.id]||{};
        const outcome=_tData.outcome||'pending';
        const statusLbl=outcome==='approved'?'Approved':outcome==='sub_done'?'Awaiting PM':(outcome==='attention'||outcome==='rejected')?'Needs attention':outcome==='progress'?'In progress':outcome==='no_sub'?'No Sub Assigned':outcome==='setup'?'Not Started':'Pending';
        const statusCls=outcome==='approved'?'st-approved':(outcome==='attention'||outcome==='rejected')?'st-rejected':'st-pending';
        if(_gItems.length){
          // Group by group, photos first, PM signoff last
          const byGroup={};
          for(const item of _gItems){
            const g=item.group||'General'; if(!byGroup[g]) byGroup[g]=[];
            byGroup[g].push(item);
          }
          const _isPhotoT=t=>t==='photo_before'||t==='photo_after'||t==='photo';
          const _photoI=_gItems.filter(i=>_isPhotoT(i.type));
          const _pmI=_gItems.filter(i=>i.type==='pm_signoff');
          const _midI=_gItems.filter(i=>!_isPhotoT(i.type)&&i.type!=='pm_signoff');
          const _midBG={}; for(const item of _midI){ const g=item.group||'General'; if(!_midBG[g]) _midBG[g]=[]; _midBG[g].push(item); }
          const _orderedBG={};
          if(_photoI.length) _orderedBG['Photos']=_photoI;
          for(const [g,v] of Object.entries(_midBG)) _orderedBG[g]=v;
          if(_pmI.length) _orderedBG['PM Sign-off']=_pmI;
          body+=`<div class="cp-section">
            <div class="cp-hdr"><h4>${_li}.${_ti} Inspection Items</h4><span class="status-badge ${statusCls}">${statusLbl}</span></div>`;
          for(const [gName,gitems] of Object.entries(_orderedBG)){
            body+=`<p class="section-lbl">${x(gName)}</p>`;
            body+=`<table><thead><tr><th>Item</th><th>Result</th><th>Flagged</th></tr></thead><tbody>`;
            for(const item of gitems){
              const ans=_tData.answers?.[item.id]||{};
              const vl={pass:'Pass',fail:'Fail',na:'N/A'}[ans.value]||'—';
              const vcls=ans.value==='pass'?'yes':ans.value==='fail'?'no':'';
              const flagged=ans.flagged?'🚩':'';
              const noteHtml=ans.text?`<br><em class="item-note">${x(ans.text)}</em>`:'';
              body+=`<tr><td>${x(item.label)}${noteHtml}</td><td class="${vcls}">${vl}</td><td>${flagged}</td></tr>`;
            }
            body+=`</tbody></table>`;
            // Item photos
            const itemPhotos=gitems.flatMap(item=>{
              const ans=_tData.answers?.[item.id]||{};
              const photos=ans.photos||(ans.photo?[ans.photo]:[]);
              return photos.map(src=>({label:x(item.label),src}));
            });
            if(itemPhotos.length){
              body+=`<div class="photo-grid">`;
              for(const p of itemPhotos) body+=`<div class="photo-item"><img src="${p.src}"><p>${p.label}</p></div>`;
              body+=`</div>`;
            }
          }
          const signParts=[];
          if(_tData.sub?.name) signParts.push(`<span>Sub: <strong>${x(_tData.sub.name)}</strong>${_tData.sub.ts?` · ${new Date(_tData.sub.ts).toLocaleDateString()}`:''}</span>`);
          if(_tData.pm?.name)  signParts.push(`<span>PM: <strong>${x(_tData.pm.name)}</strong>${_tData.pm.ts?` · ${new Date(_tData.pm.ts).toLocaleDateString()}`:''}</span>`);
          if(signParts.length) body+=`<div class="sign-row">${signParts.join('')}</div>`;
          body+=`</div>`;
        }
      }
      // Task-level sign-off
      if(signoff.sub_name||signoff.pm_name){
        body+=`<div class="sign-row task-signoff">`;
        if(signoff.sub_name) body+=`<span>Sub sign-off: <strong>${x(signoff.sub_name)}</strong> · ${x(signoff.sub_date||'')}</span>`;
        if(signoff.pm_name)  body+=`<span>PM sign-off: <strong>${x(signoff.pm_name)}</strong> · ${x(signoff.pm_date||'')}</span>`;
        body+=`</div>`;
      }
      body+=`</div>`;
    }
    // Before/After photos at location level
    const baTrades=CUR.trades.filter(t=>t.location_id===loc.id&&!t.pm_only&&lc.trades[t.id]?.included&&lc.trades[t.id]?.includeBAPhotos&&t.ba_photos!==false);
    if(baTrades.length){
      body+=`<div class="ba-section"><p class="section-lbl" style="font-size:12px;font-weight:700;margin-bottom:10px">Before / After Photos</p>`;
      for(const trade of baTrades){
        const pairs=(CUR.baPhotos?.[trade.id]||[]).filter(p=>p.before||p.after);
        if(!pairs.length) continue;
        const tn=trade.name||TRADE_MAP[trade.trade_type]?.name||trade.trade_type;
        body+=`<p class="section-lbl">${x(tn.charAt(0).toUpperCase()+tn.slice(1))}</p>`;
        for(const pair of pairs) body+=`<div class="ba-pair"><div class="ba-img"><p class="ba-lbl bef">Before</p>${pair.before?`<img src="${pair.before}">`:'<div class="no-photo">No photo</div>'}</div><div class="ba-img"><p class="ba-lbl aft">After</p>${pair.after?`<img src="${pair.after}">`:'<div class="no-photo">No photo</div>'}</div></div>`;
      }
      body+=`</div>`;
    }
    body+=`</div>`;
  }

  // ── Warranties section ───────────────────────────────────────────────────────
  if(s.includeWarranties!==false){
    const specs=CUR.jobSpecs||{};
    const tradeTypes=[...new Set(CUR.trades.filter(t=>!t.pm_only).map(t=>t.trade_type))];
    const specRows=tradeTypes.map(tt=>{
      const sp=specs[tt]||{};
      const tr=TRADE_MAP[tt];
      const trName=tr?.name||tt;
      const hasData=sp.manufacturer||sp.product||sp.warrantyPeriod||sp.warrantyLink||sp.docName;
      const statusCell=hasData
        ?`<td class="yes">Recorded</td>`
        :`<td class="no">Missing</td>`;
      const linkCell=sp.warrantyLink?`<a href="${x(sp.warrantyLink)}">${x(sp.warrantyLink)}</a>`:(sp.docName?`📄 ${x(sp.docName)}`:'—');
      return `<tr><td><strong>${x(trName)}</strong></td><td>${sp.manufacturer?x(sp.manufacturer):'—'}</td><td>${sp.product?x(sp.product):'—'}</td><td>${sp.warrantyPeriod?x(sp.warrantyPeriod):'—'}</td><td>${sp.warrantyExpiry?new Date(sp.warrantyExpiry).toLocaleDateString():'—'}</td><td>${linkCell}</td>${statusCell}</tr>`;
    }).join('');
    if(specRows){
      body+=`<div class="loc-section" style="border-left:none">
        <h2 style="color:#6d28d9;border-bottom-color:#6d28d9">Product &amp; Warranty Register</h2>
        <table><thead><tr><th>Trade</th><th>Manufacturer</th><th>Product / Model</th><th>Warranty</th><th>Expiry</th><th>Link / Doc</th><th>Status</th></tr></thead><tbody>${specRows}</tbody></table>
      </div>`;
    }
  }

  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>QA Report — ${x(p.name||'')}</title><style>
*{box-sizing:border-box;margin:0;padding:0}

.rpt-hdr .meta{font-size:11px;opacity:.65;margin-top:2px}

.wrap{max-width:860px;margin:0 auto;padding:32px 40px}
.summary-block{margin-bottom:28px;padding:18px 20px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px}

.trade-section>h3{font-size:13px;font-weight:700;color:#1e3a5f;margin-bottom:4px}

.cp-hdr{display:flex;align-items:center;gap:8px;margin-bottom:4px}

.ba-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.ba-lbl.bef{color:#b45309}.ba-lbl.aft{color:#1d4ed8}

  document.getElementById('overlay-root').innerHTML = '';
  document.getElementById('app-root').innerHTML = `
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#d8e0ea">

        <!-- Mode toggle -->

          <button id="login-tab-pw" onclick="loginSetMode('password')"

            Password
          </button>
          <button id="login-tab-link" onclick="loginSetMode('link')"
            style="flex:1;border:none;border-radius:6px;padding:7px 0;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--gray);transition:all .15s">
            Email link
          </button>
        </div>

        <!-- Phase 1: input form -->
        <div id="login-phase-1">
          <div class="fg">
            <label>Email address</label>
            <input id="login-email" type="email" placeholder="you@yourcompany.com" autocomplete="email"
              onkeydown="if(event.key==='Enter')loginSubmit()"
              style="font-size:14px;padding:10px 12px">
          </div>
          <div id="login-pw-wrap" class="fg" style="margin-top:0">
            <label>Password</label>
            <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password"
              onkeydown="if(event.key==='Enter')loginSubmit()"
              style="font-size:14px;padding:10px 12px">
          </div>
          <button class="btn btn-primary" id="login-submit-btn"
            style="width:100%;justify-content:center;padding:11px 0;font-size:14px;margin-top:4px"

let _loginMode = 'password';
function loginSetMode(mode){
  _loginMode = mode;
  const pwWrap  = document.getElementById('login-pw-wrap');
  const tabPw   = document.getElementById('login-tab-pw');
  const tabLink = document.getElementById('login-tab-link');
  const btn     = document.getElementById('login-submit-btn');
  if(!pwWrap) return;
  if(mode === 'password'){
    pwWrap.style.display = '';
    tabPw.style.background   = 'var(--navy)'; tabPw.style.color   = '#fff';
    tabLink.style.background = 'transparent'; tabLink.style.color = 'var(--gray)';
    if(btn) btn.textContent = 'Sign in →';
    setTimeout(()=>document.getElementById('login-password')?.focus(), 30);
  } else {
    pwWrap.style.display = 'none';
    tabLink.style.background = 'var(--navy)'; tabLink.style.color   = '#fff';
    tabPw.style.background   = 'transparent'; tabPw.style.color   = 'var(--gray)';
    if(btn) btn.textContent = 'Send sign-in link →';
    setTimeout(()=>document.getElementById('login-email')?.focus(), 30);
  }
}

// Animated dots for login button loading state
let _btnDotTimer = null;
function _btnStartLoading(btn, base){
  if(!btn) return;
  btn.disabled = true;
  let n = 0;
  const dots = ['   ','·  ','··  ','···'];
  btn.textContent = base + ' ·';
  _btnDotTimer = setInterval(()=>{ n=(n+1)%4; btn.textContent = base + ' ' + dots[n]; }, 350);
}
function _btnStopLoading(btn, label){
  clearInterval(_btnDotTimer);
  _btnDotTimer = null;
  if(btn){ btn.textContent = label; btn.disabled = false; }
}

function loginReset(){
  document.getElementById('login-phase-1').style.display = '';
  document.getElementById('login-phase-2').style.display = 'none';
  setTimeout(()=>document.getElementById('login-email')?.focus(), 30);
}

async function loginSubmit(){
  if(_loginMode === 'password') await signInWithPassword();
  else await sendMagicLink();
}

async function signInWithPassword(){
  const email    = (document.getElementById('login-email')?.value||'').trim();
  const password = (document.getElementById('login-password')?.value||'');
  const errEl    = document.getElementById('login-error');
  errEl.style.display = 'none';
  if(!email)    { errEl.textContent='Please enter your email address'; errEl.style.display=''; return; }
  if(!password) { errEl.textContent='Please enter your password';      errEl.style.display=''; return; }
  const btn = document.getElementById('login-submit-btn');
  _btnStartLoading(btn, 'Signing in');
  try {
    const timeout = new Promise((_,r) => setTimeout(()=>r(new Error('timeout')), 10000));
    const { error } = await Promise.race([
      _sb.auth.signInWithPassword({ email, password }),
      timeout
    ]);
    if(error){
      const msg = error.message === 'Invalid login credentials' ? 'Incorrect email or password'
                : error.message === 'timeout' ? 'Can\'t reach the server — check your connection or try on mobile'
                : error.message;
      errEl.textContent = msg;
      errEl.style.display = '';
      _btnStopLoading(btn, 'Sign in →');
    }
  } catch(e) {
    errEl.textContent = 'Can\'t reach the server — check your connection or try on mobile';
    errEl.style.display = '';
    _btnStopLoading(btn, 'Sign in →');
  }
  // success handled by onAuthStateChange SIGNED_IN
}

async function sendMagicLink(){
  const email = (document.getElementById('login-email')?.value||'').trim();
  const errEl  = document.getElementById('login-error');
  if(!email){ errEl.textContent='Please enter your email address'; errEl.style.display=''; return; }
  errEl.style.display = 'none';
  const btn = document.getElementById('login-submit-btn');
  _btnStartLoading(btn, 'Sending');
  const { error } = await _sb.auth.signInWithOtp({
    email,
    options: {
      shouldCreateUser: true,
      emailRedirectTo: 'https://jmwaite1.github.io/qa-trial'
    }
  });
  if(error){
    errEl.textContent = error.message;
    errEl.style.display = '';
    _btnStopLoading(btn, 'Send sign-in link →');
  } else {
    document.getElementById('login-email-shown').textContent = email;
    document.getElementById('login-phase-1').style.display = 'none';
    document.getElementById('login-phase-2').style.display = '';
  }
}

function toggleInviteTradesPicker(){
  const role = document.getElementById('inv-role')?.value;
  const wrap = document.getElementById('inv-trades-wrap');
  if(wrap) wrap.style.display = role==='sub' ? '' : 'none';
}

async function sendInvite(){
  const email = document.getElementById('inv-email')?.value.trim();
  const role  = document.getElementById('inv-role')?.value;
  const seeAll = document.getElementById('inv-see-all')?.checked||false;
  const tradeBoxes = document.querySelectorAll('#inv-trades-wrap input[type=checkbox][value]:checked');
  const tradeTypes = [...tradeBoxes].map(b=>b.value);
  const resultEl = document.getElementById('inv-result');
  const btnEl    = document.getElementById('inv-send-btn');
  if(!email){ document.getElementById('inv-email')?.focus(); return; }
  if(btnEl){ btnEl.textContent='Sending…'; btnEl.disabled=true; }
  // 1. Send magic link to invite email
  const { error: authErr } = await _sb.auth.signInWithOtp({
    email,
    options: {
      shouldCreateUser: true,
      emailRedirectTo: 'https://jmwaite1.github.io/qa-trial'
    }
  });
  if(authErr){
    if(resultEl){ resultEl.textContent='Error: '+authErr.message; resultEl.style.background='var(--red-bg)'; resultEl.style.color='var(--red)'; resultEl.style.display=''; }
    if(btnEl){ btnEl.textContent='Send invite →'; btnEl.disabled=false; }
    return;
  }
  // 2. Look up the user's profile (they may not exist yet — that's OK, we'll add them when they sign in)
  const { data: profile } = await _sb.from('profiles').select('id').eq('email', email).single();
  if(profile){
    // User already exists — add them to project_members now
    await _sb.from('project_members').upsert({
      project_id: CUR_ID, user_id: profile.id, role,
      can_see_all: seeAll, trade_types: tradeTypes,
      invited_by: CURRENT_USER?.id
    }, { onConflict:'project_id,user_id' });
  }
  // 3. Store a pending invite so we can add them on first sign-in
  localStorage.setItem(`ngl_pending_inv_${email.toLowerCase()}`,
    JSON.stringify({ project_id:CUR_ID, role, can_see_all:seeAll, trade_types:tradeTypes }));
  if(resultEl){
    resultEl.innerHTML=`✅ Invite sent to <strong>${x(email)}</strong>. They'll be added to this project when they sign in.`;
    resultEl.style.background='var(--green-bg)'; resultEl.style.color='var(--green)';
    resultEl.style.display='';
  }
  if(btnEl){ btnEl.textContent='Send another'; btnEl.disabled=false; document.getElementById('inv-email').value=''; }
}

// On sign-in: check for pending invites for this user and apply them
async function applyPendingInvite(email){
  const key = `ngl_pending_inv_${email.toLowerCase()}`;
  const raw = localStorage.getItem(key);
  if(!raw || !CURRENT_USER) return;
  try{
    const inv = JSON.parse(raw);
    await _sb.from('project_members').upsert({
      project_id: inv.project_id, user_id: CURRENT_USER.id,
      role: inv.role, can_see_all: inv.can_see_all||false,
      trade_types: inv.trade_types||[]
    }, { onConflict:'project_id,user_id', ignoreDuplicates:true });
    localStorage.removeItem(key);
  }catch(e){ console.warn('applyPendingInvite:', e); }
}

async function signOut(){
  await _sb.auth.signOut();
  CURRENT_USER = null;
  CURRENT_PROFILE = null;
  VIEW = 'login';
  renderLogin();
}

async function loadCurrentProfile(){
  if(!CURRENT_USER) return;
  try {
    const timeout = new Promise(r => setTimeout(() => r({data:null}), 5000));
    const { data } = await Promise.race([
      _sb.from('profiles').select('*').eq('id', CURRENT_USER.id).single(),
      timeout
    ]);
    if(data) CURRENT_PROFILE = data;
  } catch(e){ console.warn('loadCurrentProfile error:', e); }
}

function userDisplayName(){
  if(CURRENT_PROFILE?.full_name) return CURRENT_PROFILE.full_name;
  if(CURRENT_USER?.email) return CURRENT_USER.email.split('@')[0];
  return 'You';
}

window.onerror=(msg,src,line,col,err)=>{
  console.error(msg,src,line,col,err);
  const detail = err?.stack ? `\n${err.stack}` : (src ? ` (${src}:${line})` : '');

};
window.onunhandledrejection=e=>{
  console.error('Unhandled promise rejection:', e.reason);
};

// Helper: getSession() with a 5-second timeout so it never hangs the spinner.
function _getSessionSafe(){
  return Promise.race([
    _sb.auth.getSession(),
    new Promise(r => setTimeout(() => r({data:{session:null}}), 12000))
  ]);
}

// Read whatever session Supabase stored in localStorage without a network call.
// Used as a fallback when getSession() times out — lets us render the app
// while the token refresh happens in the background.
function _readLocalSession(){
  try {
    const projectRef = SUPABASE_URL.split('//')[1].split('.')[0];
    const raw = localStorage.getItem(`sb-${projectRef}-auth-token`);
    if(!raw) return null;
    const parsed = JSON.parse(raw);
    return parsed?.access_token ? parsed : null;
  } catch(e){ return null; }
}

// Safety net: if the app is still showing the spinner after 10 seconds,
// force the login screen. _authDone() is called whenever we actually render.
let _authDone = false;
function _markAuthDone(){ _authDone = true; }
setTimeout(() => {
  if(!_authDone){
    console.warn('Auth timeout — forcing login screen');
    VIEW = 'login';
    renderLogin();
  }
}, 10000);

// Single source of truth for auth — onAuthStateChange fires INITIAL_SESSION
// immediately on page load, so we never need a separate getSession() call.
_sb.auth.onAuthStateChange(async (event, session) => {
  if(event === 'INITIAL_SESSION'){
    if(session){
      // Returning user — go straight to home
      CURRENT_USER = session.user;
      await loadCurrentProfile();
      if(session.user.email) applyPendingInvite(session.user.email).catch(console.warn);
      loadTemplates();
      restoreNav();                              // restore last VIEW/project on refresh
      if(!CUR) VIEW = 'home';                   // safety: if no project loaded fall back to home
      if(VIEW==='report'&&!CUR) VIEW='home';    // report needs CUR — fall back gracefully
      _markAuthDone();
      renderAll();
      syncProjectsFromSupabase().catch(console.warn);
    } else {
      // INITIAL_SESSION null — could mean token is mid-refresh. Try getSession() once
      // (with timeout) before giving up, to handle the case where the refresh token is
      // still valid but the access token expired while the app was closed.
      try {
        const { data } = await _getSessionSafe();
        if(data?.session){
          CURRENT_USER = data.session.user;
          await loadCurrentProfile();
          if(data.session.user.email) applyPendingInvite(data.session.user.email).catch(console.warn);
          loadTemplates();
          restoreNav();
          if(!CUR) VIEW = 'home';
          if(VIEW==='report'&&!CUR) VIEW='home';
          _markAuthDone();
          renderAll();
          syncProjectsFromSupabase().catch(console.warn);
          return;
        }
      } catch(e){ console.warn('getSession fallback failed:', e); }
      // getSession timed out — check localStorage directly before showing login.
      // This handles a slow network where the token is valid but the request hangs.
      const localSess = _readLocalSession();
      if(localSess){
        console.log('Auth: using localStorage session as fallback');
        CURRENT_USER = localSess.user || { id: localSess.user_id };
        await loadCurrentProfile();
        loadTemplates();
        restoreNav();
        if(!CUR) VIEW = 'home';
        if(VIEW==='report'&&!CUR) VIEW='home';
        _markAuthDone();
        renderAll();
        // kick off a real session refresh in the background
        _sb.auth.getSession().then(({ data }) => {
          if(data?.session) syncProjectsFromSupabase().catch(console.warn);
        }).catch(console.warn);
        return;
      }
      // Truly no session — show login
      _markAuthDone();
      VIEW = 'login';
      renderLogin();
    }
  } else if(event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED'){
    if(!CURRENT_USER || CURRENT_USER.id !== session.user.id){
      CURRENT_USER = session.user;
      await loadCurrentProfile();
      if(session.user.email) applyPendingInvite(session.user.email).catch(console.warn);
      if(VIEW === 'login'){
        VIEW = 'home';
        loadTemplates();
        renderAll();
        syncProjectsFromSupabase().catch(console.warn);
      } else {
        renderHeader();
      }
    }
  } else if(event === 'SIGNED_OUT'){
    CURRENT_USER = null;
    CURRENT_PROFILE = null;
    VIEW = 'login';
    renderLogin();
  }
});

// ── REFRESH TOKEN ON VISIBILITY / FOCUS ───────────────────────────────────────
// When the user switches back to the app (tab becomes visible, or window
// regains focus) after a long absence, proactively refresh the token so
// the very next Supabase call doesn't fail with an expired-JWT error.
// We throttle to once per 4 minutes so rapid tab-switches don't spam the
// auth server.
let _lastTokenRefresh = 0;
async function _maybeRefreshSession(){
  if(!CURRENT_USER) return;                    // not logged in — nothing to do
  const now = Date.now();
  if(now - _lastTokenRefresh < 4 * 60 * 1000) return;  // throttle
  _lastTokenRefresh = now;
  try {
    const { data, error } = await _sb.auth.getSession();
    if(error || !data?.session){
      // Session truly gone — show login
      CURRENT_USER = null;
      CURRENT_PROFILE = null;
      VIEW = 'login';
      renderLogin();
    }
    // If session is valid, Supabase will auto-refresh the access token in the
    // background via autoRefreshToken; nothing else needed here.
  } catch(e){ console.warn('Session check on focus failed:', e); }
}

document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'visible') _maybeRefreshSession();
});
window.addEventListener('focus', _maybeRefreshSession);
